  JW.aplicarBuscaFinanceiro = function(valor) {
    JW.financeiroBusca = String(valor || "").trim();
    JW.renderFinanceiro();
  };

  JW.limparBuscaFinanceiro = function() {
    JW.financeiroBusca = "";
    JW.renderFinanceiro();
  };

  JW.setAbaFinanceiro = function(aba) {
    JW.financeiroView = aba || "pendencias";
    JW.renderFinanceiro();
  };

  JW.getBuscaFinanceiro = function() {
    return String(JW.financeiroBusca || "").toLowerCase().trim();
  };

  JW.buscarEmCamposFinanceiro = function(campos) {
    var busca = JW.getBuscaFinanceiro();
    if (!busca) return true;
    var texto = (campos || []).join(" ").toLowerCase();
    return texto.indexOf(busca) !== -1;
  };

  JW.getItensFinanceiroFiltrados = function() {
    return JW.getItensFinanceiro().filter(function(item) {
      return JW.buscarEmCamposFinanceiro([
        item.nome || "",
        item.categoria || "",
        item.tipoUso || "",
        item.descricao || ""
      ]);
    });
  };

  JW.getLancamentosFinanceiroFiltrados = function() {
    return JW.getLancamentosFinanceiro().filter(function(grupo) {
      var descricoes = [];
      for (var i = 0; i < (grupo.itens || []).length; i++) {
        var item = grupo.itens[i];
        descricoes.push(item.descricao || item.itemNome || item.tipoLancamento || "");
      }
      return JW.buscarEmCamposFinanceiro([
        grupo.clienteNome || "",
        grupo.clienteEmail || "",
        grupo.telefone || "",
        descricoes.join(" ")
      ]);
    });
  };

  JW.getMensalidadesFinanceiroFiltradas = function() {
    return JW.getMensalidadesFinanceiro().filter(function(item) {
      return JW.buscarEmCamposFinanceiro([
        item.clienteNome || "",
        item.clienteEmail || "",
        item.descricao || "",
        item.status || ""
      ]);
    });
  };

  JW.getCobrancasFinanceiroFiltradas = function() {
    return JW.getCobrancasFinanceiro().filter(function(item) {
      return JW.buscarEmCamposFinanceiro([
        item.id || "",
        item.clienteNome || "",
        item.clienteEmail || "",
        item.competencia || "",
        item.referencia || "",
        item.status || ""
      ]);
    });
  };

  JW.classeStatusCobrancaFinanceiro = function(status) {
    var texto = String(status || "").toLowerCase();
    if (texto.indexOf("pago") !== -1) return "badge-success";
    if (texto.indexOf("cancel") !== -1) return "badge-danger";
    if (texto.indexOf("envi") !== -1) return "badge-info";
    return "badge-warning";
  };

  JW.renderItensFinanceiroLista = function() {
    var itens = JW.getItensFinanceiroFiltrados();
    if (!itens.length) return '<p class="text-muted">Nenhum item encontrado.</p>';

    var html = '<div class="financeiro-scroll-area">';
    for (var i = 0; i < itens.length; i++) {
      var item = itens[i];
      html += '<article class="financeiro-row-card">' +
        '<div class="financeiro-row-main">' +
          '<strong>' + JW.escapeHTML(item.nome) + '</strong>' +
          '<div class="text-muted">' + JW.escapeHTML(item.categoria || "Geral") + ' | ' + JW.escapeHTML(item.unidade || "un") + ' | ' + JW.escapeHTML(item.tipoUso || "Financeiro") + '</div>' +
          (item.descricao ? '<div class="text-muted">' + JW.escapeHTML(item.descricao) + '</div>' : '') +
        '</div>' +
        '<div class="financeiro-row-side">' +
          '<span class="badge ' + (item.ativo ? 'badge-success' : 'badge-warning') + '">' + JW.escapeHTML(item.ativo ? "Ativo" : "Inativo") + '</span>' +
          '<strong>' + JW.escapeHTML(item.valorPadraoFormatado) + '</strong>' +
        '</div>' +
      '</article>';
    }
    return html + '</div>';
  };

  JW.renderLancamentosFinanceiroLista = function() {
    var grupos = JW.getLancamentosFinanceiroFiltrados();
    if (!grupos.length) return '<p class="text-muted">Nenhum lançamento em aberto encontrado.</p>';

    var html = '<div class="financeiro-scroll-area">';
    for (var i = 0; i < grupos.length; i++) {
      var grupo = grupos[i];
      var preview = [];
      var previewMap = {};
      for (var j = 0; j < Math.min((grupo.itens || []).length, 3); j++) {
        var textoPreview = grupo.itens[j].descricao || grupo.itens[j].itemNome || grupo.itens[j].tipoLancamento || "Lancamento";
        var chavePreview = JW.normalizarTextoComparacao(textoPreview);
        if (!previewMap[chavePreview]) {
          previewMap[chavePreview] = true;
          preview.push(textoPreview);
        }
      }
      var competencias = (grupo.competenciasLista || []).map(function(itemCompetencia) {
        return JW.somenteData(itemCompetencia || "") || itemCompetencia || "-";
      });
      html += '<article class="financeiro-row-card">' +
        '<div class="financeiro-row-main">' +
          '<strong>' + JW.escapeHTML(grupo.clienteNome || grupo.clienteEmail) + '</strong>' +
          '<div class="text-muted">' + JW.escapeHTML((grupo.itens || []).length) + ' lancamento(s) | Competencias: ' + JW.escapeHTML(competencias.join(", ") || "-") + '</div>' +
          '<div class="text-muted">' + JW.escapeHTML(preview.join(" • ")) + ((grupo.itens || []).length > 3 ? " ..." : "") + '</div>' +
        '</div>' +
        '<div class="financeiro-row-side">' +
          '<span class="badge badge-warning">Em aberto</span>' +
          '<strong>' + JW.escapeHTML(grupo.totalAbertoFormatado) + '</strong>' +
          '<div class="financeiro-row-actions">' +
            '<button class="btn btn-sm btn-secondary" onclick="JW.abrirResumoLancamentosFinanceiro(' + JW.attrJs(grupo.clienteEmail) + ')">Ver itens</button>' +
            '<button class="btn btn-sm btn-primary" onclick="JW.abrirGerarCobrancaFinanceiro(' + JW.attrJs(grupo.clienteEmail) + ')"><i class="fas fa-file-invoice-dollar"></i> Gerar cobrança</button>' +
          '</div>' +
        '</div>' +
      '</article>';
    }
    return html + '</div>';
  };

  JW.renderMensalidadesFinanceiroLista = function() {
    var mensalidades = JW.getMensalidadesFinanceiroFiltradas();
    if (!mensalidades.length) return '<p class="text-muted">Nenhuma mensalidade encontrada.</p>';

    var html = '<div class="financeiro-scroll-area">';
    for (var i = 0; i < mensalidades.length; i++) {

          '</div>' +
        '</div>' +

  JW.renderAbasFinanceiro = function() {
    var abas = [
      { id: "pendencias", label: "Pendencias", icon: "fas fa-wallet" },

    for (var i = 0; i < abas.length; i++) {

  JW.renderPainelFinanceiroAtual = function() {
    var titulos = {
      pendencias: "Clientes prontos para cobrar",
      cobrancas: "Cobrancas geradas",
      mensalidades: "Mensalidades cadastradas",
      itens: "Itens de cobranca"
    };

    var contagens = {
      pendencias: JW.getLancamentosFinanceiroFiltrados().length,
      cobrancas: JW.getCobrancasFinanceiroFiltradas().length,
      mensalidades: JW.getMensalidadesFinanceiroFiltradas().length,
      itens: JW.getItensFinanceiroFiltrados().length
    };

    var corpo = "";
    if (JW.financeiroView === "cobrancas") corpo = JW.renderCobrancasFinanceiroLista();
    else if (JW.financeiroView === "mensalidades") corpo = JW.renderMensalidadesFinanceiroLista();
    else if (JW.financeiroView === "itens") corpo = JW.renderItensFinanceiroLista();
    else corpo = JW.renderLancamentosFinanceiroLista();

    return '<div class="card financeiro-main-card financeiro-panel-' + JW.escapeAttr(JW.financeiroView || "pendencias") + '">' +
      '<div class="financeiro-panel-header">' +
        '<div><h3>' + JW.escapeHTML(titulos[JW.financeiroView] || "Financeiro") + '</h3><p class="text-muted">' + JW.escapeHTML(contagens[JW.financeiroView] || 0) + ' resultado(s)</p></div>' +
      '</div>' +

    '</div>';
  };

        '<div class="admin-chat-contact-main"><strong>' + JW.escapeHTML(nome) + '</strong><div class="text-muted">' + JW.escapeHTML(JW.resumirTexto(c.ultimaMensagem || "Sem mensagens", 42)) + '</div></div>' +

  JW.abrirConversaAdmin = async function(clienteEmail, clienteNome) {

    JW.atualizarLayoutChatAdminMobile();
    var painel = document.getElementById("adminChatPanel");

      JW.esconderLoading();

        mensagem: m.mensagem || ""

  JW.habilitarArrasteChat = function(widget) {
    var handle = widget.querySelector("#supportChatButton");
    if (!handle || handle.dataset.dragBound) return;
    handle.dataset.dragBound = "1";
    var arrastando = false;
    var iniciou = false;
    var offsetX = 0;
    var offsetY = 0;
    var startX = 0;
    var startY = 0;

    handle.addEventListener("pointerdown", function(e) {
      if (e.button !== undefined && e.button !== 0) return;
      if (widget.classList.contains("open")) return;
      arrastando = true;
      iniciou = false;
      startX = e.clientX;
      startY = e.clientY;
      var rect = widget.getBoundingClientRect();
      offsetX = e.clientX - rect.left;
      offsetY = e.clientY - rect.top;
      handle.setPointerCapture && handle.setPointerCapture(e.pointerId);
    });

    handle.addEventListener("pointermove", function(e) {
      if (!arrastando) return;
      if (Math.abs(e.clientX - startX) + Math.abs(e.clientY - startY) > 8) iniciou = true;
      if (!iniciou) return;
      var x = Math.max(8, Math.min(window.innerWidth - widget.offsetWidth - 8, e.clientX - offsetX));
      var y = Math.max(8, Math.min(window.innerHeight - widget.offsetHeight - 8, e.clientY - offsetY));
      widget.style.left = x + "px";
      widget.style.top = y + "px";
      widget.style.right = "auto";
      widget.style.bottom = "auto";
      e.preventDefault();
    });

    handle.addEventListener("pointerup", function(e) {
      if (iniciou) {
        e.preventDefault();
        e.stopPropagation();
      }
      arrastando = false;
      window.setTimeout(function() { iniciou = false; }, 0);
    });
  };

      '</div>';
    }
    JW.chatAdminMobileView = "lista";
    JW.atualizarLayoutChatAdminMobile();
    var lista = document.getElementById("adminConversasFirebase");
    if (lista) lista.innerHTML = '<p class="text-muted" style="padding:1rem;">Carregando conversas...</p>';
    JW.iniciarPollingConversasAdmin("adminConversasFirebase");
  };

  JW.abrirChatCliente = async function() {
    if (!JW.usuarioLogado) return;
    JW.fecharMusicaAmbiente();
    JW.renderChatWidget();
    JW.prepararJanelaChatExpandida();
    var widget = document.getElementById("supportChatWidget");
    var janela = document.getElementById("supportChatWindow");
    if (widget) {
      widget.classList.add("open");
      JW.atualizarBotaoChatFlutuante(true);
    }
    document.body.classList.add("chat-immersive-open");
    if (janela && !document.getElementById("chatHistoryCliente")) janela.innerHTML = JW.renderChatClientePainel();
    var hist = document.getElementById("chatHistoryCliente");
    if (!hist) {
      return;
    }
    hist.innerHTML = '<p class="text-muted">Carregando conversa...</p>';
    try {
      var conversa = await JW.chamarGoogleScript("getMensagensConversaV3", JW.usuarioLogado.email);
      JW.chamarGoogleScript("marcarMensagensClienteLidasV3", JW.usuarioLogado.email).catch(function() {});
      hist.innerHTML = JW.renderMensagensChat((conversa && conversa.mensagens) || []);
      JW.scrollChatParaFinal("chatHistoryCliente");
      JW.bindTypingInput("chatMensagemCliente", JW.usuarioLogado.email);
      JW.iniciarPollingConversaCliente("chatHistoryCliente");
      for (var i = 0; i < JW.notificacoes.length; i++) {
        var n = JW.notificacoes[i] || {};
        if (!n.lida && String(n.acao || "").indexOf("chat:") === 0) {
          n.lida = true;
          JW.chamarGoogleScript("marcarNotificacaoLidaV3", n.id, JW.usuarioLogado.email).catch(function() {});
        }
      }
      JW.renderNotificacoes();
      JW.atualizarBadgeChat();
    } catch (error) {
      hist.innerHTML = '<p class="text-muted">Nao foi possivel carregar a conversa.</p>';
    }
  };

  JW.fecharChatCliente = function() {
    JW.fecharChatWidget();
  };

  JW.enviarMensagemChatCliente = async function() {
    var msg = (document.getElementById("chatMensagemCliente") || {}).value || "";
    if (!msg.trim()) {
      JW.toast("Digite a mensagem.", "error");
      return;
    }
    var campo = document.getElementById("chatMensagemCliente");
    var hist = document.getElementById("chatHistoryCliente");
    if (campo) campo.disabled = true;
    try {
      var resultado = await JW.enviarMensagemFirebase({
        email: JW.usuarioLogado.email,
        usuario: JW.usuarioLogado.usuario,
        remetenteTipo: JW.usuarioLogado.tipo || "Cliente",
        mensagem: msg
      });
      var conversa = await JW.chamarGoogleScript("getMensagensConversaV3", JW.usuarioLogado.email);
      if (campo) campo.value = "";
      if (hist) hist.innerHTML = JW.renderMensagensChat((conversa && conversa.mensagens) || []);
      JW.scrollChatParaFinal("chatHistoryCliente");
      JW.toast(resultado && resultado.message ? resultado.message : "Mensagem enviada.", resultado && resultado.success ? "success" : "error");
      JW.iniciarPollingConversaCliente("chatHistoryCliente");
    } catch (error) {
      JW.toast("Erro ao enviar mensagem: " + (error.message || error), "error");
    } finally {
      if (campo) campo.disabled = false;
    }
  };

  JW.toggleEmojiPicker = function(id) {
    var el = document.getElementById(id);
    if (el) el.classList.toggle("d-none");
  };

  JW.inserirEmojiChat = function(inputId, emoji) {
    var campo = document.getElementById(inputId);
    if (!campo) return;
    var inicio = campo.selectionStart || campo.value.length;
    var fim = campo.selectionEnd || campo.value.length;
    campo.value = campo.value.slice(0, inicio) + emoji + campo.value.slice(fim);
    campo.focus();
    campo.selectionStart = campo.selectionEnd = inicio + emoji.length;
    campo.dispatchEvent(new Event("input"));
  };

  JW.enviarImagemChat = function(contexto, input) {
    var arquivo = input && input.files && input.files[0];
    if (!arquivo) return;
    if (!/^image\//.test(arquivo.type || "")) {
      JW.toast("Selecione uma imagem.", "error");
      input.value = "";
      return;
    }
    if (arquivo.size > 900000) {
      JW.toast("Imagem muito grande. Envie uma imagem menor.", "error");
      input.value = "";
      return;
    }
    var reader = new FileReader();
    reader.onload = async function() {
      try {
        var dadosBase = {
          email: JW.usuarioLogado.email,
          usuario: JW.usuarioLogado.usuario,
          tipo: "imagem",
          mensagem: "",
          imagemDataUrl: reader.result,
          mimeType: arquivo.type || "image/png"
        };
        if (contexto === "admin") {
          if (!JW.chatClienteAtual) throw new Error("Abra uma conversa antes de enviar imagem.");
          dadosBase.remetenteTipo = "Administrador";
          dadosBase.clienteEmail = JW.chatClienteAtual;
        } else {
          dadosBase.remetenteTipo = JW.usuarioLogado.tipo || "Cliente";
        }
        await JW.enviarMensagemFirebase(dadosBase);
        if (contexto === "admin") {
          JW.iniciarPollingConversaAdmin(JW.chatClienteAtual, "chatHistoryAdmin");
          JW.atualizarListaConversasAdminPolling_("adminConversasFirebase", true);
        } else {
          JW.iniciarPollingConversaCliente("chatHistoryCliente");
        }
        JW.toast("Imagem enviada.", "success");
      } catch (error) {
        JW.toast("Erro ao enviar imagem: " + (error.message || error), "error");
      } finally {
        input.value = "";
      }
    };
    reader.readAsDataURL(arquivo);
  };

  JW.getClienteEmailChatContexto = function(contexto) {
    return contexto === "admin" ? JW.chatClienteAtual : (JW.usuarioLogado && JW.usuarioLogado.email);
  };

  JW.iniciarGravacaoPress = function(event, contexto) {
    if (event) {
      event.preventDefault();
      event.stopPropagation();
    }
    if (JW.audioRecorder && JW.audioRecorder.state === "recording") {
      JW.pararGravacaoAudioChat();
      return;
    }
    JW.audioRecordingPointerId = event ? event.pointerId : null;
    JW.audioRecordingStartX = event ? event.clientX : 0;
    JW.audioRecordingLocked = false;
    if (event && event.currentTarget && event.currentTarget.setPointerCapture) {
      event.currentTarget.setPointerCapture(event.pointerId);
    }
    JW.iniciarGravacaoAudioChat(contexto);
  };

  JW.moverGravacaoPress = function(event) {
    if (!JW.audioRecorder || JW.audioRecorder.state !== "recording") return;
    if (JW.audioRecordingPointerId !== null && event.pointerId !== JW.audioRecordingPointerId) return;
    if (JW.audioRecordingStartX - event.clientX > 70) {
      JW.audioRecordingLocked = true;
      JW.atualizarBarraGravacao();
    }
  };

  JW.finalizarGravacaoPress = function(event) {
    if (event) {
      event.preventDefault();
      event.stopPropagation();
    }
    if (!JW.audioRecorder || JW.audioRecorder.state !== "recording") return;
    if (!JW.audioRecordingLocked) JW.pararGravacaoAudioChat();
  };

  JW.iniciarGravacaoAudioChat = async function(contexto) {
    if (JW.audioRecorder && JW.audioRecorder.state === "recording") {
      JW.pararGravacaoAudioChat();
      return;
    }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !window.MediaRecorder) {
      JW.toast("Microfone não suportado neste navegador.", "error");
      return;
    }
    var clienteEmail = JW.getClienteEmailChatContexto(contexto);
    if (contexto === "admin" && !clienteEmail) {
      JW.toast("Abra uma conversa antes de gravar audio.", "error");
      return;
    }
    try {
      var stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      JW.audioChunks = [];
      JW.audioRecordingStream = stream;
      JW.audioRecordingContext = contexto;
      var recorder = new MediaRecorder(stream);
      JW.audioRecorder = recorder;
      recorder.ondataavailable = function(event) {
        if (event.data && event.data.size) JW.audioChunks.push(event.data);
      };
      recorder.onstop = function() {
        stream.getTracks().forEach(function(track) { track.stop(); });
        JW.setRecordingFirebase(clienteEmail, false);
        JW.esconderBarraGravacao();
        JW.enviarAudioGravadoChat(contexto, recorder.mimeType || "audio/webm");
        JW.audioRecorder = null;
        JW.audioRecordingStream = null;
        JW.audioRecordingPointerId = null;
      };
      recorder.start();
      JW.audioRecordingStartedAt = Date.now();
      JW.setRecordingFirebase(clienteEmail, true);
      JW.mostrarBarraGravacao(contexto);
    } catch (error) {
      JW.setRecordingFirebase(clienteEmail, false);
      JW.esconderBarraGravacao();
      JW.toast("Nao foi possivel acessar o microfone: " + (error.message || error), "error");
    }
  };

  JW.toggleGravacaoAudioChat = JW.iniciarGravacaoAudioChat;

  JW.pararGravacaoAudioChat = function() {
    if (JW.audioRecorder && JW.audioRecorder.state === "recording") {
      JW.audioRecorder.stop();
    }
  };

  JW.mostrarBarraGravacao = function(contexto) {
    JW.atualizarBarraGravacao();
    if (JW.audioRecordingTimer) window.clearInterval(JW.audioRecordingTimer);
    JW.audioRecordingTimer = window.setInterval(JW.atualizarBarraGravacao, 500);
  };

  JW.atualizarBarraGravacao = function() {
    var contexto = JW.audioRecordingContext || "cliente";
    var barra = document.getElementById("chatRecording" + contexto);
    var tempo = document.getElementById("chatRecordingTempo" + contexto);
    var btn = document.querySelector('.chat-mic-btn[data-contexto="' + contexto + '"]');
    if (barra) {
      barra.classList.remove("d-none");
      barra.classList.toggle("locked", !!JW.audioRecordingLocked);
      var detalhe = barra.querySelector("small");
      if (detalhe) detalhe.textContent = JW.audioRecordingLocked ? "Gravacao travada. Clique no microfone para enviar." : "Arraste para a esquerda para travar";
    }
    if (btn) btn.classList.add("recording");
    if (tempo && JW.audioRecordingStartedAt) tempo.textContent = Math.max(0, Math.floor((Date.now() - JW.audioRecordingStartedAt) / 1000)) + "s";
  };

  JW.esconderBarraGravacao = function() {
    if (JW.audioRecordingTimer) window.clearInterval(JW.audioRecordingTimer);
    JW.audioRecordingTimer = null;
    var barras = document.querySelectorAll(".chat-recording-bar");
    for (var i = 0; i < barras.length; i++) barras[i].classList.add("d-none");
    var botoes = document.querySelectorAll(".chat-mic-btn.recording");
    for (var j = 0; j < botoes.length; j++) botoes[j].classList.remove("recording");
    JW.audioRecordingLocked = false;
  };

  JW.enviarAudioGravadoChat = function(contexto, mimeType) {
    var blob = new Blob(JW.audioChunks || [], { type: mimeType || "audio/webm" });
    if (!blob.size) {
      JW.toast("Audio vazio.", "error");
      return;
    }
    if (blob.size > 900000) {
      JW.toast("Audio muito grande. Grave uma mensagem mais curta.", "error");
      return;
    }
    var reader = new FileReader();
    reader.onload = async function() {
      try {
        var dadosBase = {
          email: JW.usuarioLogado.email,
          usuario: JW.usuarioLogado.usuario,
          tipo: "audio",
          mensagem: "Audio",
          audioDataUrl: reader.result,
          mimeType: mimeType || "audio/webm"
        };
        if (contexto === "admin") {
          if (!JW.chatClienteAtual) throw new Error("Abra uma conversa antes de enviar audio.");
          dadosBase.remetenteTipo = "Administrador";
          dadosBase.clienteEmail = JW.chatClienteAtual;
        } else {
          dadosBase.remetenteTipo = JW.usuarioLogado.tipo || "Cliente";
        }
        await JW.enviarMensagemFirebase(dadosBase);
        if (contexto === "admin") {
          JW.iniciarPollingConversaAdmin(JW.chatClienteAtual, "chatHistoryAdmin");
          JW.atualizarListaConversasAdminPolling_("adminConversasFirebase", true);
        } else {
          JW.iniciarPollingConversaCliente("chatHistoryCliente");
        }
        JW.toast("Audio enviado.", "success");
      } catch (error) {
        JW.toast("Erro ao enviar audio: " + (error.message || error), "error");
      }
    };
    reader.readAsDataURL(blob);
  };

  JW.logout = function() {
    JW.pararTodosPollingsChat_();
    JW.resetNavigationCaches_();
    JW.chatClienteAtual = "";
    JW.usuarioLogado = null;
    document.body.classList.remove("logged-in");
    document.body.classList.remove("admin-mode");
    document.body.classList.remove("sidebar-collapsed");
    document.body.classList.remove("sidebar-open");
    JW.fecharMusicaAmbiente();
    var chatWidget = document.getElementById("supportChatWidget");
    if (chatWidget && chatWidget.parentNode) chatWidget.parentNode.removeChild(chatWidget);
    var loginScreen = document.getElementById("loginScreen");
    var mainApp = document.getElementById("mainApp");
    if (mainApp) mainApp.classList.add("d-none");
    if (loginScreen) loginScreen.classList.remove("d-none");
  };

  window.addEventListener("load", function() {
    var overlay = document.getElementById("loadingOverlay");
    if (overlay) overlay.classList.remove("active");
    JW.inicializarPWA();

    var btnLogin = document.getElementById("btnLogin");
    var btnRegister = document.getElementById("btnRegister");
    var tabLogin = document.getElementById("tabLoginBtn");
    var tabRegister = document.getElementById("tabRegisterBtn");
    var btnLogout = document.getElementById("btnLogout");
    var loginUsuario = document.getElementById("loginUsuario");
    var loginSenha = document.getElementById("loginSenha");
    var backdrop = document.getElementById("modalBackdrop");

    if (btnLogin) {
      btnLogin.dataset.bound = "bootstrap";
      btnLogin.addEventListener("click", JW.fazerLogin);
    }
    if (btnRegister) {
      btnRegister.dataset.bound = "bootstrap";
      btnRegister.addEventListener("click", JW.fazerCadastro);
    }
    if (tabLogin) tabLogin.addEventListener("click", JW.mostrarLoginForm);
    if (tabRegister) tabRegister.addEventListener("click", JW.mostrarRegisterForm);
    if (btnLogout) btnLogout.addEventListener("click", JW.logout);
    if (loginUsuario) loginUsuario.addEventListener("keydown", function(e) { if (e.key === "Enter") JW.fazerLogin(); });
    if (loginSenha) loginSenha.addEventListener("keydown", function(e) { if (e.key === "Enter") JW.fazerLogin(); });
    if (backdrop) backdrop.addEventListener("click", function() {
      JW.fecharModalSistema();
      JW.fecharModal("modalComprar");
      JW.fecharModal("modalRecuperacao");
      JW.fecharModal("modalAlterarSenha");
    });
    document.addEventListener("click", function(e) {
      var panel = document.querySelector(".notifications-panel");
      if (panel && !panel.contains(e.target)) JW.fecharNotificacoes();
    });
  });
})();
</script>
