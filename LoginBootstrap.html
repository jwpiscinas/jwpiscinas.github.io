<script>
(function() {
  window.JW = window.JW || {};

  JW.usuarioLogado = JW.usuarioLogado || null;
  JW.produtosCache = [];
  JW.manuaisCache = [];
  JW.notificacoes = [];
  JW.produtoAtual = null;
  JW.orcamentoAnexo = null;
  JW.relatorioDados = null;
  JW.navLoading = false;
  JW.navSeq = 0;
  JW.produtoFiltro = "Todos";
  JW.manualFiltro = "Todos";
  JW.chatClienteAtual = "";
  JW.historicoFiltro = "Todos";
  JW.historicoItens = [];
  JW.relatorioSelecionado = "";

  JW.escapeHTML = function(valor) {
    if (valor === null || valor === undefined) return "";
    return String(valor)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  };

  JW.escapeAttr = JW.escapeHTML;

  JW.attrJs = function(valor) {
    return JW.escapeAttr(JSON.stringify(String(valor === null || valor === undefined ? "" : valor)));
  };

  JW.formatarMoeda = function(valor) {
    var numero = typeof valor === "number" ? valor : parseFloat(String(valor || "0").replace(/\./g, "").replace(",", "."));
    if (isNaN(numero)) numero = 0;
    return "R$ " + numero.toFixed(2).replace(".", ",");
  };

  JW.numero = function(valor) {
    if (typeof valor === "number") return valor;
    if (!valor) return 0;
    var texto = String(valor).replace(/\s/g, "").replace("R$", "");
    if (texto.indexOf(",") !== -1) texto = texto.replace(/\./g, "").replace(",", ".");
    var numero = parseFloat(texto);
    return isNaN(numero) ? 0 : numero;
  };

  JW.precoAtivoProduto = function(produto) {
    var preco = JW.numero(produto && produto.preco);
    var desconto = JW.numero(produto && produto.precoComDesconto);
    return desconto > 0 ? desconto : preco;
  };

  JW.mostrarMensagem = function(elemento, mensagem, tipo) {
    var el = document.getElementById(elemento);
    if (!el) {
      JW.toast(mensagem, tipo);
      return;
    }
    el.textContent = mensagem;
    el.className = "alert alert-" + (tipo || "success");
    el.style.display = "block";
    el.classList.remove("d-none");
  };

  JW.toast = function(mensagem, tipo) {
    var container = document.getElementById("jwToastContainer");
    if (!container) {
      container = document.createElement("div");
      container.id = "jwToastContainer";
      container.style.position = "fixed";
      container.style.right = "18px";
      container.style.bottom = "18px";
      container.style.zIndex = "9999";
      container.style.display = "flex";
      container.style.flexDirection = "column";
      container.style.gap = "10px";
      document.body.appendChild(container);
    }

    var item = document.createElement("div");
    item.className = "alert alert-" + (tipo || "success");
    item.style.boxShadow = "0 10px 24px rgba(15,23,42,.18)";
    item.style.margin = "0";
    item.style.maxWidth = "360px";
    item.textContent = mensagem;
    container.appendChild(item);

    window.setTimeout(function() {
      if (item && item.parentNode) item.parentNode.removeChild(item);
    }, 5200);
  };

  JW.mostrarLoading = function(mensagem) {
    var loadingText = document.getElementById("loadingText");
    var overlay = document.getElementById("loadingOverlay");
    if (loadingText) loadingText.textContent = mensagem || "Carregando...";
    if (overlay) overlay.classList.add("active");
  };

  JW.esconderLoading = function() {
    var overlay = document.getElementById("loadingOverlay");
    if (overlay) overlay.classList.remove("active");
  };

  JW.chamarGoogleScript = function(funcao) {
    var args = Array.prototype.slice.call(arguments, 1);
    return new Promise(function(resolve, reject) {
      if (!window.google || !google.script || !google.script.run) {
        reject(new Error("google.script.run nao esta disponivel. Abra pela URL do Web App implantado."));
        return;
      }
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(function(error) {
          reject(error || new Error("Falha ao chamar " + funcao));
        })
        [funcao].apply(null, args);
    });
  };

  JW.setTitulo = function(titulo) {
    var el = document.getElementById("currentPageTitle");
    if (el) el.textContent = titulo || "Inicio";
  };

  JW.renderMain = function(html) {
    var main = document.getElementById("mainContent");
    if (main) main.innerHTML = html;
  };

  JW.renderCarregando = function(texto) {
    JW.renderMain(
      '<div class="card text-center">' +
        '<div class="loading-spinner-modern" style="margin:20px auto;"></div>' +
        '<p class="text-muted">' + JW.escapeHTML(texto || "Carregando...") + '</p>' +
      '</div>'
    );
  };

  JW.abrirModal = function(id) {
    var backdrop = document.getElementById("modalBackdrop");
    var modal = document.getElementById(id);
    if (backdrop) {
      backdrop.classList.remove("d-none");
      backdrop.classList.add("active");
    }
    if (modal) {
      modal.classList.remove("d-none");
      modal.classList.add("active");
    }
  };

  JW.fecharModal = function(id) {
    var backdrop = document.getElementById("modalBackdrop");
    var modal = document.getElementById(id);
    if (modal) {
      modal.classList.add("d-none");
      modal.classList.remove("active");
    }
    if (backdrop) {
      backdrop.classList.add("d-none");
      backdrop.classList.remove("active");
    }
  };

  JW.abrirModalSistema = function(titulo, corpoHtml, rodapeHtml) {
    var modal = document.getElementById("jwSystemModal");
    if (!modal) {
      modal = document.createElement("div");
      modal.id = "jwSystemModal";
      modal.className = "modal d-none";
      modal.innerHTML = '<div class="modal-header"><h3 id="jwSystemModalTitle"></h3><button class="modal-close" onclick="JW.fecharModalSistema()">&times;</button></div><div class="modal-body" id="jwSystemModalBody"></div>';
      document.body.appendChild(modal);
    }
    var title = document.getElementById("jwSystemModalTitle");
    var body = document.getElementById("jwSystemModalBody");
    if (title) title.innerHTML = titulo || "";
    if (body) body.innerHTML = (corpoHtml || "") + (rodapeHtml || "");
    modal.classList.toggle("modal-wide", String(corpoHtml || "").indexOf("profile-modal-body") !== -1 || String(corpoHtml || "").indexOf("chat-history") !== -1);
    var backdrop = document.getElementById("modalBackdrop");
    if (backdrop) {
      backdrop.classList.remove("d-none");
      backdrop.classList.add("active");
    }
    modal.classList.remove("d-none");
    modal.classList.add("active");
  };

  JW.fecharModalSistema = function() {
    var modal = document.getElementById("jwSystemModal");
    var backdrop = document.getElementById("modalBackdrop");
    if (modal) {
      modal.classList.add("d-none");
      modal.classList.remove("active");
    }
    if (backdrop) {
      backdrop.classList.add("d-none");
      backdrop.classList.remove("active");
    }
  };

  JW.formatarTelefone = function(input) {
    if (!input) return;
    var numeros = input.value.replace(/\D/g, "").slice(0, 11);
    if (numeros.length > 10) {
      input.value = numeros.replace(/^(\d{2})(\d{5})(\d{0,4}).*/, "($1) $2-$3");
    } else if (numeros.length > 6) {
      input.value = numeros.replace(/^(\d{2})(\d{4})(\d{0,4}).*/, "($1) $2-$3");
    } else if (numeros.length > 2) {
      input.value = numeros.replace(/^(\d{2})(\d{0,5}).*/, "($1) $2");
    } else {
      input.value = numeros;
    }
  };

  JW.mostrarLoginForm = function() {
    var login = document.getElementById("loginForm");
    var register = document.getElementById("registerForm");
    var tabLogin = document.getElementById("tabLoginBtn");
    var tabRegister = document.getElementById("tabRegisterBtn");
    if (login) login.classList.remove("d-none");
    if (register) register.classList.add("d-none");
    if (tabLogin) tabLogin.classList.add("active");
    if (tabRegister) tabRegister.classList.remove("active");
  };

  JW.mostrarRegisterForm = function() {
    var login = document.getElementById("loginForm");
    var register = document.getElementById("registerForm");
    var tabLogin = document.getElementById("tabLoginBtn");
    var tabRegister = document.getElementById("tabRegisterBtn");
    if (login) login.classList.add("d-none");
    if (register) register.classList.remove("d-none");
    if (tabLogin) tabLogin.classList.remove("active");
    if (tabRegister) tabRegister.classList.add("active");
  };

  JW.fazerLogin = async function() {
    var usuarioEl = document.getElementById("loginUsuario");
    var senhaEl = document.getElementById("loginSenha");
    var btnLogin = document.getElementById("btnLogin");
    var usuario = usuarioEl ? usuarioEl.value.trim() : "";
    var senha = senhaEl ? senhaEl.value : "";

    if (!usuario || !senha) {
      JW.mostrarMensagem("loginMessage", "Preencha usuario e senha.", "error");
      return;
    }

    JW.setLoginButtonLoading(true);
    try {
      var resultado = await JW.chamarGoogleScript("verificarLogin", { usuario: usuario, senha: senha });
      JW.setLoginButtonLoading(false);

      if (!resultado || !resultado.success) {
        JW.mostrarMensagem("loginMessage", "Erro ao fazer login: " + (resultado && resultado.message ? resultado.message : "resposta invalida"), "error");
        return;
      }

      JW.usuarioLogado = resultado;
      JW.entrarNoSistema();
    } catch (error) {
      JW.setLoginButtonLoading(false);
      JW.mostrarMensagem("loginMessage", "Erro ao chamar o servidor: " + (error && error.message ? error.message : error), "error");
    }
  };

  JW.setLoginButtonLoading = function(loading) {
    var btn = document.getElementById("btnLogin");
    if (!btn) return;
    if (loading) {
      btn.dataset.originalText = btn.innerHTML;
      btn.disabled = true;
      btn.classList.add("btn-login-loading");
      btn.innerHTML = '<span class="mini-spinner"></span> Entrando no sistema...';
    } else {
      btn.disabled = false;
      btn.classList.remove("btn-login-loading");
      btn.innerHTML = btn.dataset.originalText || "Entrar";
    }
  };

  JW.fazerCadastro = async function() {
    var dados = {
      usuario: (document.getElementById("registerUsuario") || {}).value || "",
      email: (document.getElementById("registerEmail") || {}).value || "",
      telefone: (document.getElementById("registerTelefone") || {}).value || "",
      bairro: (document.getElementById("registerBairro") || {}).value || "",
      endereco: (document.getElementById("registerEndereco") || {}).value || "",
      senha: (document.getElementById("registerSenha") || {}).value || "",
      confirmacaoSenha: (document.getElementById("registerConfirmacaoSenha") || {}).value || ""
    };

    JW.mostrarLoading("Criando cadastro...");
    try {
      var resultado = await JW.chamarGoogleScript("cadastrarUsuario", dados);
      JW.esconderLoading();
      JW.mostrarMensagem("registerMessage", resultado && resultado.message ? resultado.message : "Cadastro processado.", resultado && resultado.success ? "success" : "error");
      if (resultado && resultado.success) JW.mostrarLoginForm();
    } catch (error) {
      JW.esconderLoading();
      JW.mostrarMensagem("registerMessage", "Erro ao cadastrar: " + (error.message || error), "error");
    }
  };

  JW.abrirRecuperacaoSenha = function() {
    JW.recoveryData = { email: "", codigo: "" };
    JW.mostrarRecoveryStep(1);
    var msg = document.getElementById("recoveryMessage");
    if (msg) {
      msg.classList.add("d-none");
      msg.style.display = "none";
    }
    JW.abrirModal("modalRecuperacao");
  };

  JW.mostrarRecoveryStep = function(step) {
    var steps = [document.getElementById("step1"), document.getElementById("step2"), document.getElementById("step3")];
    for (var i = 0; i < steps.length; i++) {
      if (!steps[i]) continue;
      if (i === step - 1) {
        steps[i].classList.remove("d-none");
        steps[i].classList.add("active");
      } else {
        steps[i].classList.add("d-none");
        steps[i].classList.remove("active");
      }
    }

    if (step === 2) {
      var container = document.getElementById("codeInputsContainer");
      if (container) {
        container.innerHTML = '<input id="codigoRecuperacaoUnico" class="form-input" type="text" inputmode="numeric" maxlength="6" placeholder="000000" style="text-align:center;font-size:1.4rem;letter-spacing:.4rem;">';
      }
    }
  };

  JW.solicitarCodigoRecuperacao = async function() {
    var email = (document.getElementById("recoveryEmail") || {}).value || "";
    if (!email.trim()) {
      JW.mostrarMensagem("recoveryMessage", "Digite seu email, usuario ou telefone.", "error");
      return;
    }

    JW.mostrarLoading("Enviando codigo...");
    try {
      var resultado = await JW.chamarGoogleScript("solicitarRecuperacaoSenha", email.trim());
      JW.esconderLoading();
      JW.mostrarMensagem("recoveryMessage", (resultado && resultado.message ? resultado.message : "Codigo enviado.") + " Confira tambem a caixa de spam.", resultado && resultado.success ? "success" : "error");
      if (resultado && resultado.success) {
        JW.recoveryData.email = resultado.email || email.trim();
        JW.mostrarRecoveryStep(2);
      }
    } catch (error) {
      JW.esconderLoading();
      JW.mostrarMensagem("recoveryMessage", "Erro ao enviar codigo: " + (error.message || error), "error");
    }
  };

  JW.verificarCodigoRecuperacao = async function() {
    var codigo = (document.getElementById("codigoRecuperacaoUnico") || {}).value || "";
    if (!codigo.trim()) {
      JW.mostrarMensagem("recoveryMessage", "Digite o codigo recebido.", "error");
      return;
    }

    JW.mostrarLoading("Verificando codigo...");
    try {
      var resultado = await JW.chamarGoogleScript("verificarCodigoRecuperacao", JW.recoveryData.email, codigo.trim());
      JW.esconderLoading();
      JW.mostrarMensagem("recoveryMessage", resultado && resultado.message ? resultado.message : "Codigo verificado.", resultado && resultado.success ? "success" : "error");
      if (resultado && resultado.success) {
        JW.recoveryData.codigo = codigo.trim();
        JW.mostrarRecoveryStep(3);
      }
    } catch (error) {
      JW.esconderLoading();
      JW.mostrarMensagem("recoveryMessage", "Erro ao verificar codigo: " + (error.message || error), "error");
    }
  };

  JW.reenviarCodigo = function() {
    var emailInput = document.getElementById("recoveryEmail");
    if (emailInput && JW.recoveryData && JW.recoveryData.email) emailInput.value = JW.recoveryData.email;
    JW.mostrarRecoveryStep(1);
  };

  JW.redefinirSenha = async function() {
    var senha = (document.getElementById("novaSenha") || {}).value || "";
    var confirmacao = (document.getElementById("confirmarNovaSenha") || {}).value || "";

    JW.mostrarLoading("Redefinindo senha...");
    try {
      var resultado = await JW.chamarGoogleScript("redefinirSenha", JW.recoveryData.email, JW.recoveryData.codigo, senha, confirmacao);
      JW.esconderLoading();
      JW.mostrarMensagem("recoveryMessage", resultado && resultado.message ? resultado.message : "Senha redefinida.", resultado && resultado.success ? "success" : "error");
      if (resultado && resultado.success) {
        window.setTimeout(function() {
          JW.fecharModal("modalRecuperacao");
        }, 900);
      }
    } catch (error) {
      JW.esconderLoading();
      JW.mostrarMensagem("recoveryMessage", "Erro ao redefinir senha: " + (error.message || error), "error");
    }
  };

  JW.entrarNoSistema = function() {
    var loginScreen = document.getElementById("loginScreen");
    var mainApp = document.getElementById("mainApp");
    var sidebarUserName = document.getElementById("sidebarUserName");
    var sidebarUserRole = document.getElementById("sidebarUserRole");

    document.body.classList.add("logged-in");
    document.body.classList.toggle("admin-mode", JW.isAdmin());
    if (loginScreen) loginScreen.classList.add("d-none");
    if (mainApp) mainApp.classList.remove("d-none");
    if (sidebarUserName) sidebarUserName.textContent = JW.usuarioLogado.usuario || JW.usuarioLogado.email || "Usuario";
    if (sidebarUserRole) sidebarUserRole.textContent = JW.usuarioLogado.tipo || "Cliente";

    JW.carregarMenuDinamico();
    JW.prepararSidebarControls();
    JW.renderChatWidget();
    JW.carregarNotificacoes();
    JW.fecharNotificacoes();
    JW.abrirTab(JW.isAdmin() ? "relatorios" : "inicio");
  };

  JW.isAdmin = function() {
    return JW.usuarioLogado && JW.usuarioLogado.tipo === "Administrador";
  };

  JW.carregarMenuDinamico = function() {
    var menu = document.getElementById("dynamicMenu");
    if (!menu) return;
    if (JW.isAdmin()) {
      var html = '<a href="#" class="nav-item" data-tab="relatorios" title="Relatorios"><i class="fas fa-chart-line"></i><span>Relatorios</span></a>'
        + '<a href="#" class="nav-item" data-tab="produtos" title="Produtos"><i class="fas fa-shopping-cart"></i><span>Produtos</span></a>'
        + '<a href="#" class="nav-item" data-tab="historico" title="Historico"><i class="fas fa-history"></i><span>Historico</span></a>'
        + '<a href="#" class="nav-item" data-tab="ordem-servico" title="Pendencias"><i class="fas fa-clipboard-list"></i><span>Pendencias</span></a>';
    } else {
      var html = '<a href="#" class="nav-item" data-tab="inicio" title="Inicio"><i class="fas fa-home"></i><span>Inicio</span></a>'
        + '<a href="#" class="nav-item" data-tab="solicitar-orcamento" title="Orcamentos"><i class="fas fa-file-invoice-dollar"></i><span>Orcamentos</span></a>'
        + '<a href="#" class="nav-item" data-tab="produtos" title="Produtos"><i class="fas fa-shopping-cart"></i><span>Produtos</span></a>'
        + '<a href="#" class="nav-item" data-tab="historico" title="Historico"><i class="fas fa-history"></i><span>Historico</span></a>'
        + '<a href="#" class="nav-item" data-tab="manuais" title="Manuais"><i class="fas fa-book"></i><span>Manuais</span></a>';
    }
    menu.innerHTML = html;

    var items = menu.querySelectorAll(".nav-item");
    for (var i = 0; i < items.length; i++) {
      items[i].addEventListener("click", function(e) {
        e.preventDefault();
        JW.abrirTab(this.getAttribute("data-tab"));
      });
    }
  };

  JW.prepararSidebarControls = function() {
    if (!document.body.classList.contains("logged-in")) return;
    var container = document.querySelector(".logo-container");
    if (container && !document.getElementById("sidebarCollapseBtn")) {
      var btn = document.createElement("button");
      btn.id = "sidebarCollapseBtn";
      btn.className = "sidebar-collapse-btn";
      btn.title = "Minimizar menu";
      btn.innerHTML = '<i class="fas fa-chevron-left"></i>';
      btn.addEventListener("click", function(e) {
        e.preventDefault();
        e.stopPropagation();
        JW.toggleSidebarCollapsed();
      });
      container.appendChild(btn);
    }
    var userInfo = document.querySelector(".user-info");
    if (userInfo && !userInfo.querySelector(".profile-sidebar-icon")) {
      var profileIcon = document.createElement("div");
      profileIcon.className = "profile-sidebar-icon";
      profileIcon.title = "Abrir perfil";
      profileIcon.innerHTML = '<i class="fas fa-user-circle"></i>';
      userInfo.insertBefore(profileIcon, userInfo.firstChild);
    }
  };

  JW.toggleSidebarCollapsed = function() {
    if (window.innerWidth <= 768) return;
    document.body.classList.toggle("sidebar-collapsed");
    var icon = document.querySelector("#sidebarCollapseBtn i");
    if (icon) {
      icon.className = document.body.classList.contains("sidebar-collapsed") ? "fas fa-chevron-right" : "fas fa-chevron-left";
    }
  };

  JW.marcarMenuAtivo = function(tab) {
    var items = document.querySelectorAll(".nav-item");
    for (var i = 0; i < items.length; i++) {
      items[i].classList.toggle("active", items[i].getAttribute("data-tab") === tab);
    }
  };

  JW.abrirTab = async function(tab) {
    if (JW.navLoading) return;
    var partes = String(tab || "inicio").split("?");
    var tabBase = partes[0];
    var query = partes[1] || "";
    var navSeq = ++JW.navSeq;
    JW.navLoading = true;
    document.body.classList.add("nav-busy");
    JW.fecharNotificacoes();
    JW.marcarMenuAtivo(tabBase);
    JW.renderCarregando("Carregando conteudo...");

    try {
      if (tabBase === "inicio") await JW.carregarInicio();
      else if (tabBase === "solicitar-orcamento") JW.renderSolicitarOrcamento();
      else if (tabBase === "produtos") await JW.carregarProdutos(JW.getQueryParam(query, "produto"));
      else if (tabBase === "historico") await JW.carregarHistorico();
      else if (tabBase === "manuais") await JW.carregarManuais();
      else if (tabBase === "ordem-servico") await JW.carregarPendencias();
      else if (tabBase === "relatorios") await JW.carregarRelatorios();
      else if (tabBase === "mensagens" || tabBase === "admin") await JW.carregarMensagensDiretas();
      else JW.renderMain('<div class="card"><h3>Modulo indisponivel</h3></div>');
    } catch (error) {
      if (navSeq === JW.navSeq) JW.renderMain('<div class="card text-center"><h3>Erro ao carregar</h3><p style="color:red;">' + JW.escapeHTML(error.message || error) + '</p><button class="btn btn-primary" onclick="JW.abrirTab(' + JW.attrJs(tabBase) + ')">Tentar novamente</button></div>');
    } finally {
      if (navSeq === JW.navSeq) {
        JW.navLoading = false;
        document.body.classList.remove("nav-busy");
      }
    }
  };

  JW.getQueryParam = function(query, nome) {
    var partes = String(query || "").split("&");
    for (var i = 0; i < partes.length; i++) {
      var kv = partes[i].split("=");
      if (decodeURIComponent(kv[0] || "") === nome) return decodeURIComponent(kv[1] || "");
    }
    return "";
  };

  JW.carregarInicio = async function() {
    if (JW.isAdmin()) {
      await JW.carregarRelatorios();
      return;
    } else {
      JW.setTitulo("Inicio");
      JW.renderMain(
        '<section class="client-welcome">' +
          '<div class="client-welcome-mark"><i class="fas fa-water"></i></div>' +
          '<h2>Bem-vindo, ' + JW.escapeHTML(JW.usuarioLogado.usuario || "cliente") + '.</h2>' +
          '<p>Este e seu espaco para cuidar da piscina com mais tranquilidade. Por aqui voce acompanha solicitacoes, consulta compras, acessa manuais dos produtos e recebe avisos importantes da JW Piscinas.</p>' +
          '<p>Quando precisar de atendimento, envie um orcamento com descricao e anexo. Nossa equipe retorna com uma proposta por e-mail ou WhatsApp e todo o andamento fica registrado no seu historico.</p>' +
          '<div class="client-capabilities">' +
            '<span><i class="fas fa-file-invoice-dollar"></i> Orcamentos acompanhados</span>' +
            '<span><i class="fas fa-shopping-cart"></i> Loja com estoque atualizado</span>' +
            '<span><i class="fas fa-book"></i> Manuais e videos</span>' +
            '<span><i class="fas fa-comments"></i> Contato direto com o admin</span>' +
          '</div>' +
        '</section>'
      );

  JW.renderDashboardGraficos = function(d) {

            '<div><strong>' + JW.escapeHTML(orc) + '</strong><span>Orcamentos em aberto</span></div>' +
            '<div><strong>' + JW.escapeHTML(comp) + '</strong><span>Compras em andamento</span></div>' +

          '<div class="chart-legend"><span><i style="background:#2563eb"></i>Orcamentos ' + orc + '</span><span><i style="background:#10b981"></i>Compras ' + comp + '</span></div></div>' +

          '<h3>A receber por origem</h3>' +
          '<div class="bar-line"><span>Produtos</span><div><b style="width:' + Math.round((comprasValor / maxValor) * 100) + '%"></b></div><strong>' + JW.formatarMoeda(comprasValor) + '</strong></div>' +

  JW.getOrcamentoDraft = function() {
    try {
      return JSON.parse(localStorage.getItem("jw_orcamento_draft_" + ((JW.usuarioLogado && JW.usuarioLogado.email) || "anon")) || "{}");
    } catch (error) {
      return {};
    }
  };

  JW.salvarDraftOrcamento = function() {
    if (!JW.usuarioLogado) return;
    var dados = {
      tipoServico: (document.getElementById("orcTipo") || {}).value || "",
      descricao: (document.getElementById("orcDescricao") || {}).value || "",
      telefone: (document.getElementById("orcTelefone") || {}).value || "",
      observacoes: (document.getElementById("orcObservacoes") || {}).value || ""
    };
    localStorage.setItem("jw_orcamento_draft_" + JW.usuarioLogado.email, JSON.stringify(dados));
  };

  JW.limparDraftOrcamento = function() {
    if (JW.usuarioLogado) localStorage.removeItem("jw_orcamento_draft_" + JW.usuarioLogado.email);
  };

  JW.selecionarAnexoOrcamento = function(input) {
    var file = input && input.files && input.files[0];
    var preview = document.getElementById("orcamentoAnexoPreview");
    JW.orcamentoAnexo = null;
    if (!file) {
      if (preview) preview.classList.add("d-none");
      return;
    }
    if (file.size > 8 * 1024 * 1024) {
      JW.toast("Anexo muito grande. Use um arquivo de ate 8 MB.", "error");
      input.value = "";
      return;
    }

    var reader = new FileReader();
    reader.onload = function(e) {
      JW.orcamentoAnexo = { nome: file.name, tipo: file.type, dataUrl: e.target.result };
      var label = document.getElementById("orcAnexoLabel");
      if (label) label.textContent = file.name;
      if (preview) {
        preview.classList.remove("d-none");
        preview.innerHTML = '<i class="fas fa-paperclip"></i> ' + JW.escapeHTML(file.name) + ' <button class="btn btn-sm btn-secondary" onclick="JW.removerAnexoOrcamento()">Remover</button>';
      }
    };
    reader.readAsDataURL(file);
  };

  JW.removerAnexoOrcamento = function() {
    JW.orcamentoAnexo = null;
    var input = document.getElementById("orcAnexo");
    var preview = document.getElementById("orcamentoAnexoPreview");
    var label = document.getElementById("orcAnexoLabel");
    if (input) input.value = "";
    if (label) label.textContent = "Escolher anexo";
    if (preview) preview.classList.add("d-none");
  };

  JW.enviarOrcamento = async function() {
    var tipo = (document.getElementById("orcTipo") || {}).value || "";
    var descricao = (document.getElementById("orcDescricao") || {}).value || "";
    var telefone = (document.getElementById("orcTelefone") || {}).value || "";
    var observacoes = (document.getElementById("orcObservacoes") || {}).value || "";

    if (!tipo || !descricao || descricao.trim().length < 10) {
      JW.toast("Informe o tipo e uma descricao com pelo menos 10 caracteres.", "error");
      return;
    }

    JW.mostrarLoading(JW.orcamentoAnexo ? "Enviando anexo..." : "Enviando orcamento...");
    try {
      var anexoURL = "";
      if (JW.orcamentoAnexo && JW.orcamentoAnexo.dataUrl) {
        anexoURL = await JW.chamarGoogleScript("uploadImagemParaDrive", JW.orcamentoAnexo.dataUrl, JW.orcamentoAnexo.nome);
      }

      var resultado = await JW.chamarGoogleScript("solicitarOrcamento", {
        cliente: JW.usuarioLogado.usuario || JW.usuarioLogado.email,
        email: JW.usuarioLogado.email,
        telefone: telefone,
        tipoServico: tipo,
        descricao: descricao,
        imagemURL: anexoURL || "",
        arquivoURL: anexoURL || "",
        arquivoNome: JW.orcamentoAnexo ? JW.orcamentoAnexo.nome : "",
        observacoes: observacoes
      });
      JW.esconderLoading();

      if (resultado && resultado.success) {
        JW.toast("Orcamento recebido com sucesso. Retornaremos com uma proposta por e-mail e/ou WhatsApp.", "success");
        JW.limparDraftOrcamento();
        JW.renderSolicitarOrcamento();
      } else {
        JW.toast(resultado && resultado.message ? resultado.message : "Nao foi possivel enviar.", "error");
      }
    } catch (error) {
      JW.esconderLoading();
      JW.toast("Erro ao enviar orcamento: " + (error.message || error), "error");
    }
  };

  JW.buscarProduto = function(id) {

  JW.abrirCompraProduto = function(id) {
    var produto = JW.buscarProduto(id);
    if (!produto) return;
    JW.produtoAtual = produto;

    var nome = document.getElementById("modalProdutoNome");
    var desc = document.getElementById("modalProdutoDescricao");
    var preco = document.getElementById("modalProdutoPreco");
    var estoque = document.getElementById("modalProdutoEstoque");
    var qtd = document.getElementById("modalProdutoQuantidade");
    var imagem = document.getElementById("modalProdutoImagem");

    if (nome) nome.textContent = produto.nome || "Produto";
    if (desc) desc.textContent = produto.descricao || "";
    if (preco) preco.textContent = JW.formatarMoeda(JW.precoAtivoProduto(produto));
    if (estoque) estoque.textContent = (produto.estoque || 0) + " em estoque";
    if (qtd) {
      qtd.value = 1;
      qtd.max = produto.estoque || 1;
    }
    if (imagem) {
      imagem.innerHTML = produto.imagemURL
        ? '<img src="' + JW.escapeAttr(produto.imagemURL) + '" alt="' + JW.escapeAttr(produto.nome || "Produto") + '" style="width:100%;height:100%;object-fit:cover;border-radius:var(--radius-md);" onerror="this.parentElement.innerHTML=\'<i class=&quot;fas fa-box&quot; style=&quot;font-size:2rem;color:var(--text-muted)&quot;></i>\';">'
        : '<i class="fas fa-box" style="font-size:2rem;color:var(--text-muted)"></i>';
    }

    JW.atualizarTotalModal();
    JW.abrirModal("modalComprar");
  };

  JW.atualizarTotalModal = function() {
    var qtd = parseInt((document.getElementById("modalProdutoQuantidade") || {}).value, 10) || 1;
    var estoque = parseInt((JW.produtoAtual && JW.produtoAtual.estoque) || 1, 10) || 1;
    if (qtd < 1) qtd = 1;
    if (qtd > estoque) qtd = estoque;
    var qtdEl = document.getElementById("modalProdutoQuantidade");
    if (qtdEl) qtdEl.value = qtd;
    var total = JW.precoAtivoProduto(JW.produtoAtual) * qtd;
    var totalEl = document.getElementById("modalProdutoTotal");
    if (totalEl) totalEl.textContent = "Total: " + JW.formatarMoeda(total);

  JW.confirmarCompra = async function() {
    if (!JW.produtoAtual) return;
    var qtd = parseInt((document.getElementById("modalProdutoQuantidade") || {}).value, 10) || 1;
    var produto = JW.produtoAtual;

    JW.mostrarLoading("Registrando compra...");
    try {
      var item = {
        id: produto.id,
        nome: produto.nome,
        preco: JW.precoAtivoProduto(produto),
        quantidade: qtd
      };
      var resultado = await JW.chamarGoogleScript("registrarCompra", {
        cliente: JW.usuarioLogado.usuario || JW.usuarioLogado.email,
        email: JW.usuarioLogado.email,
        produtos: JSON.stringify([item])
      });
      JW.esconderLoading();

      if (resultado && resultado.success) {
        JW.fecharModal("modalComprar");
        JW.toast("Compra realizada com sucesso.", "success");
        await JW.carregarProdutos();
      } else {
        JW.toast(resultado && resultado.message ? resultado.message : "Nao foi possivel comprar.", "error");
      }
    } catch (error) {
      JW.esconderLoading();
      JW.toast("Erro ao comprar: " + (error.message || error), "error");
    }
  };

  JW.atualizarOrcamentoAdmin = async function(id, valor, status, obs) {
    JW.mostrarLoading("Atualizando orcamento...");
    try {
      var valorNormalizado = valor;
      if (valorNormalizado !== null && valorNormalizado !== undefined && valorNormalizado !== "") {
        valorNormalizado = String(valorNormalizado).replace("R$", "").replace(/\s/g, "");
        if (valorNormalizado.indexOf(",") !== -1) valorNormalizado = valorNormalizado.replace(/\./g, "").replace(",", ".");

      var resultado = await JW.chamarGoogleScript("aprovarOrcamento", id, valorNormalizado, status, obs);
      JW.esconderLoading();
      JW.toast(resultado && resultado.message ? resultado.message : "Orcamento atualizado.", resultado && resultado.success ? "success" : "error");
      if (resultado && resultado.success) await JW.carregarPendencias();
    } catch (error) {
      JW.esconderLoading();
      JW.toast("Erro ao atualizar orcamento: " + (error.message || error), "error");
    }
  };

  JW.chatKeyFirebase = function(email) {
    var normalizado = String(email || "").trim().toLowerCase();
    try {
      return btoa(unescape(encodeURIComponent(normalizado))).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    } catch (error) {
      return normalizado.replace(/[.#$/\[\]]/g, "_");
    }
  };

  JW.dataHoraFirebase = function(valor) {
    var data = valor ? new Date(valor) : new Date();
    if (isNaN(data.getTime())) data = new Date();
    return data.toLocaleString("pt-BR");
  };

  JW.mensagensFirebaseArray = function(valor) {
    var mensagens = [];
    valor = valor || {};
    Object.keys(valor).forEach(function(id) {
      mensagens.push(Object.assign({ id: id }, valor[id] || {}));
    });
    mensagens.sort(function(a, b) {
      return (parseInt(a.timestamp, 10) || 0) - (parseInt(b.timestamp, 10) || 0);
    });
    return mensagens.map(function(m) {
      return Object.assign({}, m, { dataHora: m.dataHora || JW.dataHoraFirebase(m.timestamp) });
    });
  };

  JW.conversasFirebaseArray = function(valor) {
    var conversas = [];
    valor = valor || {};
    Object.keys(valor).forEach(function(id) {
      conversas.push(Object.assign({ id: id }, valor[id] || {}));
    });
    conversas.sort(function(a, b) {
      return (parseInt(b.ultimaTimestamp, 10) || 0) - (parseInt(a.ultimaTimestamp, 10) || 0);
    });
    return conversas.map(function(c) {
      return Object.assign({}, c, { ultimaData: c.ultimaData || JW.dataHoraFirebase(c.ultimaTimestamp) });
    });
  };

  JW.observarConversasAdminFirebase = function(containerId) {
    if (!JW.iniciarFirebaseChat() || !JW.isAdmin()) return false;
    if (JW.firebaseChat.adminConversasRef) JW.firebaseChat.adminConversasRef.off();
    var ref = JW.firebaseChat.db.ref("jwChat/conversations");
    JW.firebaseChat.adminConversasRef = ref;
    ref.on("value", function(snapshot) {
      var conversas = JW.conversasFirebaseArray(snapshot.val());
      var totalNaoLidas = 0;
      for (var i = 0; i < conversas.length; i++) totalNaoLidas += parseInt(conversas[i].naoLidasAdmin, 10) || 0;
      var destino = document.getElementById(containerId);
      if (destino) destino.innerHTML = JW.renderConversasAdmin(conversas);
      JW.atualizarBadgeFirebase(totalNaoLidas);
    }, function(error) {
      var destino = document.getElementById(containerId);
      if (destino) destino.innerHTML = '<p class="text-muted">Nao foi possivel conectar ao Firebase.</p>';
      console.warn("Erro ao ouvir conversas Firebase:", error);
    });
    return true;
  };

  JW.observarConversaFirebase = function(clienteEmail, containerId) {
    if (!JW.iniciarFirebaseChat()) return false;
    var id = JW.chatKeyFirebase(clienteEmail);
    var refName = JW.isAdmin() ? "adminConversaRef" : "clienteConversaRef";
    if (JW.firebaseChat[refName]) JW.firebaseChat[refName].off();
    var ref = JW.firebaseChat.db.ref("jwChat/messages/" + id);

  JW.enviarMensagemFirebase = async function(dados) {
    if (!JW.iniciarFirebaseChat()) throw new Error("Firebase indisponivel.");
    dados = dados || {};
    var mensagem = String(dados.mensagem || "").trim();
    if (!mensagem) throw new Error("Digite uma mensagem.");
    var remetenteTipo = dados.remetenteTipo || "Cliente";
    var clienteEmail = String(remetenteTipo === "Administrador" ? dados.clienteEmail : dados.email || "").trim().toLowerCase();
    if (!clienteEmail) throw new Error("Cliente nao identificado.");
    var conversaId = JW.chatKeyFirebase(clienteEmail);
    var usuario = JW.usuarioLogado || {};
    var remetenteEmail = String(dados.email || usuario.email || "").trim().toLowerCase();
    var remetenteNome = dados.usuario || usuario.usuario || remetenteEmail;
    var clienteNome = dados.clienteNome || (remetenteTipo === "Administrador" ? clienteEmail : remetenteNome);
    var root = JW.firebaseChat.db.ref();
    var novaMensagemRef = root.child("jwChat/messages/" + conversaId).push();
    var agora = Date.now();
    var item = {
      id: novaMensagemRef.key,
      timestamp: firebase.database.ServerValue.TIMESTAMP,
      dataHora: JW.dataHoraFirebase(agora),
      clienteEmail: clienteEmail,
      clienteNome: clienteNome,
      remetenteEmail: remetenteEmail,
      remetenteNome: remetenteNome,
      remetenteTipo: remetenteTipo,
      mensagem: mensagem
    };
    var updates = {};
    updates["jwChat/messages/" + conversaId + "/" + novaMensagemRef.key] = item;
    updates["jwChat/conversations/" + conversaId + "/clienteEmail"] = clienteEmail;
    updates["jwChat/conversations/" + conversaId + "/clienteNome"] = clienteNome;
    updates["jwChat/conversations/" + conversaId + "/ultimaMensagem"] = mensagem;
    updates["jwChat/conversations/" + conversaId + "/ultimaData"] = JW.dataHoraFirebase(agora);
    updates["jwChat/conversations/" + conversaId + "/ultimaTimestamp"] = firebase.database.ServerValue.TIMESTAMP;
    await root.update(updates);
    var contador = remetenteTipo === "Administrador" ? "naoLidasCliente" : "naoLidasAdmin";
    await root.child("jwChat/conversations/" + conversaId + "/" + contador).transaction(function(valor) {
      return (parseInt(valor, 10) || 0) + 1;
    });
    return { success: true, message: "Mensagem enviada.", id: novaMensagemRef.key };
  };

  JW.habilitarArrasteChat = function(widget) {
    var handle = widget.querySelector("#supportChatButton");
    if (!handle || handle.dataset.dragBound) return;
    handle.dataset.dragBound = "1";
    var arrastando = false;
    var iniciou = false;
    var offsetX = 0;
    var offsetY = 0;
    var startX = 0;
    var startY = 0;

    handle.addEventListener("pointerdown", function(e) {
      if (e.button !== undefined && e.button !== 0) return;
      arrastando = true;
      iniciou = false;
      startX = e.clientX;
      startY = e.clientY;
      var rect = widget.getBoundingClientRect();
      offsetX = e.clientX - rect.left;
      offsetY = e.clientY - rect.top;
      handle.setPointerCapture && handle.setPointerCapture(e.pointerId);
    });

    handle.addEventListener("pointermove", function(e) {
      if (!arrastando) return;
      if (Math.abs(e.clientX - startX) + Math.abs(e.clientY - startY) > 8) iniciou = true;
      if (!iniciou) return;
      var x = Math.max(8, Math.min(window.innerWidth - widget.offsetWidth - 8, e.clientX - offsetX));
      var y = Math.max(8, Math.min(window.innerHeight - widget.offsetHeight - 8, e.clientY - offsetY));
      widget.style.left = x + "px";
      widget.style.top = y + "px";
      widget.style.right = "auto";
      widget.style.bottom = "auto";
      e.preventDefault();
    });

    handle.addEventListener("pointerup", function(e) {
      if (iniciou) {
        e.preventDefault();
        e.stopPropagation();
      }
      arrastando = false;
      window.setTimeout(function() { iniciou = false; }, 0);
    });
  };

        var resultadoFirebase = await JW.enviarMensagemFirebase({
          email: JW.usuarioLogado.email,
          usuario: JW.usuarioLogado.usuario,
          remetenteTipo: JW.usuarioLogado.tipo || "Cliente",
          mensagem: msg
        });
        if (campo) campo.value = "";
        JW.toast(resultadoFirebase.message || "Mensagem enviada.", "success");
      } catch (error) {
        JW.toast("Erro ao enviar mensagem: " + (error.message || error), "error");
      } finally {
        if (campo) campo.disabled = false;
      }
      return;
    }
    try {
      var resultado = await JW.chamarGoogleScript("enviarMensagemChatV3", {
        email: JW.usuarioLogado.email,
        usuario: JW.usuarioLogado.usuario,
        remetenteTipo: JW.usuarioLogado.tipo || "Cliente",
        mensagem: msg
      });
      var conversa = await JW.chamarGoogleScript("getMensagensConversaV3", JW.usuarioLogado.email);
      if (campo) campo.value = "";
      if (hist) hist.innerHTML = JW.renderMensagensChat((conversa && conversa.mensagens) || []);
      if (hist) hist.scrollTop = hist.scrollHeight;
      JW.toast(resultado && resultado.message ? resultado.message : "Mensagem enviada.", resultado && resultado.success ? "success" : "error");
    } catch (error) {
      JW.toast("Erro ao enviar mensagem: " + (error.message || error), "error");
    } finally {
      if (campo) campo.disabled = false;
    }
  };

  JW.logout = function() {
    ["adminConversasRef", "adminConversaRef", "clienteConversaRef", "clienteBadgeRef"].forEach(function(refName) {
      if (JW.firebaseChat && JW.firebaseChat[refName]) {
        JW.firebaseChat[refName].off();
        JW.firebaseChat[refName] = null;
      }
    });
    JW.usuarioLogado = null;
    document.body.classList.remove("logged-in");
    document.body.classList.remove("admin-mode");
    document.body.classList.remove("sidebar-collapsed");
    document.body.classList.remove("sidebar-open");
    var chatWidget = document.getElementById("supportChatWidget");
    if (chatWidget && chatWidget.parentNode) chatWidget.parentNode.removeChild(chatWidget);
    var loginScreen = document.getElementById("loginScreen");
    var mainApp = document.getElementById("mainApp");
    if (mainApp) mainApp.classList.add("d-none");
    if (loginScreen) loginScreen.classList.remove("d-none");
  };

  window.addEventListener("load", function() {
    var overlay = document.getElementById("loadingOverlay");
    if (overlay) overlay.classList.remove("active");

    var btnLogin = document.getElementById("btnLogin");
    var btnRegister = document.getElementById("btnRegister");
    var tabLogin = document.getElementById("tabLoginBtn");
    var tabRegister = document.getElementById("tabRegisterBtn");
    var btnLogout = document.getElementById("btnLogout");
    var loginUsuario = document.getElementById("loginUsuario");
    var loginSenha = document.getElementById("loginSenha");
    var backdrop = document.getElementById("modalBackdrop");

    if (btnLogin) {
      btnLogin.dataset.bound = "bootstrap";
      btnLogin.addEventListener("click", JW.fazerLogin);
    }
    if (btnRegister) {
      btnRegister.dataset.bound = "bootstrap";
      btnRegister.addEventListener("click", JW.fazerCadastro);
    }
    if (tabLogin) tabLogin.addEventListener("click", JW.mostrarLoginForm);
    if (tabRegister) tabRegister.addEventListener("click", JW.mostrarRegisterForm);
    if (btnLogout) btnLogout.addEventListener("click", JW.logout);
    if (loginUsuario) loginUsuario.addEventListener("keydown", function(e) { if (e.key === "Enter") JW.fazerLogin(); });
    if (loginSenha) loginSenha.addEventListener("keydown", function(e) { if (e.key === "Enter") JW.fazerLogin(); });
    if (backdrop) backdrop.addEventListener("click", function() {
      JW.fecharModalSistema();
      JW.fecharModal("modalComprar");
      JW.fecharModal("modalRecuperacao");
      JW.fecharModal("modalAlterarSenha");
    });
    document.addEventListener("click", function(e) {
      var panel = document.querySelector(".notifications-panel");
      if (panel && !panel.contains(e.target)) JW.fecharNotificacoes();
    });
  });
})();
</script>
