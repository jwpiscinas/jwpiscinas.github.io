<script>
(function() {
  window.JW = window.JW || {};

  JW.usuarioLogado = JW.usuarioLogado || null;
  JW.produtosCache = [];
  JW.manuaisCache = [];
  JW.notificacoes = [];
  JW.produtoAtual = null;
  JW.orcamentoAnexo = null;
  JW.orcamentoAnexos = [];
  JW.relatorioDados = null;
  JW.financeiroDados = null;
  JW.financeiroView = JW.financeiroView || "pendencias";
  JW.financeiroBusca = JW.financeiroBusca || "";
  JW.navLoading = false;
  JW.navSeq = 0;
  JW.activeTab = "";
  JW.activeTabKey = "";
  JW.dataCache = {};
  JW.dataCacheMeta = {};
  JW.dataCacheInflight = {};
  JW.tabHtmlCache = {};
  JW.backgroundTasksStarted = false;
  JW.cacheTtlMs = {
    resumoCliente: 120000,
    historico: 120000,
    produtos: 180000,
    manuais: 180000,
    pendencias: 60000,
    financeiro: 60000,
    relatorios: 60000,
    historicoNotificacoesAdmin: 60000,
    telefonesAutorizados: 60000
  };
  JW.produtoFiltro = "Todos";
  JW.manualFiltro = "Todos";
  JW.chatClienteAtual = "";
  JW.historicoFiltro = "Todos";
  JW.historicoItens = [];
  JW.relatorioSelecionado = "";
  JW.lojaSuspensa = true;
  JW.deferredInstallPrompt = null;
  JW.pwaInicializado = false;
  JW.conversasAdminCache = [];
  JW.chatBuscaAdmin = "";
  JW.chatTypingTimers = {};
  JW.audioRecorder = null;
  JW.audioChunks = [];
  JW.audioRecordingStream = null;
  JW.audioRecordingStartedAt = 0;
  JW.audioRecordingTimer = null;
  JW.audioRecordingContext = "";
  JW.audioRecordingLocked = false;
  JW.audioRecordingPointerId = null;
  JW.audioRecordingStartX = 0;
  JW.pwaPopupMostrado = false;
  JW.pwaPopupDispensado = false;
  JW.historicoNotificacoesAdmin = [];
  JW.chatMensagemDetalhes = {};
  JW.chatMensagemDetalhesSeq = 0;
  JW.relatorioFinanceiroDados = null;
  JW.orcamentosPendentesCache = [];
  JW.comprasPendentesCache = [];
  JW.chatFiltroAdmin = "todas";
  JW.chatAdminMobileView = "lista";
  JW.chatFavoritosAdmin = null;
  JW.financeiroItemImagem = null;
  JW.ambientMusic = {
    initialized: false,
    context: null,
    masterGain: null,
    compressor: null,
    voices: [],
    chordTimer: null,
    chordIndex: 0,
    volume: 0.35,
    muted: false,
    pendingUnlock: false,
    unlockHandler: null,
    lastNonZeroVolume: 0.35
  };
  JW.AMBIENT_MUSIC_VOLUME_KEY = "jwAmbientMusicVolume";
  JW.AMBIENT_MUSIC_MUTED_KEY = "jwAmbientMusicMuted";
  JW.AMBIENT_MUSIC_STEP = 0.1;

  JW.escapeHTML = function(valor) {
    if (valor === null || valor === undefined) return "";
    return String(valor)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  };

  JW.escapeAttr = JW.escapeHTML;

  JW.attrJs = function(valor) {
    return JW.escapeAttr(JSON.stringify(String(valor === null || valor === undefined ? "" : valor)));
  };

  JW.getLogoDataUri = function() {
    return window.JW_LOGO_DATA_URI || "";
  };

  JW.logoImgHtml = function(classe) {
    var logo = JW.getLogoDataUri();
    return logo ? '<img class="' + JW.escapeAttr(classe || "chat-panel-logo") + '" src="' + JW.escapeAttr(logo) + '" alt="JW Piscinas">' : '<i class="fas fa-water"></i>';
  };

  JW.logoAvatarHtml = function(classe) {
    var logo = JW.getLogoDataUri();
    return '<span class="' + JW.escapeAttr(classe || "chat-avatar chat-avatar-logo") + '">' +
      (logo ? '<img src="' + JW.escapeAttr(logo) + '" alt="JW Piscinas">' : '<i class="fas fa-water"></i>') +
    '</span>';
  };

  JW.iconAvatarHtml = function(iconClass, classe) {
    return '<span class="' + JW.escapeAttr(classe || "chat-avatar") + '">' +
      '<i class="' + JW.escapeAttr(iconClass || "fas fa-comment-dots") + '"></i>' +
    '</span>';
  };

  JW.nomeExibicaoChat = function(nome, email, fallback) {
    var texto = String(nome || "").trim();
    if (!texto) texto = String(email || fallback || "Usuario").trim();
    if (texto.indexOf("@") !== -1) texto = texto.split("@")[0];
    return texto || "Usuario";
  };

  JW.inicialNomeChat = function(nome, email, fallback) {
    var texto = JW.nomeExibicaoChat(nome, email, fallback).replace(/[^A-Za-zÀ-ÿ0-9 ]/g, "").trim();
    return (texto.charAt(0) || "U").toUpperCase();
  };

  JW.avatarChatHtml = function(nome, email, classe, fallback) {
    return '<span class="' + JW.escapeAttr(classe || "chat-avatar") + '">' + JW.escapeHTML(JW.inicialNomeChat(nome, email, fallback)) + '</span>';
  };

  JW.isMobileLayout = function() {
    return window.innerWidth <= 768;
  };

  JW.storageGetJson = function(chave, fallback) {
    try {
      var bruto = window.localStorage ? window.localStorage.getItem(chave) : "";
      return bruto ? JSON.parse(bruto) : fallback;
    } catch (error) {
      return fallback;
    }
  };

  JW.storageSetJson = function(chave, valor) {
    try {
      if (window.localStorage) window.localStorage.setItem(chave, JSON.stringify(valor));
    } catch (error) {}
  };

  JW.getFavoritosChatAdminKey = function() {
    var email = (JW.usuarioLogado && JW.usuarioLogado.email ? String(JW.usuarioLogado.email) : "anon").toLowerCase();
    return "jw_chat_favoritos_admin_" + email;
  };

  JW.getFavoritosChatAdmin = function() {
    if (!JW.chatFavoritosAdmin) {
      JW.chatFavoritosAdmin = JW.storageGetJson(JW.getFavoritosChatAdminKey(), null);
      if (!JW.chatFavoritosAdmin) JW.chatFavoritosAdmin = JW.storageGetJson("jw_chat_favoritos_admin", {});
    }
    return JW.chatFavoritosAdmin || {};
  };

  JW.isFavoritoChatAdmin = function(email) {
    var favoritos = JW.getFavoritosChatAdmin();
    return !!favoritos[String(email || "").toLowerCase()];
  };

  JW.toggleFavoritoChatAdmin = function(email, event) {
    if (event) {
      event.preventDefault();
      event.stopPropagation();
    }
    var chave = String(email || "").toLowerCase();
    if (!chave) return;
    var favoritos = JW.getFavoritosChatAdmin();
    if (favoritos[chave]) delete favoritos[chave];
    else favoritos[chave] = Date.now();
    JW.chatFavoritosAdmin = favoritos;
    JW.storageSetJson(JW.getFavoritosChatAdminKey(), favoritos);
    JW.storageSetJson("jw_chat_favoritos_admin", favoritos);
    var lista = document.getElementById("adminConversasFirebase");
    if (lista) lista.innerHTML = JW.renderConversasAdmin(JW.conversasAdminCache || []);
    var painel = document.getElementById("adminChatPanel");
    if (painel && JW.chatClienteAtual) {
      var nomeAtual = "";
      for (var i = 0; i < (JW.conversasAdminCache || []).length; i++) {
        if (String((JW.conversasAdminCache[i] || {}).clienteEmail || "") === String(JW.chatClienteAtual || "")) {
          nomeAtual = (JW.conversasAdminCache[i] || {}).clienteNome || "";
          break;
        }
      }
      var hist = document.getElementById("chatHistoryAdmin");
      painel.innerHTML = JW.renderAdminChatPainel(JW.chatClienteAtual, nomeAtual || JW.chatClienteAtual, []);
      if (hist) {
        var destino = document.getElementById("chatHistoryAdmin");
        if (destino) destino.innerHTML = hist.innerHTML;
      }
    }
  };

  JW.setFiltroConversasAdmin = function(filtro) {
    JW.chatFiltroAdmin = filtro || "todas";
    var lista = document.getElementById("adminConversasFirebase");
    if (lista) lista.innerHTML = JW.renderConversasAdmin(JW.conversasAdminCache || []);
    var botoes = document.querySelectorAll(".admin-chat-filter");
    for (var i = 0; i < botoes.length; i++) botoes[i].classList.toggle("active", botoes[i].getAttribute("data-filter") === JW.chatFiltroAdmin);
  };

  JW.resumirTexto = function(texto, limite) {
    texto = String(texto || "").trim();
    limite = limite || 80;
    return texto.length > limite ? texto.slice(0, limite - 1) + "…" : texto;
  };

  JW.somenteData = function(valor) {
    var texto = String(valor || "").trim();
    if (!texto) return "";
    var match = texto.match(/(\d{2}\/\d{2}\/\d{4})/);
    if (match) return match[1];
    var iso = texto.match(/(\d{4})-(\d{2})-(\d{2})/);
    if (iso) return iso[3] + "/" + iso[2] + "/" + iso[1];
    return texto;
  };

  JW.normalizarTextoComparacao = function(valor) {
    return String(valor || "")
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/\s+/g, " ")
      .trim()
      .toLowerCase();
  };

  JW.historicoTipoClasse = function(tipo) {
    var texto = JW.normalizarTextoComparacao(tipo || "registro");
    if (texto.indexOf("orc") !== -1) return "history-tone-orcamento";
    if (texto.indexOf("compra") !== -1) return "history-tone-compra";
    if (texto.indexOf("mensal") !== -1) return "history-tone-mensalidade";
    if (texto.indexOf("cobr") !== -1) return "history-tone-cobranca";
    if (texto.indexOf("serv") !== -1) return "history-tone-servico";
    if (texto.indexOf("chat") !== -1) return "history-tone-chat";
    return "history-tone-geral";
  };

  JW.formatarTipoHistorico = function(tipo) {
    var texto = String(tipo || "Registro").trim();
    if (!texto) return "Registro";
    return texto;
  };

  JW.historicoDescricaoPrincipal = function(item) {
    var descricao = String((item && item.descricao) || "").trim();
    var observacoes = String((item && item.observacoes) || "").trim();
    if (!descricao && observacoes) return observacoes;
    return descricao;
  };

  JW.historicoObservacaoSecundaria = function(item) {
    var descricao = JW.normalizarTextoComparacao((item && item.descricao) || "");
    var observacoesBrutas = String((item && item.observacoes) || "").trim();
    var observacoes = JW.normalizarTextoComparacao(observacoesBrutas);
    if (!observacoesBrutas) return "";
    if (!descricao) return observacoesBrutas;
    if (observacoes === descricao) return "";
    if (observacoes.indexOf(descricao) !== -1) return "";
    return observacoesBrutas;
  };

  JW.obterUrlsAnexos = function(item) {
    var urls = [];
    function adicionar(valor) {
      String(valor || "")
        .split(/\r?\n|\s*\|\s*|,\s*/g)
        .map(function(parte) { return String(parte || "").trim(); })
        .filter(Boolean)
        .forEach(function(url) {
          if (urls.indexOf(url) === -1) urls.push(url);
        });
    }
    adicionar(item && item.imagemURL);
    adicionar(item && item.arquivoURL);
    return urls;
  };

  JW.renderBotoesAnexos = function(item, rotulo) {
    var urls = JW.obterUrlsAnexos(item);
    if (!urls.length) return "";
    var html = '<div class="history-attachments">';
    for (var i = 0; i < urls.length; i++) {
      html += '<button class="btn btn-sm btn-secondary" onclick="window.open(' + JW.attrJs(urls[i]) + ', ' + JW.attrJs("_blank") + ')"><i class="fas fa-paperclip"></i> ' + JW.escapeHTML((rotulo || "Anexo") + " " + (i + 1)) + '</button>';
    }
    return html + '</div>';
  };

  JW.timestampConversaAdmin = function(conversa) {
    if (conversa && conversa.ultimaTimestamp) {
      var ts = parseInt(conversa.ultimaTimestamp, 10);
      if (!isNaN(ts)) return ts;
    }
    var texto = String((conversa && conversa.ultimaData) || "").trim();
    var m = texto.match(/^(\d{2})\/(\d{2})\/(\d{4}),?\s+(\d{2}):(\d{2})(?::(\d{2}))?$/);
    if (m) return new Date(parseInt(m[3], 10), parseInt(m[2], 10) - 1, parseInt(m[1], 10), parseInt(m[4], 10), parseInt(m[5], 10), parseInt(m[6] || "0", 10)).getTime();
    var data = Date.parse(texto);
    return isNaN(data) ? 0 : data;
  };

  JW.getConversasAdminFiltradas = function(conversas) {
    var busca = JW.chatBuscaAdmin || "";
    var filtro = JW.chatFiltroAdmin || "todas";
    var favoritos = JW.getFavoritosChatAdmin();
    var lista = (conversas || []).slice();
    lista = lista.filter(function(c) {
      var textoBusca = String((c.clienteNome || "") + " " + (c.clienteEmail || "") + " " + (c.ultimaMensagem || "")).toLowerCase();
      if (busca && textoBusca.indexOf(busca) === -1) return false;
      var naoLidas = parseInt(c.naoLidasAdmin, 10) || 0;
      var favorito = !!favoritos[String(c.clienteEmail || "").toLowerCase()];
      if (filtro === "favoritas") return favorito;
      if (filtro === "nao-lidas") return naoLidas > 0;
      if (filtro === "lidas") return naoLidas === 0;
      return true;
    });
    lista.sort(function(a, b) {
      var favA = favoritos[String((a && a.clienteEmail) || "").toLowerCase()] || 0;
      var favB = favoritos[String((b && b.clienteEmail) || "").toLowerCase()] || 0;
      if (favA && favB) return favA - favB;
      if (favA) return -1;
      if (favB) return 1;
      return JW.timestampConversaAdmin(b) - JW.timestampConversaAdmin(a);
    });
    return lista;
  };

  JW.tratarImagemProdutoFinanceiro = function(arquivo, callback) {
    if (!arquivo) {
      callback("");
      return;
    }
    if (!String(arquivo.type || "").match(/^image\//i)) {
      JW.toast("Selecione uma imagem v&aacute;lida.", "error");
      callback("");
      return;
    }
    if (arquivo.size > 8 * 1024 * 1024) {
      JW.toast("A imagem deve ter at&eacute; 8 MB.", "error");
      callback("");
      return;
    }

    var leitor = new FileReader();
    leitor.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var maxLado = 720;
        var largura = img.width || maxLado;
        var altura = img.height || maxLado;
        if (largura > altura && largura > maxLado) {
          altura = Math.round((altura / largura) * maxLado);
          largura = maxLado;
        } else if (altura >= largura && altura > maxLado) {
          largura = Math.round((largura / altura) * maxLado);
          altura = maxLado;
        }
        var canvas = document.createElement("canvas");
        canvas.width = largura;
        canvas.height = altura;
        var ctx = canvas.getContext("2d");
        if (!ctx) {
          callback(e.target.result || "");
          return;
        }
        ctx.drawImage(img, 0, 0, largura, altura);
        callback(canvas.toDataURL("image/jpeg", 0.76));
      };
      img.onerror = function() {
        callback(e.target.result || "");
      };
      img.src = e.target.result || "";
    };
    leitor.onerror = function() {
      JW.toast("N&atilde;o foi poss&iacute;vel ler a imagem.", "error");
      callback("");
    };
    leitor.readAsDataURL(arquivo);
  };

  JW.selecionarImagemItemFinanceiro = function(input) {
    var arquivo = input && input.files && input.files[0];
    var preview = document.getElementById("financeiroItemImagemPreview");
    var legenda = document.getElementById("financeiroItemImagemLabel");
    JW.financeiroItemImagem = null;
    if (!arquivo) {
      if (preview) preview.innerHTML = "";
      if (legenda) legenda.textContent = "Selecionar imagem";
      return;
    }
    if (legenda) legenda.textContent = arquivo.name;
    JW.tratarImagemProdutoFinanceiro(arquivo, function(dataUrl) {
      JW.financeiroItemImagem = dataUrl || null;
      if (preview) {
        preview.innerHTML = dataUrl
          ? '<img src="' + JW.escapeAttr(dataUrl) + '" alt="Pr&eacute;via do produto"><button class="btn btn-sm btn-secondary" type="button" onclick="JW.removerImagemItemFinanceiro()">Remover</button>'
          : '<span class="text-muted">Imagem n&atilde;o dispon&iacute;vel.</span>';
      }
    });
  };

  JW.removerImagemItemFinanceiro = function() {
    JW.financeiroItemImagem = null;
    var input = document.getElementById("financeiroItemImagem");
    var preview = document.getElementById("financeiroItemImagemPreview");
    var legenda = document.getElementById("financeiroItemImagemLabel");
    if (input) input.value = "";
    if (preview) preview.innerHTML = "";
    if (legenda) legenda.textContent = "Selecionar imagem";
  };

  JW.getInfoPlataformaPWA = function() {
    var ua = (window.navigator && window.navigator.userAgent) || "";
    var isAndroid = /Android/i.test(ua);
    var isIOS = /iPhone|iPad|iPod/i.test(ua);
    var isSafari = /^((?!chrome|android).)*safari/i.test(ua);
    return {
      android: isAndroid,
      ios: isIOS,
      safariIOS: isIOS && isSafari,
      mobile: isAndroid || isIOS
    };
  };

  JW.usandoShellFirebase_ = function() {
    return /(?:\?|&)host=firebase(?:&|$)/.test(window.location.search || "");
  };

  JW.removerPopupInstalarPWA = function() {
    var popup = document.getElementById("pwaInstallFloating");
    if (popup && popup.parentNode) popup.parentNode.removeChild(popup);
  };

  JW.dispensarPopupInstalarPWA = function() {
    JW.pwaPopupDispensado = true;
    JW.removerPopupInstalarPWA();
  };

  JW.conteudoPopupInstalarPWA = function() {
    var plataforma = JW.getInfoPlataformaPWA();
    var podeInstalar = !!JW.deferredInstallPrompt;
    if (plataforma.ios) {
      return '<div class="pwa-install-stack"><div class="pwa-install-card pwa-install-card-secondary">' +
        '<div class="pwa-install-callout compact">' +
          JW.iconAvatarHtml("fas fa-mobile-alt", "pwa-install-icon") +
          '<div><strong>Instalar JW Piscinas</strong><p>Use o Safari para adicionar este sistema à tela inicial do iPhone.</p></div>' +
        '</div>' +
        '<div class="pwa-ios-guide">' +
          '<strong>SAFARI NO IPHONE</strong>' +
          '<p>Para usar como app no iPhone, abra este sistema no <b>Safari</b>, toque em <b>Compartilhar</b> e depois em <b>Adicionar à Tela de Início</b>.</p>' +
        '</div>' +
        '<div class="modal-actions pwa-install-actions">' +
          '<button class="btn btn-secondary" onclick="JW.dispensarPopupInstalarPWA()">Entendi</button>' +
        '</div>' +
      '</div></div>';
    }

    var destaqueAndroid = plataforma.android
      ? '<div class="pwa-platform-badge"><i class="fab fa-android"></i><span>ANDROID</span><small>Toque em instalar para adicionar o app à tela inicial.</small></div>'
      : '';
    var acoes = podeInstalar
      ? '<button class="btn btn-primary" onclick="JW.instalarPWA()"><i class="fas fa-download"></i> Instalar</button>'
      : '<button class="btn btn-secondary" onclick="JW.dispensarPopupInstalarPWA()">Entendi</button>';
    return '<div class="pwa-install-stack"><div class="pwa-install-card">' +
      '<div class="pwa-install-callout compact">' +
        JW.iconAvatarHtml("fas fa-download", "pwa-install-icon") +
        '<div><strong>Instalar JW Piscinas</strong><p>Abra o sistema como aplicativo para entrar mais rápido no dia a dia.</p></div>' +
      '</div>' +
      destaqueAndroid +
      '<div class="modal-actions pwa-install-actions">' +
        acoes +
      '</div>' +
    '</div></div>';
  };

  JW.aplicarLogoSistema = function() {
    var logo = JW.getLogoDataUri();
    if (!logo) return;
    var imagens = document.querySelectorAll("[data-jw-logo]");
    for (var i = 0; i < imagens.length; i++) {
      imagens[i].src = logo;
      imagens[i].classList.add("has-image");
      var caixa = imagens[i].closest(".jw-logo");
      if (caixa) caixa.classList.add("has-image");
    }
  };

  JW.inicializarPWA = function() {
    if (JW.pwaInicializado) return;
    JW.pwaInicializado = true;
    JW.aplicarLogoSistema();

    if (JW.usandoShellFirebase_()) {
      JW.atualizarBotoesInstalarPWA(false);
    }

    window.addEventListener("beforeinstallprompt", function(event) {
      event.preventDefault();
      JW.deferredInstallPrompt = event;
      JW.atualizarBotoesInstalarPWA(true);
      JW.removerPopupInstalarPWA();
    });

    window.addEventListener("appinstalled", function() {
      JW.deferredInstallPrompt = null;
      JW.atualizarBotoesInstalarPWA(false);
      JW.removerPopupInstalarPWA();
      JW.toast("Aplicativo JW Piscinas instalado.", "success");
    });

    JW.criarManifestPWA();
    JW.registrarServiceWorkerPWA();
    window.setTimeout(function() {
      JW.mostrarPopupInstalarPWA(false);
    }, 1200);
  };

  JW.atualizarBotoesInstalarPWA = function(mostrar) {
    var ids = ["btnInstallPwaLogin", "btnInstallPwaHeader"];
    for (var i = 0; i < ids.length; i++) {
      var btn = document.getElementById(ids[i]);
      if (btn) btn.classList.toggle("d-none", !mostrar);
    }
  };

  JW.criarManifestPWA = function() {
    try {
      var logo = JW.getLogoDataUri();
      var manifest = {
        name: "JW Piscinas",
        short_name: "JW Piscinas",
        start_url: window.location.href.split("#")[0],
        scope: "./",
        display: "standalone",
        background_color: "#ffffff",
        theme_color: "#0077B6",
        icons: logo ? [
          { src: logo, sizes: "192x192", type: "image/png", purpose: "any maskable" },
          { src: logo, sizes: "512x512", type: "image/png", purpose: "any maskable" }
        ] : []
      };
      var blob = new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" });
      var link = document.querySelector('link[rel="manifest"]') || document.createElement("link");
      link.rel = "manifest";
      link.href = URL.createObjectURL(blob);
      document.head.appendChild(link);
      var theme = document.querySelector('meta[name="theme-color"]') || document.createElement("meta");
      theme.name = "theme-color";
      theme.content = "#0077B6";
      document.head.appendChild(theme);
    } catch (error) {
      console.warn("Manifest PWA indisponivel:", error);
    }
  };

  JW.registrarServiceWorkerPWA = function() {

  JW.chamarGoogleScript = function(funcao) {
    var args = Array.prototype.slice.call(arguments, 1);
    return new Promise(function(resolve, reject) {
      if (!window.google || !google.script || !google.script.run) {
        reject(new Error("google.script.run não está disponível. Abra pela URL do Web App implantado."));
        return;
      }
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(function(error) {
          reject(error || new Error("Falha ao chamar " + funcao));
        })
        [funcao].apply(null, args);
    });
  };

  JW.getTabCacheKey_ = function(tab) {
    return String(tab || "inicio");
  };

  JW.getCacheValido_ = function(chave, ttlMs) {
    var meta = JW.dataCacheMeta[chave];
    if (!meta || !Object.prototype.hasOwnProperty.call(JW.dataCache, chave)) return undefined;
    if (ttlMs && Date.now() - meta.timestamp > ttlMs) return undefined;
    return JW.dataCache[chave];
  };

  JW.temCacheValido_ = function(chave, ttlMs) {
    return JW.getCacheValido_(chave, ttlMs) !== undefined;
  };

  JW.setCache_ = function(chave, valor) {
    JW.dataCache[chave] = valor;
    JW.dataCacheMeta[chave] = { timestamp: Date.now() };
    return valor;
  };

  JW.invalidateCache_ = function(prefixo) {
    var prefixoTexto = String(prefixo || "");
    var chaves = Object.keys(JW.dataCache);
    for (var i = 0; i < chaves.length; i++) {
      if (!prefixoTexto || chaves[i].indexOf(prefixoTexto) === 0) delete JW.dataCache[chaves[i]];
    }
    chaves = Object.keys(JW.dataCacheMeta);
    for (var j = 0; j < chaves.length; j++) {
      if (!prefixoTexto || chaves[j].indexOf(prefixoTexto) === 0) delete JW.dataCacheMeta[chaves[j]];
    }
    chaves = Object.keys(JW.dataCacheInflight);
    for (var k = 0; k < chaves.length; k++) {
      if (!prefixoTexto || chaves[k].indexOf(prefixoTexto) === 0) delete JW.dataCacheInflight[chaves[k]];
    }
  };

  JW.invalidateTabHtmlCache_ = function(prefixo) {
    var prefixoTexto = String(prefixo || "");
    var chaves = Object.keys(JW.tabHtmlCache);
    for (var i = 0; i < chaves.length; i++) {
      if (!prefixoTexto || chaves[i] === prefixoTexto || chaves[i].indexOf(prefixoTexto + "?") === 0) {
        delete JW.tabHtmlCache[chaves[i]];
      }
    }
  };

  JW.resetNavigationCaches_ = function() {
    JW.dataCache = {};
    JW.dataCacheMeta = {};
    JW.dataCacheInflight = {};
    JW.tabHtmlCache = {};
    JW.activeTab = "";
    JW.activeTabKey = "";
    JW.backgroundTasksStarted = false;
  };

  JW.fetchComCache_ = function(chave, ttlMs, loader, opcoes) {
    opcoes = opcoes || {};
    if (!opcoes.force) {
      var cached = JW.getCacheValido_(chave, ttlMs);
      if (cached !== undefined) return Promise.resolve(cached);
      if (JW.dataCacheInflight[chave]) return JW.dataCacheInflight[chave];
    }

    var promise = Promise.resolve()
      .then(loader)
      .then(function(valor) {
        JW.setCache_(chave, valor);
        delete JW.dataCacheInflight[chave];
        return valor;
      })
      .catch(function(error) {
        delete JW.dataCacheInflight[chave];
        throw error;
      });

    JW.dataCacheInflight[chave] = promise;
    return promise;
  };

  JW.invalidateModuleCaches_ = function(modulos) {
    var lista = Array.isArray(modulos) ? modulos : [modulos];
    var tabsPorModulo = {
      resumoCliente: ["inicio"],
      historico: ["historico", "inicio"],
      produtos: ["produtos", "comunicacao", "mensagens", "admin"],
      manuais: ["manuais"],
      pendencias: ["ordem-servico", "relatorios"],
      financeiro: ["financeiro", "relatorios"],
      relatorios: ["relatorios", "inicio"],
      historicoNotificacoesAdmin: ["comunicacao", "mensagens", "admin"],
      telefonesAutorizados: ["comunicacao", "mensagens", "admin"]
    };

    for (var i = 0; i < lista.length; i++) {
      var modulo = String(lista[i] || "");
      if (!modulo) continue;
      JW.invalidateCache_(modulo);
      var tabs = tabsPorModulo[modulo] || [];
      for (var j = 0; j < tabs.length; j++) JW.invalidateTabHtmlCache_(tabs[j]);
    }
  };

  JW.temDadosAquecidosParaAba_ = function(tabBase) {
    var email = JW.usuarioLogado && JW.usuarioLogado.email ? JW.usuarioLogado.email : "";
    if (tabBase === "solicitar-orcamento" || tabBase === "chat") return true;
    if (tabBase === "inicio") {
      return JW.isAdmin()
        ? JW.temCacheValido_("relatorios", JW.cacheTtlMs.relatorios) || JW.temCacheValido_("financeiro", JW.cacheTtlMs.financeiro)
        : JW.temCacheValido_("resumoCliente:" + email, JW.cacheTtlMs.resumoCliente);
    }
    if (tabBase === "produtos") return JW.temCacheValido_("produtos", JW.cacheTtlMs.produtos);
    if (tabBase === "historico") return JW.temCacheValido_("historico:" + email, JW.cacheTtlMs.historico);
    if (tabBase === "manuais") return JW.temCacheValido_("manuais", JW.cacheTtlMs.manuais);
    if (tabBase === "ordem-servico") return JW.temCacheValido_("pendencias", JW.cacheTtlMs.pendencias);
    if (tabBase === "financeiro") return JW.temCacheValido_("financeiro", JW.cacheTtlMs.financeiro);
    if (tabBase === "relatorios") return JW.temCacheValido_("relatorios", JW.cacheTtlMs.relatorios);
    if (tabBase === "comunicacao" || tabBase === "mensagens" || tabBase === "admin") {
      return JW.temCacheValido_("produtos", JW.cacheTtlMs.produtos) &&
        JW.temCacheValido_("historicoNotificacoesAdmin", JW.cacheTtlMs.historicoNotificacoesAdmin) &&
        JW.temCacheValido_("telefonesAutorizados", JW.cacheTtlMs.telefonesAutorizados);
    }
    return false;
  };

  JW.formatarTelefone = function(input) {
    if (!input) return;
    var numeros = input.value.replace(/\D/g, "").slice(0, 11);
    if (numeros.length > 10) {
      input.value = numeros.replace(/^(\d{2})(\d{5})(\d{0,4}).*/, "($1) $2-$3");
    } else if (numeros.length > 6) {
      input.value = numeros.replace(/^(\d{2})(\d{4})(\d{0,4}).*/, "($1) $2-$3");
    } else if (numeros.length > 2) {
      input.value = numeros.replace(/^(\d{2})(\d{0,5}).*/, "($1) $2");
    } else {
      input.value = numeros;
    }
  };

  JW.sincronizarControlesMusicaAmbiente_ = function() {
    var state = JW.ambientMusic || {};
    var volumeReal = state.muted ? 0 : state.volume;
    var porcentagem = Math.round(volumeReal * 100);
    var range = document.getElementById("ambientMusicVolumeRange");
    var label = document.getElementById("ambientMusicVolumeLabel");
    var muteLabel = document.getElementById("ambientMusicMuteLabel");
    var muteIcon = document.getElementById("ambientMusicMuteIcon");
    var headerIcon = document.getElementById("ambientMusicHeaderIcon");
    var muteBtn = document.getElementById("ambientMusicMuteBtn");

    if (range) range.value = String(porcentagem);
    if (label) label.textContent = porcentagem + "%";
    if (muteLabel) muteLabel.textContent = state.muted ? "Ativar" : "Mutar";
    if (muteBtn) muteBtn.classList.toggle("btn-primary", !state.muted);
    if (muteBtn) muteBtn.classList.toggle("btn-secondary", !!state.muted);

    var iconClass = state.muted || porcentagem === 0
      ? "fas fa-volume-xmark"
      : (porcentagem <= 40 ? "fas fa-volume-low" : "fas fa-volume-high");

    if (muteIcon) muteIcon.className = iconClass;
    if (headerIcon) headerIcon.className = iconClass;
  };

  JW.aplicarVolumeMusicaAmbiente_ = function() {
    var state = JW.ambientMusic;
    if (!state || !state.masterGain || !state.context) {
      JW.sincronizarControlesMusicaAmbiente_();
      return;
    }

    var now = state.context.currentTime;
    var destino = state.muted ? 0.00001 : Math.max(0.00001, state.volume * 0.14);
    state.masterGain.gain.cancelScheduledValues(now);
    state.masterGain.gain.setTargetAtTime(destino, now, 0.6);

    JW.salvarStorageMusicaAmbiente_(JW.AMBIENT_MUSIC_VOLUME_KEY, String(state.volume));
    JW.salvarStorageMusicaAmbiente_(JW.AMBIENT_MUSIC_MUTED_KEY, state.muted ? "1" : "0");
    JW.sincronizarControlesMusicaAmbiente_();
  };

  JW.aplicarChordMusicaAmbiente_ = function(indice) {
    var state = JW.ambientMusic;
    if (!state || !state.voices || !state.voices.length || !state.context) return;

    var progressao = [
      [220.0, 261.63, 329.63],
      [196.0, 246.94, 293.66],
      [174.61, 220.0, 261.63],
      [196.0, 233.08, 293.66]
    ];
    var intensidades = [0.55, 0.38, 0.28];
    var chord = progressao[indice % progressao.length];
    var now = state.context.currentTime;

    for (var i = 0; i < state.voices.length; i++) {
      var voice = state.voices[i];
      var frequency = chord[i % chord.length];
      voice.osc.frequency.cancelScheduledValues(now);
      voice.osc.frequency.setTargetAtTime(frequency, now, 2.2);
      voice.gain.gain.cancelScheduledValues(now);
      voice.gain.gain.setTargetAtTime(intensidades[i % intensidades.length], now, 1.8);
    }

    state.chordIndex = (indice + 1) % progressao.length;
  };

  JW.prepararLoopMusicaAmbiente_ = function() {
    var state = JW.ambientMusic;
    if (!state || state.chordTimer) return;

    JW.aplicarChordMusicaAmbiente_(state.chordIndex || 0);
    state.chordTimer = window.setInterval(function() {
      JW.aplicarChordMusicaAmbiente_(state.chordIndex || 0);
    }, 12000);
  };

  JW.removerUnlockMusicaAmbiente_ = function() {
    var state = JW.ambientMusic;
    if (!state || !state.unlockHandler) return;

    document.removeEventListener("pointerdown", state.unlockHandler, true);
    document.removeEventListener("keydown", state.unlockHandler, true);
    state.unlockHandler = null;
    state.pendingUnlock = false;
  };

  JW.prepararUnlockMusicaAmbiente_ = function() {
    var state = JW.ambientMusic;
    if (!state || state.unlockHandler) return;

    state.pendingUnlock = true;
    state.unlockHandler = function() {
      JW.tentarAtivarMusicaAmbiente_();
    };

    document.addEventListener("pointerdown", state.unlockHandler, true);
    document.addEventListener("keydown", state.unlockHandler, true);
    JW.atualizarStatusMusicaAmbiente_("Toque em qualquer lugar para ativar o audio.");
  };

  JW.tentarAtivarMusicaAmbiente_ = function() {
    var state = JW.ambientMusic;
    if (!state || !state.context) return;

    state.context.resume().then(function() {
      JW.prepararLoopMusicaAmbiente_();
      JW.aplicarVolumeMusicaAmbiente_();
      JW.removerUnlockMusicaAmbiente_();
      JW.atualizarStatusMusicaAmbiente_(state.muted ? "Musica mutada." : "Musica ambiente tocando.");
    }).catch(function() {
      JW.prepararUnlockMusicaAmbiente_();
    });
  };

  JW.inicializarMusicaAmbiente = function() {
    var painel = document.getElementById("ambientMusicPanel");
    if (!JW.usuarioLogado || !painel) return;

    var state = JW.ambientMusic;
    if (!state.initialized) {
      var AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) {
        JW.atualizarStatusMusicaAmbiente_("Audio ambiente indisponivel neste navegador.");
        return;
      }

      var volumeSalvo = parseFloat(JW.lerStorageMusicaAmbiente_(JW.AMBIENT_MUSIC_VOLUME_KEY, "0.35"));
      if (!isNaN(volumeSalvo)) state.volume = Math.min(1, Math.max(0, volumeSalvo));
      state.muted = JW.lerStorageMusicaAmbiente_(JW.AMBIENT_MUSIC_MUTED_KEY, "0") === "1";
      state.lastNonZeroVolume = state.volume > 0 ? state.volume : 0.35;

      state.context = new AudioCtx();
      state.compressor = state.context.createDynamicsCompressor();
      state.compressor.threshold.value = -26;
      state.compressor.knee.value = 18;
      state.compressor.ratio.value = 3;
      state.compressor.attack.value = 0.03;
      state.compressor.release.value = 0.35;

      state.masterGain = state.context.createGain();
      state.masterGain.gain.value = 0.00001;
      state.masterGain.connect(state.compressor);
      state.compressor.connect(state.context.destination);

      var tipos = ["triangle", "sine", "sine"];
      var detunes = [-6, 0, 8];
      var lfoFrequencias = [0.07, 0.09, 0.05];

      for (var i = 0; i < tipos.length; i++) {
        var osc = state.context.createOscillator();
        osc.type = tipos[i];
        osc.detune.value = detunes[i];

        var filter = state.context.createBiquadFilter();
        filter.type = "lowpass";
        filter.frequency.value = 900 + (i * 180);
        filter.Q.value = 0.0001;

        var gain = state.context.createGain();
        gain.gain.value = 0.00001;

        var lfo = state.context.createOscillator();
        lfo.type = "sine";
        lfo.frequency.value = lfoFrequencias[i];

        var lfoGain = state.context.createGain();
        lfoGain.gain.value = 2 + (i * 0.8);

        lfo.connect(lfoGain);
        lfoGain.connect(osc.frequency);
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(state.masterGain);

        osc.start();
        lfo.start();

        state.voices.push({
          osc: osc,
          gain: gain,
          lfo: lfo,
          lfoGain: lfoGain
        });
      }

      state.initialized = true;
    }

    JW.sincronizarControlesMusicaAmbiente_();
    JW.tentarAtivarMusicaAmbiente_();
  };

  JW.definirVolumeMusicaAmbiente = function(valor) {
    var state = JW.ambientMusic;
    if (!state) return;

    var volume = Math.min(1, Math.max(0, parseFloat(valor) || 0));
    state.volume = volume;
    if (volume > 0) {
      state.lastNonZeroVolume = volume;
      state.muted = false;
    } else {
      state.muted = true;
    }

    JW.aplicarVolumeMusicaAmbiente_();
    JW.atualizarStatusMusicaAmbiente_(state.muted ? "Musica mutada." : "Volume ajustado.");
    JW.tentarAtivarMusicaAmbiente_();
  };

  JW.aumentarVolumeMusicaAmbiente = function() {
    var state = JW.ambientMusic;
    if (!state) return;
    var base = state.muted ? (state.lastNonZeroVolume || 0.35) : state.volume;
    JW.definirVolumeMusicaAmbiente(Math.min(1, base + JW.AMBIENT_MUSIC_STEP));
  };

  JW.diminuirVolumeMusicaAmbiente = function() {
    var state = JW.ambientMusic;
    if (!state) return;
    var proximo = Math.max(0, (state.muted ? 0 : state.volume) - JW.AMBIENT_MUSIC_STEP);
    JW.definirVolumeMusicaAmbiente(proximo);
  };

  JW.toggleMuteMusicaAmbiente = function() {
    var state = JW.ambientMusic;
    if (!state) return;

    if (state.muted || state.volume === 0) {
      state.muted = false;
      state.volume = state.lastNonZeroVolume || 0.35;
    } else {
      state.lastNonZeroVolume = state.volume > 0 ? state.volume : (state.lastNonZeroVolume || 0.35);
      state.muted = true;
    }

    JW.aplicarVolumeMusicaAmbiente_();
    JW.atualizarStatusMusicaAmbiente_(state.muted ? "Musica mutada." : "Musica ambiente tocando.");
    JW.tentarAtivarMusicaAmbiente_();
  };

  JW.abrirTab = async function(tab, opcoes) {
    opcoes = opcoes || {};
    if (JW.navLoading) return;
    var partes = String(tab || "inicio").split("?");
    var tabBase = partes[0];
    var query = partes[1] || "";
    var tabKey = JW.getTabCacheKey_(tab);
    var navSeq = ++JW.navSeq;
    var htmlCache = JW.tabHtmlCache[tabKey];
    var main = document.getElementById("mainContent");
    var mainTemConteudo = !!(main && String(main.innerHTML || "").trim());
    var tinhaSnapshot = !!htmlCache;
    JW.navLoading = true;
    JW.activeTab = tabBase;
    JW.activeTabKey = tabKey;
    document.body.classList.add("nav-busy");
    JW.fecharNotificacoes();
    JW.marcarMenuAtivo(tabBase);
    if (tinhaSnapshot) JW.renderMain(htmlCache);
    else if (!JW.temDadosAquecidosParaAba_(tabBase) && !mainTemConteudo) JW.renderCarregando("Carregando conteudo...");

    try {
      if (tabBase === "inicio") await JW.carregarInicio(opcoes);
      else if (tabBase === "solicitar-orcamento") JW.renderSolicitarOrcamento();
      else if (tabBase === "produtos") await JW.carregarProdutos(JW.getQueryParam(query, "produto"), opcoes);
      else if (tabBase === "historico") await JW.carregarHistorico(opcoes);
      else if (tabBase === "manuais") await JW.carregarManuais(opcoes);
      else if (tabBase === "ordem-servico") await JW.carregarPendencias(opcoes);
      else if (tabBase === "financeiro") await JW.carregarFinanceiro(opcoes);
      else if (tabBase === "relatorios") await JW.carregarRelatorios(opcoes);
      else if (tabBase === "chat") await JW.carregarChatClientePagina();
      else if (tabBase === "comunicacao" || tabBase === "mensagens" || tabBase === "admin") await JW.carregarMensagensDiretas(opcoes);
      else JW.renderMain('<div class="card"><h3>Módulo indisponível</h3></div>');
    } catch (error) {
      if (navSeq === JW.navSeq) {
        if (tinhaSnapshot) {
          JW.toast("Nao foi possivel atualizar esta aba agora. Mantivemos a ultima versao carregada.", "warning");
        } else {
          JW.renderMain('<div class="card text-center"><h3>Erro ao carregar</h3><p style="color:red;">' + JW.escapeHTML(error.message || error) + '</p><button class="btn btn-primary" onclick="JW.abrirTab(' + JW.attrJs(tabBase) + ')">Tentar novamente</button></div>', { cache: false });
        }
      }
    } finally {
      if (navSeq === JW.navSeq) {
        JW.navLoading = false;
        document.body.classList.remove("nav-busy");
      }
    }
  };

  JW.getQueryParam = function(query, nome) {
    var partes = String(query || "").split("&");
    for (var i = 0; i < partes.length; i++) {
      var kv = partes[i].split("=");
      if (decodeURIComponent(kv[0] || "") === nome) return decodeURIComponent(kv[1] || "");
    }
    return "";
  };

  JW.getOrcamentoDraft = function() {
    try {
      return JSON.parse(localStorage.getItem("jw_orcamento_draft_" + ((JW.usuarioLogado && JW.usuarioLogado.email) || "anon")) || "{}");
    } catch (error) {
      return {};
    }
  };

  JW.salvarDraftOrcamento = function() {
    if (!JW.usuarioLogado) return;
    var dados = {
      tipoServico: (document.getElementById("orcTipo") || {}).value || "",
      descricao: (document.getElementById("orcDescricao") || {}).value || "",
      telefone: (document.getElementById("orcTelefone") || {}).value || "",
      observacoes: (document.getElementById("orcObservacoes") || {}).value || ""
    };
    localStorage.setItem("jw_orcamento_draft_" + JW.usuarioLogado.email, JSON.stringify(dados));
  };

  JW.limparDraftOrcamento = function() {
    if (JW.usuarioLogado) localStorage.removeItem("jw_orcamento_draft_" + JW.usuarioLogado.email);
  };

  JW.selecionarAnexoOrcamento = function(input) {
    var files = input && input.files ? Array.prototype.slice.call(input.files) : [];
    if (!files.length) return;
    var pendentes = files.length;
    for (var i = 0; i < files.length; i++) {
      (function(file) {
        if (file.size > 8 * 1024 * 1024) {
          JW.toast("Anexo muito grande. Use um arquivo de ate 8 MB.", "error");
          pendentes--;
          return;
        }
        var reader = new FileReader();
        reader.onload = function(e) {
          JW.orcamentoAnexos.push({
            nome: file.name,
            tipo: file.type,
            dataUrl: e.target.result
          });
          pendentes--;
          if (pendentes <= 0) JW.renderAnexosOrcamento();
        };
        reader.readAsDataURL(file);
      })(files[i]);
    }
    input.value = "";
  };

  JW.renderAnexosOrcamento = function() {
    var preview = document.getElementById("orcamentoAnexoPreview");
    if (!preview) return;
    var anexos = JW.orcamentoAnexos || [];
    var html = "";
    for (var i = 0; i < anexos.length; i++) {
      var anexo = anexos[i] || {};
      html += '<div class="orcamento-anexo-card">' +
        '<img src="' + JW.escapeAttr(anexo.dataUrl || "") + '" alt="' + JW.escapeAttr(anexo.nome || "Foto") + '">' +
        '<button class="orcamento-anexo-remove" type="button" onclick="JW.removerAnexoOrcamento(' + i + ')"><i class="fas fa-times"></i></button>' +
      '</div>';
    }
    html += '<button class="orcamento-anexo-add" type="button" onclick="document.getElementById(' + JW.attrJs("orcAnexo") + ').click()"><i class="fas fa-plus"></i><span>Adicionar</span></button>';
    preview.innerHTML = html;
  };

  JW.removerAnexoOrcamento = function(index) {
    if (typeof index === "number") JW.orcamentoAnexos.splice(index, 1);
    var input = document.getElementById("orcAnexo");
    var preview = document.getElementById("orcamentoAnexoPreview");
    if (input) input.value = "";
    if (preview) JW.renderAnexosOrcamento();
  };

  JW.enviarOrcamento = async function() {
    var tipo = (document.getElementById("orcTipo") || {}).value || "";
    var descricao = (document.getElementById("orcDescricao") || {}).value || "";
    var telefone = (document.getElementById("orcTelefone") || {}).value || "";
    var observacoes = (document.getElementById("orcObservacoes") || {}).value || "";

    if (!tipo || !descricao || descricao.trim().length < 10) {
      JW.toast("Informe o tipo e uma descricao com pelo menos 10 caracteres.", "error");
      return;
    }

    JW.mostrarLoading(JW.orcamentoAnexo ? "Enviando anexo..." : "Enviando orçamento...");
    try {
      var anexosUrls = [];
      for (var i = 0; i < (JW.orcamentoAnexos || []).length; i++) {
        var anexoAtual = JW.orcamentoAnexos[i];
        if (!anexoAtual || !anexoAtual.dataUrl) continue;
        var urlAnexoAtual = await JW.chamarGoogleScript("uploadImagemParaDrive", anexoAtual.dataUrl, anexoAtual.nome);
        if (urlAnexoAtual) anexosUrls.push(urlAnexoAtual);
      }

      var resultado = await JW.chamarGoogleScript("solicitarOrcamento", {
        cliente: JW.usuarioLogado.usuario || JW.usuarioLogado.email,
        email: JW.usuarioLogado.email,
        telefone: telefone,
        tipoServico: tipo,
        descricao: descricao,
        imagemURL: anexosUrls[0] || "",
        arquivoURL: anexosUrls.join("\n"),
        arquivoNome: (JW.orcamentoAnexos || []).map(function(item) { return item.nome || ""; }).filter(Boolean).join(" | "),
        observacoes: observacoes
      });
      JW.esconderLoading();

      if (resultado && resultado.success) {
        JW.toast("Orçamento recebido com sucesso. Retornaremos com uma proposta por e-mail e/ou WhatsApp.", "success");
        JW.limparDraftOrcamento();
        JW.renderSolicitarOrcamento();
      } else {
        JW.toast(resultado && resultado.message ? resultado.message : "Nao foi possivel enviar.", "error");
      }
    } catch (error) {
      JW.esconderLoading();
      JW.toast("Erro ao enviar orçamento: " + (error.message || error), "error");
    }
  };

  JW.renderProdutos = function(produtos) {
    if (!produtos || !produtos.length) return '<div class="card"><p class="text-muted">Nenhum produto disponivel.</p></div>';
    var html = "";
    for (var i = 0; i < produtos.length; i++) {
      var p = produtos[i];
      var estoque = parseInt(p.estoque, 10) || 0;
      var preco = JW.numero(p.preco);
      var desconto = JW.numero(p.precoComDesconto);
      var temDesconto = desconto > 0;
      var podeComprar = estoque > 0 && !JW.lojaSuspensa;
      var img = p.imagemURL ? '<img src="' + JW.escapeAttr(p.imagemURL) + '" class="product-image" alt="' + JW.escapeAttr(p.nome || "Produto") + '" onerror="this.parentElement.innerHTML=\'<i class=&quot;fas fa-box&quot; style=&quot;font-size:2rem;color:var(--text-muted)&quot;></i>\';">' : '<i class="fas fa-box" style="font-size:2rem;color:var(--text-muted)"></i>';
      var precoHtml = "";
      if (temDesconto) {
        precoHtml = '<div class="product-price-container product-price-has-discount">' +
          '<div class="text-muted" style="text-decoration:line-through;cursor:' + (JW.isAdmin() && !JW.lojaSuspensa ? "pointer" : "default") + ';" ' + (JW.isAdmin() && !JW.lojaSuspensa ? 'onclick="JW.editarPrecoProduto(' + JW.attrJs(p.id) + ', ' + JW.attrJs("preco") + ')" title="Alterar preco cheio"' : '') + '>' + JW.formatarMoeda(preco) + '</div>' +
          '<div class="product-price" ' + (JW.isAdmin() && !JW.lojaSuspensa ? 'onclick="JW.editarPrecoProduto(' + JW.attrJs(p.id) + ', ' + JW.attrJs("desconto") + ')" title="Alterar preco com desconto"' : '') + '>' + JW.formatarMoeda(desconto) + '</div>' +
        '</div>';
      } else {
        precoHtml = '<div class="product-price-container product-price-single"><div class="product-price" ' + (JW.isAdmin() && !JW.lojaSuspensa ? 'onclick="JW.editarPrecoProduto(' + JW.attrJs(p.id) + ', ' + JW.attrJs("preco") + ')" title="Alterar preco"' : '') + '>' + JW.formatarMoeda(preco) + '</div></div>';
      }

      html += '<div class="product-card ' + (JW.lojaSuspensa ? "store-suspended" : "") + '" id="produto-' + JW.escapeAttr(p.id) + '">' +
        '<div class="product-image-container">' + img + '</div>' +
        '<div class="product-info">' +
          '<div class="product-name">' + JW.escapeHTML(p.nome || "Produto") + '</div>' +
          '<div class="text-muted">' + JW.escapeHTML(p.categoria || "") + '</div>' +
          '<p>' + JW.escapeHTML(p.descricao || "") + '</p>' +
          precoHtml +
          '<div class="text-muted" style="margin:.5rem 0;">Estoque: ' + estoque + '</div>' +
          '<div style="display:flex;gap:.5rem;flex-wrap:wrap;">' +
            '<button class="btn ' + (podeComprar ? "btn-success" : "btn-secondary") + '" ' + (podeComprar ? 'onclick="JW.abrirCompraProduto(' + JW.attrJs(p.id) + ')"' : "disabled") + '><i class="fas fa-shopping-cart"></i> ' + (JW.lojaSuspensa ? "Suspenso" : "Comprar") + '</button>' +
            (p.exibirManual && (p.manualURL || p.manualVideoURL) ? '<button class="btn btn-manual" onclick="JW.abrirManualProduto(' + JW.attrJs(p.id) + ')"><i class="fas fa-book"></i> Manual</button>' : '') +

  JW.buscarProduto = function(id) {
    for (var i = 0; i < JW.produtosCache.length; i++) {
      if (String(JW.produtosCache[i].id) === String(id)) return JW.produtosCache[i];
    }
    return null;
  };

  JW.abrirCompraProduto = function(id) {
    if (JW.lojaSuspensa) {
      JW.toast("Loja suspensa temporariamente. Visualizacao liberada apenas para administradores.", "info");
      return;
    }
    var produto = JW.buscarProduto(id);
    if (!produto) return;
    JW.produtoAtual = produto;

    var nome = document.getElementById("modalProdutoNome");
    var desc = document.getElementById("modalProdutoDescricao");
    var preco = document.getElementById("modalProdutoPreco");
    var estoque = document.getElementById("modalProdutoEstoque");
    var qtd = document.getElementById("modalProdutoQuantidade");
    var imagem = document.getElementById("modalProdutoImagem");

    if (nome) nome.textContent = produto.nome || "Produto";
    if (desc) desc.textContent = produto.descricao || "";
    if (preco) preco.textContent = JW.formatarMoeda(JW.precoAtivoProduto(produto));
    if (estoque) estoque.textContent = (produto.estoque || 0) + " em estoque";
    if (qtd) {
      qtd.value = 1;
      qtd.max = produto.estoque || 1;
    }
    if (imagem) {
      imagem.innerHTML = produto.imagemURL
        ? '<img src="' + JW.escapeAttr(produto.imagemURL) + '" alt="' + JW.escapeAttr(produto.nome || "Produto") + '" style="width:100%;height:100%;object-fit:cover;border-radius:var(--radius-md);" onerror="this.parentElement.innerHTML=\'<i class=&quot;fas fa-box&quot; style=&quot;font-size:2rem;color:var(--text-muted)&quot;></i>\';">'
        : '<i class="fas fa-box" style="font-size:2rem;color:var(--text-muted)"></i>';
    }

    JW.atualizarTotalModal();
    JW.abrirModal("modalComprar");
  };

  JW.atualizarTotalModal = function() {
    var qtd = parseInt((document.getElementById("modalProdutoQuantidade") || {}).value, 10) || 1;
    var estoque = parseInt((JW.produtoAtual && JW.produtoAtual.estoque) || 1, 10) || 1;
    if (qtd < 1) qtd = 1;
    if (qtd > estoque) qtd = estoque;
    var qtdEl = document.getElementById("modalProdutoQuantidade");
    if (qtdEl) qtdEl.value = qtd;
    var total = JW.precoAtivoProduto(JW.produtoAtual) * qtd;
    var totalEl = document.getElementById("modalProdutoTotal");
    if (totalEl) totalEl.textContent = "Total: " + JW.formatarMoeda(total);
  };

  JW.confirmarCompra = async function() {
    if (!JW.produtoAtual) return;
    var qtd = parseInt((document.getElementById("modalProdutoQuantidade") || {}).value, 10) || 1;
    var produto = JW.produtoAtual;

    JW.mostrarLoading("Registrando compra...");
    try {
      var item = {
        id: produto.id,
        nome: produto.nome,
        preco: JW.precoAtivoProduto(produto),
        quantidade: qtd
      };
      var resultado = await JW.chamarGoogleScript("registrarCompra", {
        cliente: JW.usuarioLogado.usuario || JW.usuarioLogado.email,
        email: JW.usuarioLogado.email,
        produtos: JSON.stringify([item])
      });
      JW.esconderLoading();

      if (resultado && resultado.success) {
        JW.fecharModal("modalComprar");
        JW.toast("Compra realizada com sucesso.", "success");
        JW.invalidateModuleCaches_(["produtos", "pendencias", "relatorios", "historico", "resumoCliente", "financeiro"]);
        await JW.carregarProdutos("", { force: true });
      } else {
        JW.toast(resultado && resultado.message ? resultado.message : "Nao foi possivel comprar.", "error");
      }
    } catch (error) {
      JW.esconderLoading();
      JW.toast("Erro ao comprar: " + (error.message || error), "error");
    }
  };

  JW.editarPrecoProduto = function(id, campo) {
    if (!JW.isAdmin()) return;
    var produto = JW.buscarProduto(id);
    if (!produto) return;
    var atual = campo === "desconto" ? produto.precoComDesconto : produto.preco;
    JW.produtoPrecoEditando = { id: id, campo: campo };
    JW.abrirModalSistema(
      '<i class="fas fa-tags"></i> ' + (campo === "desconto" ? "Alterar preco com desconto" : "Alterar preco cheio"),
      '<div class="form-group">' +
        '<label class="form-label">Produto</label>' +
        '<div class="profile-field"><strong>' + JW.escapeHTML(produto.nome || "Produto") + '</strong></div>' +
      '</div>' +
      '<div class="form-group">' +
        '<label class="form-label">Novo valor</label>' +
        '<input id="produtoPrecoNovo" class="form-input" inputmode="decimal" value="' + JW.escapeAttr(JW.formatarMoeda(JW.numero(atual))) + '" oninput="JW.formatarCampoMoeda(this)">' +
      '</div>',
      '<div style="display:flex;gap:.5rem;justify-content:flex-end;margin-top:1rem;"><button class="btn btn-primary" onclick="JW.confirmarEditarPrecoProduto()">Salvar preco</button><button class="btn btn-secondary" onclick="JW.fecharModalSistema()">Cancelar</button></div>'
    );
    window.setTimeout(function() {
      var input = document.getElementById("produtoPrecoNovo");
      if (input) input.select();
    }, 50);
  };

  JW.confirmarEditarPrecoProduto = async function() {
    if (!JW.produtoPrecoEditando) return;
    var novoValor = JW.numero((document.getElementById("produtoPrecoNovo") || {}).value || "");
    var campo = JW.produtoPrecoEditando.campo;
    if ((campo !== "desconto" && novoValor <= 0) || novoValor < 0) {
      JW.toast("Preco invalido.", "error");
      return;
    }

    var id = JW.produtoPrecoEditando.id;
    JW.fecharModalSistema();
    JW.mostrarLoading("Atualizando preco...");
    try {
      var resultado = await JW.chamarGoogleScript("atualizarPrecoProdutoCampoV3", id, String(novoValor), campo);
      JW.esconderLoading();
      JW.toast(resultado && resultado.message ? resultado.message : "Preco atualizado.", resultado && resultado.success ? "success" : "error");
      if (resultado && resultado.success) {
        JW.invalidateModuleCaches_(["produtos"]);
        await JW.carregarProdutos("", { force: true });
      }
    } catch (error) {
      JW.esconderLoading();
      JW.toast("Erro ao atualizar preco: " + (error.message || error), "error");
    }
  };

  JW.abrirManualProduto = function(id) {
    var produto = JW.buscarProduto(id);
    if (!produto) return;
    var url = produto.manualURL || produto.manualVideoURL;
    if (url) window.open(url, "_blank");
  };

  JW.carregarManuais = async function(opcoes) {
    JW.setTitulo("Manuais");
    var manuais = await JW.obterManuais_(opcoes);
    JW.manuaisCache = manuais || [];
    if (!JW.manuaisCache.length) {
      JW.renderMain('<div class="card"><p class="text-muted">Nenhum manual disponivel para os produtos da loja.</p></div>');

    }

    JW.renderListaManuais();

  JW.renderListaManuais = function() {
    var lista = JW.manualFiltro === "Todos" ? JW.manuaisCache : JW.manuaisCache.filter(function(m) { return (m.categoria || "Sem categoria") === JW.manualFiltro; });
    var html = JW.renderFiltrosCategorias(JW.getCategorias(JW.manuaisCache), JW.manualFiltro, "JW.filtrarManuais") + '<div class="card"><div class="list">';
    for (var i = 0; i < lista.length; i++) {

        '<div class="manual-info"><strong>' + JW.escapeHTML(m.produto || "Produto") + '</strong><div class="text-muted">' + JW.escapeHTML(m.descricao || m.categoria || "") + '</div></div>' +
        '<div style="display:flex;gap:.5rem;flex-wrap:wrap;">' +
          (m.url ? '<button class="btn btn-manual btn-sm" onclick="window.open(' + JW.attrJs(m.url) + ', ' + JW.attrJs("_blank") + ')"><i class="fas fa-file-pdf"></i> PDF</button>' : '') +
          (m.videoURL ? '<button class="btn btn-manual btn-sm" onclick="window.open(' + JW.attrJs(m.videoURL) + ', ' + JW.attrJs("_blank") + ')"><i class="fas fa-video"></i> Video</button>' : '') +
        '</div>' +
      '</div>';

  JW.filtrarManuais = function(categoria) {
    JW.manualFiltro = categoria || "Todos";
    JW.renderListaManuais();
  };

  JW.carregarPendencias = async function(opcoes) {
    JW.setTitulo("Pendências");
    if (!JW.isAdmin()) {
      JW.renderMain('<div class="card"><p>Acesso restrito.</p></div>');
      return;
    }

    var c = await JW.obterPendencias_(opcoes);
    var orcamentos = (c && c.orcamentosPendentes) || [];

    JW.orcamentosPendentesCache = orcamentos;
    JW.comprasPendentesCache = compras;
    var html = '<section class="collapsible-section section-orcamentos collapsed" id="secOrcamentosPendentes">' +
      '<button class="collapsible-header" onclick="JW.toggleSection(' + JW.attrJs("secOrcamentosPendentes") + ')"><span><i class="fas fa-file-invoice-dollar"></i> Orçamentos pendentes</span><strong>' + orcamentos.length + '</strong><i class="fas fa-chevron-down"></i></button>' +
      '<div class="collapsible-content">' + JW.renderOrcamentosAdmin(orcamentos) + '</div>' +
    '</section>' +
    '<section class="collapsible-section section-compras collapsed" id="secComprasPendentes">' +
      '<button class="collapsible-header" onclick="JW.toggleSection(' + JW.attrJs("secComprasPendentes") + ')"><span><i class="fas fa-shopping-cart"></i> Compras pendentes</span><strong>' + compras.length + '</strong><i class="fas fa-chevron-down"></i></button>' +

  JW.toggleSection = function(id) {
    var sec = document.getElementById(id);
    if (!sec) return;
    sec.classList.toggle("collapsed");
    var icon = sec.querySelector(".collapsible-header > i:last-child");
    if (icon) icon.className = sec.classList.contains("collapsed") ? "fas fa-chevron-down" : "fas fa-chevron-up";

      '<div class="notification-detail">' +
        '<div class="mini-summary-grid">' +
          '<div><span>ID</span><strong>' + JW.escapeHTML(item.id || "-") + '</strong></div>' +
          '<div><span>CLIENTE</span><strong>' + JW.escapeHTML(item.cliente || "-") + '</strong></div>' +
          '<div><span>DATA</span><strong>' + JW.escapeHTML(item.dataSolicitacao || "-") + '</strong></div>' +
          '<div><span>VALOR</span><strong>' + JW.escapeHTML(item.valor || "Aguardando") + '</strong></div>' +
        '</div>' +
        '<div class="history-note" style="margin-top:1rem;"><strong>SERVI&Ccedil;O</strong><br>' + JW.escapeHTML(item.tipoServico || "-") + '</div>' +
        '<div class="history-note" style="margin-top:.75rem;white-space:pre-wrap;"><strong>DESCRI&Ccedil;&Atilde;O</strong><br>' + JW.escapeHTML(item.descricao || "-") + '</div>' +
        (item.observacoes ? '<div class="history-note" style="margin-top:.75rem;white-space:pre-wrap;"><strong>OBSERVA&Ccedil;&Otilde;ES</strong><br>' + JW.escapeHTML(item.observacoes) + '</div>' : '') +
      '</div>',

      '</div>'
    );

  JW.abrirModalPropostaOrcamento = function(id) {
    JW.abrirModalSistema(
      '<i class="fas fa-file-invoice-dollar"></i> Enviar proposta',
      '<input type="hidden" id="orcamentoPropostaId" value="' + JW.escapeAttr(id) + '">' +
      '<div class="form-group"><label class="form-label">Valor da proposta</label><input id="orcamentoPropostaValor" class="form-input" inputmode="decimal" placeholder="R$ 0,00" oninput="JW.formatarCampoMoeda(this)"></div>' +
      '<div class="text-muted" style="margin-top:-.35rem;margin-bottom:.85rem;">Use valor zero se quiser concluir sem cobrança.</div>' +
      '<div class="form-group"><label class="form-label">Observações</label><textarea id="orcamentoPropostaObs" class="form-input" rows="3"></textarea></div>',
      '<div style="display:flex;gap:.5rem;justify-content:flex-end;margin-top:1rem;"><button class="btn btn-primary" onclick="JW.confirmarPropostaOrcamento()">Enviar proposta</button><button class="btn btn-secondary" onclick="JW.fecharModalSistema()">Cancelar</button></div>'
    );
  };

  JW.formatarCampoMoeda = function(input) {
    var numeros = (input.value || "").replace(/\D/g, "");
    var valor = (parseInt(numeros || "0", 10) / 100).toFixed(2);
    input.value = "R$ " + valor.replace(".", ",");
  };

  JW.confirmarPropostaOrcamento = async function() {
    var id = (document.getElementById("orcamentoPropostaId") || {}).value || "";
    var valor = (document.getElementById("orcamentoPropostaValor") || {}).value || "";
    var obs = (document.getElementById("orcamentoPropostaObs") || {}).value || "";
    if (JW.numero(valor) < 0) {
      JW.toast("Informe um valor válido para a proposta.", "error");
      return;
    }
    JW.fecharModalSistema();
    if (JW.numero(valor) === 0) await JW.atualizarOrcamentoAdmin(id, "0", "Concluido", obs || "Concluído sem cobrança.");
    else await JW.atualizarOrcamentoAdmin(id, valor, "Em Negociação", obs);
  };

  JW.atualizarOrcamentoAdmin = async function(id, valor, status, obs) {
    JW.mostrarLoading("Atualizando orçamento...");
    try {
      var valorNormalizado = valor;
      if (valorNormalizado !== null && valorNormalizado !== undefined && valorNormalizado !== "") {
        valorNormalizado = String(valorNormalizado).replace("R$", "").replace(/\s/g, "");
        if (valorNormalizado.indexOf(",") !== -1) valorNormalizado = valorNormalizado.replace(/\./g, "").replace(",", ".");
      }
      var resultado = await JW.chamarGoogleScript("aprovarOrcamento", id, valorNormalizado, status, obs);
      JW.esconderLoading();
      JW.toast(resultado && resultado.message ? resultado.message : "Orçamento atualizado.", resultado && resultado.success ? "success" : "error");
      if (resultado && resultado.success) {
        JW.invalidateModuleCaches_(["pendencias", "relatorios", "financeiro", "historico", "resumoCliente"]);
        await JW.carregarPendencias({ force: true });
      }
    } catch (error) {
      JW.esconderLoading();
      JW.toast("Erro ao atualizar orçamento: " + (error.message || error), "error");
    }
  };

      if (String((JW.comprasPendentesCache[i] || {}).id) === String(id)) {
        item = JW.comprasPendentesCache[i];
        break;
      }
    }
    if (!item) return;
    var produtos = (item.produtosLista || []).map(function(produto) {
      return '<li>' + JW.escapeHTML(produto.nome || "Produto") + ' x' + JW.escapeHTML(produto.quantidade || 1) + '</li>';
    }).join("");
    JW.abrirModalSistema(
      '<i class="fas fa-shopping-cart"></i> Detalhes da compra',
      '<div class="notification-detail">' +
        '<div class="mini-summary-grid">' +
          '<div><span>ID</span><strong>' + JW.escapeHTML(item.id || "-") + '</strong></div>' +
          '<div><span>CLIENTE</span><strong>' + JW.escapeHTML(item.cliente || "-") + '</strong></div>' +
          '<div><span>PRODUTOS</span><strong>' + JW.escapeHTML((item.produtosLista || []).length || 0) + '</strong></div>' +
          '<div><span>PAGAMENTO</span><strong>' + JW.escapeHTML(item.statusPagamento || "Pendente") + '</strong></div>' +
          '<div><span>VALOR</span><strong>' + JW.escapeHTML(item.valorTotalFormatado || JW.formatarMoeda(item.valorTotal || 0)) + '</strong></div>' +
          '<div><span>STATUS</span><strong>' + JW.escapeHTML(item.statusEntrega || "Pendente") + '</strong></div>' +
        '</div>' +
        '<div class="history-note" style="margin-top:1rem;"><strong>PRODUTOS</strong><ul style="margin:.5rem 0 0 1rem;">' + (produtos || '<li>Produto não identificado</li>') + '</ul></div>' +
        '<div class="history-note" style="margin-top:.75rem;"><strong>PAGAMENTO</strong><br>' + JW.escapeHTML(item.statusPagamento || "Pendente") + '</div>' +
        (item.observacoesAdmin ? '<div class="history-note" style="margin-top:.75rem;white-space:pre-wrap;"><strong>OBSERVAÇÕES</strong><br>' + JW.escapeHTML(item.observacoesAdmin) + '</div>' : '') +
      '</div>',
      '<div class="modal-actions"><button class="btn btn-secondary" onclick="JW.fecharModalSistema()">Fechar</button></div>'

  JW.renderProdutosCompraAdmin = function(produtos) {
    if (!produtos || !produtos.length) return '<p class="text-muted">Produto não identificado.</p>';

      html += '<div class="purchase-product-mini">' +

        '<span>' + JW.escapeHTML(p.nome || "Produto") + '</span>' +

  JW.abrirCancelarCompra = function(id) {
    JW.abrirModalSistema(
      '<i class="fas fa-ban"></i> Cancelar compra',
      '<p>Voce tem certeza que deseja cancelar esta compra?</p><input type="hidden" id="compraCancelarId" value="' + JW.escapeAttr(id) + '">' +
      '<div class="form-group"><label class="form-label">Observacao para o cliente</label><textarea id="compraCancelarObs" class="form-input" rows="3" placeholder="Opcional"></textarea></div>',
      '<div style="display:flex;gap:.5rem;justify-content:flex-end;margin-top:1rem;"><button class="btn btn-danger" onclick="JW.confirmarCancelarCompra()">Cancelar compra</button><button class="btn btn-secondary" onclick="JW.fecharModalSistema()">Voltar</button></div>'

  JW.confirmarCancelarCompra = async function() {
    var id = (document.getElementById("compraCancelarId") || {}).value || "";
    var obs = (document.getElementById("compraCancelarObs") || {}).value || "";
    JW.fecharModalSistema();
    await JW.atualizarStatusCompraAdmin(id, "Cancelado", obs);

  JW.atualizarStatusCompraAdmin = async function(id, status, observacao) {
    JW.mostrarLoading("Atualizando compra...");
    try {
      var resultado = await JW.chamarGoogleScript("atualizarStatusCompraAdminV3", id, status, observacao || "");
      JW.esconderLoading();
      JW.toast(resultado && resultado.message ? resultado.message : "Compra atualizada.", resultado && resultado.success ? "success" : "error");
      if (resultado && resultado.success) {
        JW.invalidateModuleCaches_(["pendencias", "relatorios", "financeiro", "historico", "resumoCliente", "produtos"]);
        await JW.carregarPendencias({ force: true });
      }
    } catch (error) {
      JW.esconderLoading();
      JW.toast("Erro ao atualizar compra: " + (error.message || error), "error");
    }
  };

  JW.carregarRelatorios = async function(opcoes) {
    JW.setTitulo("Relatórios");
    if (!JW.isAdmin()) {
      JW.renderMain('<div class="card"><p>Acesso restrito.</p></div>');
      return;
    }

    var resultados = await Promise.all([
      JW.obterRelatorios_(opcoes),
      JW.obterFinanceiro_(opcoes).catch(function() {
        return null;
      })
    ]);
    var r = resultados[0];
    var financeiro = resultados[1];
    JW.relatorioDados = r || {};
    JW.relatorioFinanceiroDados = financeiro && financeiro.success ? financeiro : null;
    if (JW.relatorioFinanceiroDados) JW.financeiroDados = JW.relatorioFinanceiroDados;
    JW.renderRelatorios("");
  };

  JW.renderRelatorios = function(detalhe, evt) {
    if (evt && evt.stopPropagation) evt.stopPropagation();
    detalhe = detalhe || "";
    JW.relatorioSelecionado = detalhe;
    var r = JW.relatorioDados || {};
    var receber = r.aReceber || { totalFormatado: JW.formatarMoeda(0) };
    var financeiroResumo = JW.relatorioFinanceiroDados && JW.relatorioFinanceiroDados.resumo ? JW.relatorioFinanceiroDados.resumo : {};
    var html =
      '<div class="report-page" onclick="JW.renderRelatorios(' + JW.attrJs("") + ')">' +
      '<section class="page-hero reports-hero" onclick="event.stopPropagation()">' +
        '<h2>Relatórios</h2>' +
      '</section>' +
      '<div class="report-action-grid" onclick="event.stopPropagation()">' +
        JW.cardRelatorio("Clientes", r.totalClientes || 0, "clientes", detalhe, "report-clientes") +
        JW.cardRelatorio("Orcamentos", r.orcamentosPendentes || 0, "orcamentos", detalhe, "report-orcamentos") +
        JW.cardRelatorio("Compras", r.totalCompras || 0, "compras", detalhe, "report-compras") +
        JW.cardRelatorio("Financeiro", financeiroResumo.totalCobrancasPendentes || 0, "financeiro", detalhe, "report-financeiro") +
        JW.cardRelatorio("Resumo", receber.totalFormatado || JW.formatarMoeda(receber.total || 0), "resumo", detalhe, "report-resumo") +
      '</div>' +
      JW.renderGraficosRelatorio(r, detalhe) +
      (detalhe ? '<div class="card report-detail-card ' + JW.escapeAttr("detail-" + detalhe) + '" onclick="event.stopPropagation()"><h3>Detalhes</h3><div id="relatorioDetalhe">' + JW.renderDetalheRelatorio(detalhe) + '</div></div>' : '') +
      '</div>';
    JW.renderMain(html);
  };

  JW.cardRelatorio = function(titulo, valor, chave, ativo, classe) {
    return '<button class="dashboard-card report-card ' + JW.escapeAttr(classe || "") + (ativo === chave ? " active" : "") + '" onclick="JW.renderRelatorios(' + JW.attrJs(chave) + ', event)">' +
      '<i class="' + (ativo === chave ? "fas fa-check-circle" : "fas fa-chart-line") + '"></i>' +
      '<div class="dashboard-card-value">' + JW.escapeHTML(valor) + '</div>' +
      '<div class="text-muted">' + JW.escapeHTML(titulo) + '</div>' +
    '</button>';
  };

  JW.abrirDetalheRelatorioMobile = function(chave) {
    JW.renderRelatorios(chave);
  };

  JW.renderGraficosRelatorio = function(r, detalhe) {
    var totalPendencias = Math.max((r.orcamentosPendentes || 0) + (r.comprasPendentes || 0), 1);
    var orcPct = Math.round(((r.orcamentosPendentes || 0) / totalPendencias) * 100);
    var vendas = r.faturamentoCompras || 0;
    var receber = (r.aReceber && r.aReceber.total) || 0;
    var max = Math.max(vendas, receber, 1);
    var totalClientes = r.totalClientes || 0;
    var totalAdmins = r.totalAdmins || 0;
    var totalUsuarios = Math.max(totalClientes + totalAdmins, 1);
    var clientesPct = Math.round((totalClientes / totalUsuarios) * 100);
    var totalOrc = Math.max(r.totalOrcamentos || 0, 1);
    var orcPendPct = Math.round(((r.orcamentosPendentes || 0) / totalOrc) * 100);
    var totalCompras = Math.max(r.totalCompras || 0, 1);
    var compPendPct = Math.round(((r.comprasPendentes || 0) / totalCompras) * 100);
    if (detalhe === "clientes") {
      return '<div class="report-charts">' +
        '<div class="analytics-panel"><h3>Perfil de usuarios</h3><div class="pie-row"><div class="css-pie" style="background:conic-gradient(#0f766e 0 ' + clientesPct + '%, #64748b ' + clientesPct + '% 100%);"></div><div class="chart-legend"><span><i style="background:#0f766e"></i>Clientes ' + totalClientes + '</span><span><i style="background:#64748b"></i>Admins ' + totalAdmins + '</span></div></div></div>' +
        '<div class="analytics-panel"><h3>Base cadastrada</h3><div class="bar-line"><span>Clientes</span><div><b style="width:' + clientesPct + '%"></b></div><strong>' + totalClientes + '</strong></div><div class="bar-line"><span>Admins</span><div><b style="width:' + Math.round((totalAdmins / totalUsuarios) * 100) + '%"></b></div><strong>' + totalAdmins + '</strong></div></div>' +
      '</div>';
    }
    if (detalhe === "orcamentos") {
      return '<div class="report-charts">' +
        '<div class="analytics-panel"><h3>Orcamentos</h3><div class="pie-row"><div class="css-pie" style="background:conic-gradient(#1d4ed8 0 ' + orcPendPct + '%, #cbd5e1 ' + orcPendPct + '% 100%);"></div><div class="chart-legend"><span><i style="background:#1d4ed8"></i>Pendentes ' + (r.orcamentosPendentes || 0) + '</span><span><i style="background:#cbd5e1"></i>Total ' + (r.totalOrcamentos || 0) + '</span></div></div></div>' +
        '<div class="analytics-panel"><h3>Volume operacional</h3><div class="bar-line"><span>Pendentes</span><div><b style="width:' + orcPendPct + '%"></b></div><strong>' + (r.orcamentosPendentes || 0) + '</strong></div><div class="bar-line"><span>Total</span><div><b style="width:100%"></b></div><strong>' + (r.totalOrcamentos || 0) + '</strong></div></div>' +
      '</div>';
    }
    if (detalhe === "compras") {
      return '<div class="report-charts">' +
        '<div class="analytics-panel"><h3>Compras</h3><div class="pie-row"><div class="css-pie" style="background:conic-gradient(#c2410c 0 ' + compPendPct + '%, #cbd5e1 ' + compPendPct + '% 100%);"></div><div class="chart-legend"><span><i style="background:#c2410c"></i>Pendentes ' + (r.comprasPendentes || 0) + '</span><span><i style="background:#cbd5e1"></i>Total ' + (r.totalCompras || 0) + '</span></div></div></div>' +
        '<div class="analytics-panel"><h3>Fluxo de compras</h3><div class="bar-line"><span>Pendentes</span><div><b style="width:' + compPendPct + '%"></b></div><strong>' + (r.comprasPendentes || 0) + '</strong></div><div class="bar-line"><span>Total</span><div><b style="width:100%"></b></div><strong>' + (r.totalCompras || 0) + '</strong></div></div>' +
      '</div>';
    }
    if (detalhe === "vendas") {
      return '<div class="report-charts">' +
        '<div class="analytics-panel"><h3>Receita de vendas</h3><div class="bar-line"><span>Vendas</span><div><b style="width:' + Math.round((vendas / max) * 100) + '%"></b></div><strong>' + JW.formatarMoeda(vendas) + '</strong></div><div class="bar-line"><span>A receber</span><div><b style="width:' + Math.round((receber / max) * 100) + '%"></b></div><strong>' + JW.formatarMoeda(receber) + '</strong></div></div>' +
        '<div class="analytics-panel"><h3>Pedidos registrados</h3><div class="bar-line"><span>Compras</span><div><b style="width:100%"></b></div><strong>' + (r.totalCompras || 0) + '</strong></div><div class="bar-line"><span>Pendentes</span><div><b style="width:' + compPendPct + '%"></b></div><strong>' + (r.comprasPendentes || 0) + '</strong></div></div>' +
      '</div>';
    }
    if (detalhe === "financeiro") {
      var resumo = JW.relatorioFinanceiroDados && JW.relatorioFinanceiroDados.resumo ? JW.relatorioFinanceiroDados.resumo : {};
      var clientesComLancamento = resumo.totalClientesComLancamento || 0;
      var cobrancasPendentes = resumo.totalCobrancasPendentes || 0;
      var mensalidades = resumo.totalMensalidades || 0;
      var baseClientes = Math.max(resumo.totalClientes || 0, 1);
      return '<div class="report-charts">' +
        '<div class="analytics-panel"><h3>Cobranca em aberto</h3><div class="bar-line"><span>A receber</span><div><b style="width:100%"></b></div><strong>' + JW.escapeHTML(resumo.valorAbertoFormatado || JW.formatarMoeda(0)) + '</strong></div><div class="bar-line"><span>Cobrancas</span><div><b style="width:' + Math.max(18, Math.min(100, cobrancasPendentes * 12)) + '%"></b></div><strong>' + cobrancasPendentes + '</strong></div></div>' +
        '<div class="analytics-panel"><h3>Base financeira</h3><div class="bar-line"><span>Clientes ativos</span><div><b style="width:' + Math.round((clientesComLancamento / baseClientes) * 100) + '%"></b></div><strong>' + clientesComLancamento + '</strong></div><div class="bar-line"><span>Mensalidades</span><div><b style="width:' + Math.max(18, Math.min(100, mensalidades * 14)) + '%"></b></div><strong>' + mensalidades + '</strong></div></div>' +
      '</div>';
    }
    return '';
  };

          '<strong>' + JW.escapeHTML(item.cliente || "-") + '</strong>' +
          '<div class="text-muted">' + JW.escapeHTML(item.tipoServico || "-") + '</div>' +

          JW.renderRelatorioListaCompacta(cobrancas.slice(0, 10), function(item) {
            return '<article class="report-detail-item tone-financeiro">' +
              '<strong>' + JW.escapeHTML(item.clienteNome || item.clienteEmail || "Cliente") + '</strong>' +
              '<div class="text-muted">' + JW.escapeHTML(item.competencia || "-") + ' | ' + JW.escapeHTML(JW.somenteData(item.vencimento || "-")) + '</div>' +
              '<div class="text-muted">' + JW.escapeHTML(item.valorTotalFormatado || "-") + '</div>' +

        JW.cardMetrica("Total de compras", r.totalCompras || 0, "fas fa-shopping-cart", "", "metric-static") +

      var cliente = clientes[i];
      var label = (cliente.usuario || cliente.email) + (cliente.telefone ? " | " + cliente.telefone : "");
      html += '<option value="' + JW.escapeAttr(cliente.email) + '"' + (selected === cliente.email ? " selected" : "") + '>' + JW.escapeHTML(label) + '</option>';
    }
    return html;
  };

  JW.renderOptionsItensFinanceiro = function(selected) {
    var itens = JW.getItensFinanceiro().filter(function(item) { return item.ativo !== false; });
    itens.sort(function(a, b) { return String(a.nome || "").localeCompare(String(b.nome || "")); });
    var html = '<option value="">Sem item vinculado</option>';
    for (var i = 0; i < itens.length; i++) {
      var item = itens[i];
      html += '<option value="' + JW.escapeAttr(item.id) + '"' + (selected === item.id ? " selected" : "") + '>' + JW.escapeHTML(item.nome + " | " + item.valorPadraoFormatado) + '</option>';
    }
    return html;
  };

  JW.carregarFinanceiro = async function(opcoes) {
    JW.setTitulo("Financeiro");
    if (!JW.isAdmin()) {
      JW.renderMain('<div class="card"><p>Acesso restrito.</p></div>');
      return;
    }

    var dados = await JW.obterFinanceiro_(opcoes);
    JW.financeiroDados = dados || {};
    if (!dados || !dados.success) {
      JW.renderMain('<div class="card"><h3>Financeiro indisponível</h3><p class="text-muted">' + JW.escapeHTML((dados && dados.message) || "Não foi possível carregar o módulo.") + '</p></div>');
      return;
    }

    JW.renderFinanceiro();
  };

  JW.renderFinanceiroResumo = function() {
    var resumo = JW.financeiroDados && JW.financeiroDados.resumo ? JW.financeiroDados.resumo : {};
    return '<div class="dashboard-stats">' +
      JW.cardMetrica("Clientes", resumo.totalClientes || 0, "fas fa-users", "", "metric-static") +
      JW.cardMetrica("Itens", resumo.totalItens || 0, "fas fa-boxes-stacked", "", "metric-static") +
      JW.cardMetrica("Mensalidades", resumo.totalMensalidades || 0, "fas fa-repeat", "", "metric-static") +
      JW.cardMetrica("Clientes com lancamentos", resumo.totalClientesComLancamento || 0, "fas fa-file-circle-plus", "", "metric-static") +
      JW.cardMetrica("Cobrancas pendentes", resumo.totalCobrancasPendentes || 0, "fas fa-file-invoice-dollar", "", "metric-static") +
      JW.cardMetrica("A receber", resumo.valorAbertoFormatado || JW.formatarMoeda(0), "fas fa-money-bill-wave", "", "metric-static") +
    '</div>';
