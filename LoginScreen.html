<!-- LoginScreen.html -->
<div id="loginScreen">
  <div class="login-container">
    <div class="login-header">
      <h1>JW Piscinas</h1>
    </div>
    
    <div class="login-body">
      <!-- Tabs de autenticação -->
      <div class="auth-tabs" role="tablist">
        <button id="tabLoginBtn" class="auth-tab active" aria-selected="true">Entrar</button>
        <button id="tabRegisterBtn" class="auth-tab" aria-selected="false">Cadastrar</button>
      </div>

      <!-- FORMULÁRIO DE LOGIN -->
      <div id="loginForm">
        <div class="form-group">
          <label class="form-label">Usuário / E-mail / Telefone</label>
          <input id="loginUsuario" class="form-input" type="text" placeholder="Digite seu usuário, e-mail ou telefone" required>
        </div>

        <div class="form-group">
          <label class="form-label">Senha</label>
          <input id="loginSenha" class="form-input" type="password" placeholder="••••••••" required>
        </div>

        <div style="display: flex; gap: 0.75rem; margin-top: 1.5rem;">
          <button class="btn btn-secondary" style="flex: 1;" onclick="if (window.JW && JW.abrirRecuperacaoSenha) { JW.abrirRecuperacaoSenha(); } else { alert('Sistema ainda carregando. Atualize a página e tente novamente.'); }">Esqueci a senha</button>
          <button id="btnLogin" class="btn btn-primary" style="flex: 1;" onclick="if (!this.dataset.bound && window.JW && JW.fazerLogin) { JW.fazerLogin(); }">Entrar</button>
        </div>

        <div id="loginMessage" class="alert d-none" style="margin-top: 1rem;"></div>
      </div>

      <!-- FORMULÁRIO DE CADASTRO -->
      <div id="registerForm" class="d-none">
        <div class="form-group">
          <label class="form-label">Nome de usuário</label>
          <input id="registerUsuario" class="form-input" type="text" placeholder="Escolha um nome de usuário" required>
        </div>

        <div class="form-group">
          <label class="form-label">E-mail</label>
          <input id="registerEmail" class="form-input" type="email" placeholder="seu@email.com" required>
        </div>

        <div class="form-group">
          <label class="form-label">Telefone</label>
          <input id="registerTelefone" class="form-input" type="tel" placeholder="(16) 99123-4567" oninput="JW.formatarTelefone(this)" required>
        </div>

        <div class="form-group">
          <label class="form-label">Bairro</label>
          <input id="registerBairro" class="form-input" type="text" placeholder="Digite o bairro" required>
        </div>

        <div class="form-group">
          <label class="form-label">Rua, numero e cidade</label>
          <input id="registerEndereco" class="form-input" type="text" placeholder="Rua, numero, cidade" required>
        </div>

        <div class="form-group">
          <label class="form-label">Senha (mínimo 4 caracteres)</label>
          <input id="registerSenha" class="form-input" type="password" placeholder="••••••••" required>
          <small id="senhaFeedback" style="color: var(--text-muted); font-size: 0.8rem;"></small>
        </div>

        <div class="form-group">
          <label class="form-label">Confirmar senha</label>
          <input id="registerConfirmacaoSenha" class="form-input" type="password" placeholder="••••••••" required>
        </div>

        <div style="display: flex; gap: 0.75rem; margin-top: 1.5rem;">
          <button class="btn btn-secondary" style="flex: 1;" onclick="JW.mostrarLoginForm()">Voltar</button>
          <button id="btnRegister" class="btn btn-primary" style="flex: 1;" onclick="if (!this.dataset.bound && window.JW && JW.fazerCadastro) { JW.fazerCadastro(); }">Criar Conta</button>
        </div>

        <div id="registerMessage" class="alert d-none" style="margin-top: 1rem;"></div>
      </div>
    </div>
  </div>
</div>
