<!-- MainApp.html -->
<div id="mainApp" class="d-none">
  <div class="app-container">
    <div class="main-content">
      <header class="content-header">
        <div style="display: flex; align-items: center; gap: 1rem;">
          <h2 id="currentPageTitle" style="font-weight: 600;">Início</h2>
        </div>
        <div style="display: flex; align-items: center; gap: 1rem;">
          <button id="btnInstallPwaHeader" class="btn btn-secondary btn-sm d-none" onclick="JW.instalarPWA()" title="Instalar aplicativo">
            <i class="fas fa-download"></i>
            <span class="d-none d-md-inline">Instalar</span>
          </button>
          <button id="btnOpenAmbientMusic" class="btn btn-secondary btn-sm ambient-music-open-button" type="button" onclick="JW.togglePainelMusicaAmbiente()" title="Controles da musica ambiente">
            <i id="ambientMusicHeaderIcon" class="fas fa-volume-high"></i>
            <span class="ambient-music-open-label">Musica</span>
          </button>
          <div class="notifications-panel">
            <button class="notifications-icon" onclick="JW.toggleNotifications()">
              <i class="fas fa-bell"></i>
              <span class="notifications-count d-none" id="notificationsCount">0</span>
            </button>
            <div class="notifications-dropdown" id="notificationsDropdown">
              <div class="notifications-header" style="padding: var(--md); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: var(--sm); flex-wrap: wrap;">
                <span><i class="fas fa-bell"></i> Notificacoes</span>
                <div class="notifications-header-actions">
                  <button class="btn btn-sm btn-secondary" onclick="JW.marcarTodasLidas()">Marcar todas como lidas</button>
                </div>
              </div>
              <div class="notifications-list" id="notificationsList">
                <div class="text-center" style="padding: 2rem; color: var(--text-muted);">
                  <i class="fas fa-bell-slash" style="font-size: 2rem; margin-bottom: 0.5rem;"></i>
                  <p>Nenhuma notificacao</p>
                </div>
              </div>
            </div>
          </div>
          <button id="btnLogout" class="btn btn-secondary btn-sm">
            <i class="fas fa-sign-out-alt"></i>
            <span class="d-none d-md-inline">Sair</span>
          </button>
        </div>
      </header>
      <main id="mainContent" class="content-area">
        <div class="card text-center">
          <div style="display:flex;flex-direction:column;align-items:center;gap:.5rem;">
            <div class="loading-spinner-modern" style="width:40px;height:40px;"></div>
            <div class="text-muted">Carregando sistema...</div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <aside id="ambientMusicPanel" class="ambient-music-panel d-none" aria-label="Musica ambiente">
    <div class="ambient-music-header">
      <div>
        <strong>Musica ambiente</strong>
        <small id="ambientMusicStatus">Preparando audio ambiente...</small>
      </div>
      <button type="button" onclick="JW.fecharMusicaAmbiente()" title="Fechar controles de musica" aria-label="Fechar controles de musica">&times;</button>
    </div>
    <div class="ambient-music-body">
      <div class="ambient-music-controls">
        <button type="button" class="ambient-music-control-btn" onclick="JW.diminuirVolumeMusicaAmbiente()" title="Diminuir volume" aria-label="Diminuir volume">
          <i class="fas fa-minus"></i>
        </button>
        <input id="ambientMusicVolumeRange" class="ambient-music-volume-range" type="range" min="0" max="100" step="5" value="35" oninput="JW.definirVolumeMusicaAmbiente(this.value / 100)" aria-label="Volume da musica ambiente">
        <button type="button" class="ambient-music-control-btn" onclick="JW.aumentarVolumeMusicaAmbiente()" title="Aumentar volume" aria-label="Aumentar volume">
          <i class="fas fa-plus"></i>
        </button>
      </div>
      <div class="ambient-music-meta">
        <button id="ambientMusicMuteBtn" type="button" class="btn btn-secondary btn-sm" onclick="JW.toggleMuteMusicaAmbiente()">
          <i id="ambientMusicMuteIcon" class="fas fa-volume-high"></i>
          <span id="ambientMusicMuteLabel">Mutar</span>
        </button>
        <span id="ambientMusicVolumeLabel">35%</span>
      </div>
      <p class="ambient-music-hint">A musica toca em segundo plano e voce pode ajustar o volume quando quiser.</p>
    </div>
  </aside>
</div>
