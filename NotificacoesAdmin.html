<!-- NotificacoesAdmin.html -->
<div class="slide-up">
  <h2><i class="fas fa-bell"></i> Central de Notificações</h2>
  
  <div class="card">
    <h3><i class="fas fa-paper-plane"></i> Enviar Nova Notificação</h3>
    
    <div class="form-group">
      <label class="form-label">Título</label>
      <input id="notifTitulo" class="form-input" type="text" placeholder="Ex: Promoção de Verão">
    </div>
    
    <div class="form-group">
      <label class="form-label">Mensagem</label>
      <textarea id="notifMensagem" class="form-textarea" rows="4" placeholder="Digite a mensagem..."></textarea>
    </div>
    
    <div class="form-group">
      <label class="form-label">Tipo</label>
      <select id="notifTipo" class="form-select">
        <option value="info">📌 Informação</option>
        <option value="promocao">🎉 Promoção</option>
        <option value="aviso">⚠️ Aviso</option>
        <option value="lembrete">📅 Lembrete</option>
      </select>
    </div>
    
    <div class="form-group">
      <label class="form-label">Destinatários</label>
      <select id="notifDestinatarios" class="form-select">
        <option value="todos">Todos os usuários</option>
        <option value="clientes">Apenas clientes</option>
        <option value="admin">Apenas administradores</option>
      </select>
    </div>
    
    <div class="form-group">
      <label class="form-label">
        <input type="checkbox" id="notifEnviarEmail"> Enviar também por e-mail
      </label>
    </div>
    
    <div class="form-group">
      <label class="form-label">Link de ação (opcional)</label>
      <input id="notifAcao" class="form-input" type="text" placeholder="Ex: tab:loja ou https://...">
    </div>
    
    <button class="btn btn-success" onclick="JW.enviarNotificacao()">
      <i class="fas fa-paper-plane"></i> Enviar Notificação
    </button>
  </div>
  
  <div class="card">
    <h3><i class="fas fa-history"></i> Histórico de Notificações</h3>
    <div id="historicoNotificacoes" class="list">
      <div class="text-center" style="padding: 2rem; color: var(--text-muted);">
        <i class="fas fa-bell-slash" style="font-size: 2rem; margin-bottom: 0.5rem;"></i>
        <p>Nenhuma notificação enviada</p>
      </div>
    </div>
  </div>
</div>
