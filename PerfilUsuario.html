<!-- PerfilUsuario.html -->
<div class="slide-up">
  <h2><i class="fas fa-user-circle"></i> Meu Perfil</h2>
  
  <div class="card">
    <div class="profile-header">
      <div class="profile-avatar-container" onclick="document.getElementById('avatarUpload').click()">
        <div class="profile-avatar" id="profileAvatar">
          <span id="profileAvatarText">U</span>
          <img id="profileAvatarImg" src="" style="display: none;" alt="Avatar">
        </div>
        <div class="avatar-upload-overlay">
          <i class="fas fa-camera"></i> Alterar foto
        </div>
        <input type="file" id="avatarUpload" accept="image/*" style="display: none;" onchange="JW.processarAvatar(this)">
      </div>
      
      <div class="profile-info">
        <h1 class="profile-name" id="profileName">Carregando...</h1>
        <div class="profile-email">
          <i class="fas fa-envelope"></i> <span id="profileEmail">carregando@email.com</span>
        </div>
        <div class="profile-phone">
          <i class="fas fa-phone"></i> <span id="profilePhone">(16) 99999-9999</span>
        </div>
      </div>
    </div>

    <div style="border-top: 1px solid var(--border); padding-top: 1.5rem; margin-top: 1rem;">
      <h3>Editar Informações</h3>
      
      <div class="form-group">
        <label class="form-label">Nome de usuário</label>
        <input id="editUsuario" class="form-input" type="text">
      </div>

      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input id="editEmail" class="form-input" type="email">
      </div>

      <div class="form-group">
        <label class="form-label">Telefone</label>
        <input id="editTelefone" class="form-input" type="tel" oninput="JW.formatarTelefone(this)">
      </div>

      <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
        <button class="btn btn-success" onclick="JW.salvarPerfil()">
          <i class="fas fa-save"></i> Salvar Alterações
        </button>
        <button class="btn btn-primary" onclick="JW.abrirModalAlterarSenha()">
          <i class="fas fa-key"></i> Alterar Senha
        </button>
      </div>
    </div>
  </div>

  <!-- Estatísticas do usuário -->
  <div class="card">
    <h3>Minhas Estatísticas</h3>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="statsOrcamentos">0</div>
        <div class="stat-label">Orçamentos</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statsCompras">0</div>
        <div class="stat-label">Compras</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statsServicos">0</div>
        <div class="stat-label">Serviços</div>
      </div>
    </div>
  </div>
</div>
