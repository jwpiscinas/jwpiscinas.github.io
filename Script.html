<script>
window.__jwScriptStarted = true;
console.log("🚀 SCRIPT CARREGADO - Data: " + new Date().toLocaleString());
console.log("🚀 google.script.run disponível:", typeof google !== 'undefined' ? "SIM" : "NÃO");

var JW = JW || {};
var JW = JW || {};



(function() {
    'use strict';

    JW.usuarioLogado = null;
    JW.produtoAtual = null;
    JW.isLoading = false;
    JW.recoveryData = { email: '', codigo: '' };
    JW.notificacoes = [];
    JW.orcamentoAnexo = null;

    // ============================================
    // UTILIDADES
    // ============================================
    
    JW.mostrarLoading = function(mensagem) {
        mensagem = mensagem || 'Carregando...';
        if (JW.isLoading) return;
        JW.isLoading = true;
        var loadingText = document.getElementById('loadingText');
        if (loadingText) loadingText.textContent = mensagem;
        var overlay = document.getElementById('loadingOverlay');
        if (overlay) overlay.classList.add('active');
    };

    JW.mostrarAvisoSistema = function(mensagem, tipo) {
        tipo = tipo || 'info';
        var toast = document.getElementById('systemToast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'systemToast';
            toast.className = 'system-toast';
            document.body.appendChild(toast);
        }
        toast.className = 'system-toast system-toast-' + tipo + ' active';
        toast.textContent = (mensagem || '').toString().replace(/^[✅❌]\s*/, '');
        clearTimeout(JW.toastTimer);
        JW.toastTimer = setTimeout(function() {
            toast.classList.remove('active');
        }, 4500);
    };

    window.alert = function(mensagem) {
        var texto = (mensagem || '').toString();
        var tipo = texto.indexOf('❌') !== -1 || texto.toLowerCase().indexOf('erro') !== -1 ? 'error' : 'success';
        JW.mostrarAvisoSistema(texto, tipo);
    };

    JW.esconderLoading = function() {
        JW.isLoading = false;
        setTimeout(function() {
            var overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.classList.remove('active');
        }, 300);
    };

    JW.mostrarMensagem = function(elemento, mensagem, tipo) {
        tipo = tipo || 'success';
        var el = document.getElementById(elemento);
        if (!el) return;
        el.textContent = mensagem;
        el.className = 'alert alert-' + tipo;
        el.style.display = 'block';
        if (tipo === 'success') {
            setTimeout(function() { el.style.display = 'none'; }, 5000);
        }
    };

    JW.mostrarModal = function(modalId) {
        var modal = document.getElementById(modalId);
        var backdrop = document.getElementById('modalBackdrop');
        if (modal) {
            modal.classList.remove('d-none');
            modal.classList.add('active');
        }
        if (backdrop) {
            backdrop.classList.remove('d-none');
            backdrop.classList.add('active');
        }
    };

    JW.fecharModal = function(modalId) {
        var modal = document.getElementById(modalId);
        var backdrop = document.getElementById('modalBackdrop');
        if (modal) {
            modal.classList.remove('active');
            modal.classList.add('d-none');
        }
        if (backdrop) {
            backdrop.classList.remove('active');
            backdrop.classList.add('d-none');
        }
    };

    JW.atualizarEstadoMenuMobile = function(aberto) {
        var toggle = document.getElementById('mobileMenuToggle');
        document.body.classList.toggle('sidebar-open', !!aberto);
        if (toggle) {
            toggle.setAttribute('aria-expanded', aberto ? 'true' : 'false');
        }
    };

    JW.toggleMobileMenu = function() {
        if (window.innerWidth <= 768) {
            document.body.classList.remove('sidebar-collapsed');
        }
        JW.atualizarEstadoMenuMobile(!document.body.classList.contains('sidebar-open'));
    };

    JW.fecharSidebarMobile = function() {
        if (window.innerWidth <= 768) {
            JW.atualizarEstadoMenuMobile(false);
        }
    };

    JW.formatarTelefone = function(input) {
        var value = input.value.replace(/\D/g, '');
        if (value.length > 11) value = value.substring(0, 11);
        if (value.length > 10) {
            value = value.replace(/^(\d{2})(\d{5})(\d{4})$/, '($1) $2-$3');
        } else if (value.length > 6) {
            value = value.replace(/^(\d{2})(\d{4})(\d{0,4})$/, '($1) $2-$3');
        } else if (value.length > 2) {
            value = value.replace(/^(\d{2})(\d{0,5})$/, '($1) $2');
        } else if (value.length > 0) {
            value = value.replace(/^(\d{0,2})/, '($1');
        }
        input.value = value;
    };

    JW.chamarGoogleScript = function(funcao) {
        var args = Array.prototype.slice.call(arguments, 1);
        return new Promise(function(resolve, reject) {
            google.script.run
                .withSuccessHandler(resolve)
                .withFailureHandler(reject)
                [funcao].apply(null, args);
        });
    };

    JW.extrairLista = function(retorno, chaves) {
        if (Array.isArray(retorno)) return retorno;
        if (!retorno || typeof retorno !== 'object') return [];
        chaves = chaves || ['itens', 'lista', 'data', 'historico', 'notificacoes'];
        for (var i = 0; i < chaves.length; i++) {
            if (Array.isArray(retorno[chaves[i]])) return retorno[chaves[i]];
        }
        return [];
    };

    JW.formatarMoeda = function(valor) {
        var texto = (valor || 0).toString().replace('R$', '').replace(/\s/g, '');
        if (texto.indexOf(',') !== -1) texto = texto.replace(/\./g, '').replace(',', '.');
        var numero = typeof valor === 'number' ? valor : parseFloat(texto) || 0;
        return 'R$ ' + numero.toFixed(2).replace('.', ',');
    };

    JW.escapeHTML = function(valor) {
        return (valor || '').toString()
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    };

    JW.textoSeguro = function(valor, padrao) {
        if (valor === null || valor === undefined || valor === '') return padrao || '';
        return valor;
    };

    // ============================================
    // MENU DINÂMICO
    // ============================================

    JW.carregarMenuDinamico = function() {
        var menuContainer = document.getElementById('dynamicMenu');
        if (!menuContainer) return;
        
        var isAdmin = JW.usuarioLogado && JW.usuarioLogado.tipo === "Administrador";
        var menuHTML = '';
        
        // Menu base para todos
        menuHTML += `
            <a href="#" class="nav-item" data-tab="inicio">
                <i class="fas fa-tachometer-alt"></i>
                <span>${isAdmin ? 'Dashboard' : 'Início'}</span>
            </a>
            <a href="#" class="nav-item" data-tab="solicitar-orcamento">
                <i class="fas fa-file-invoice-dollar"></i>
                <span>Orçamentos</span>
            </a>
            <a href="#" class="nav-item" data-tab="produtos">
                <i class="fas fa-shopping-cart"></i>
                <span>Produtos</span>
            </a>
            <a href="#" class="nav-item" data-tab="historico">
                <i class="fas fa-history"></i>
                <span>Histórico</span>
            </a>
            <a href="#" class="nav-item" data-tab="manuais">
                <i class="fas fa-book"></i>
                <span>Manuais</span>
            </a>
        `;
        
        // Menu ADMIN com itens em desenvolvimento
        if (isAdmin) {
            menuHTML += `
                <a href="#" class="nav-item dev-mode" data-tab="tecnicos">
                    <i class="fas fa-users"></i>
                    <span>Técnicos</span>
                </a>
                <a href="#" class="nav-item" data-tab="ordem-servico">
                    <i class="fas fa-clipboard-list"></i>
                    <span>Pendências</span>
                </a>
                <a href="#" class="nav-item" data-tab="relatorios">
                    <i class="fas fa-chart-line"></i>
                    <span>Relatórios</span>
                </a>
                <a href="#" class="nav-item" data-tab="admin">
                    <i class="fas fa-cog"></i>
                    <span>Admin</span>
                </a>
            `;
        }
        
        menuContainer.innerHTML = menuHTML;
        
        var navItems = document.querySelectorAll('.nav-item');
        for (var i = 0; i < navItems.length; i++) {
            navItems[i].addEventListener('click', function(e) {
                e.preventDefault();
                if (!JW.isLoading) {
                    JW.abrirTab(this.dataset.tab);
                }
            });
        }
    };

        // ============================================
    // LOGIN E CADASTRO
    // ============================================

    JW.fazerLogin = async function() {
        var usuario = document.getElementById('loginUsuario').value.trim();
        var senha = document.getElementById('loginSenha').value;

        if (!usuario || !senha) {
            JW.mostrarMensagem('loginMessage', 'Preencha todos os campos!', 'error');
            return;
        }

        JW.mostrarLoading('Entrando no sistema...');

        try {
            var resultado = await JW.chamarGoogleScript('verificarLogin', { usuario: usuario, senha: senha });
            JW.esconderLoading();
            
            if (resultado && resultado.success) {
                JW.mostrarMensagem('loginMessage', '✅ ' + resultado.message, 'success');
                JW.usuarioLogado = resultado;
                
                document.getElementById('sidebarUserName').textContent = JW.usuarioLogado.usuario;
                document.getElementById('sidebarUserRole').textContent = JW.usuarioLogado.tipo || 'Cliente';
                
                document.getElementById('loginUsuario').value = '';
                document.getElementById('loginSenha').value = '';
                
                setTimeout(function() { JW.entrarNoSistema(); }, 500);
            } else {
                JW.mostrarMensagem('loginMessage', '❌ ' + (resultado ? resultado.message : 'Erro ao fazer login'), 'error');
            }
        } catch (error) {
            JW.esconderLoading();
            JW.mostrarMensagem('loginMessage', '❌ Erro: ' + error.message, 'error');
        }
    };

    JW.fazerCadastro = async function() {
        var usuario = document.getElementById('registerUsuario').value.trim();
        var email = document.getElementById('registerEmail').value.trim();
        var senha = document.getElementById('registerSenha').value;
        var confirmacaoSenha = document.getElementById('registerConfirmacaoSenha').value;
        var telefone = document.getElementById('registerTelefone').value.trim();

        if (!usuario || !email || !senha || !confirmacaoSenha || !telefone) {
            JW.mostrarMensagem('registerMessage', 'Preencha todos os campos!', 'error');
            return;
        }

        if (usuario.length < 3) {
            JW.mostrarMensagem('registerMessage', 'Nome de usuário deve ter pelo menos 3 caracteres', 'error');
            return;
        }

        if (senha.length < 4) {
            JW.mostrarMensagem('registerMessage', 'Senha deve ter pelo menos 4 caracteres', 'error');
            return;
        }

        if (senha.startsWith('0')) {
            JW.mostrarMensagem('registerMessage', 'A senha não pode começar com zero!', 'error');
            return;
        }

        if (senha !== confirmacaoSenha) {
            JW.mostrarMensagem('registerMessage', 'As senhas não coincidem!', 'error');
            return;
        }

        var telefoneNumeros = telefone.replace(/\D/g, '');
        if (telefoneNumeros.length < 10) {
            JW.mostrarMensagem('registerMessage', 'Telefone inválido! Digite DDD + número', 'error');
            return;
        }

        JW.mostrarLoading('Criando sua conta...');

        try {
            var resultado = await JW.chamarGoogleScript('cadastrarUsuario', {
                usuario: usuario, email: email, senha: senha,
                confirmacaoSenha: confirmacaoSenha, telefone: telefone
            });
            JW.esconderLoading();
            
            if (resultado && resultado.success) {
                JW.mostrarMensagem('registerMessage', '✅ ' + resultado.message, 'success');
                document.getElementById('loginUsuario').value = usuario;
                document.getElementById('loginSenha').value = senha;
                setTimeout(function() { JW.mostrarLoginForm(); JW.fazerLogin(); }, 1500);
            } else {
                JW.mostrarMensagem('registerMessage', '❌ ' + (resultado ? resultado.message : 'Erro ao cadastrar'), 'error');
            }
        } catch (error) {
            JW.esconderLoading();
            JW.mostrarMensagem('registerMessage', '❌ Erro: ' + error.message, 'error');
        }
    };

    JW.validarSenhaCadastro = function() {
        var senha = document.getElementById('registerSenha').value;
        var feedback = document.getElementById('senhaFeedback');
        if (!feedback) return true;
        if (senha.startsWith('0')) {
            feedback.innerHTML = '❌ A senha não pode começar com zero!';
            feedback.style.color = '#dc3545';
            return false;
        }
        if (senha.length < 4) {
            feedback.innerHTML = '⚠️ A senha deve ter pelo menos 4 caracteres';
            feedback.style.color = '#ffc107';
            return false;
        }
        feedback.innerHTML = '✅ Senha válida';
        feedback.style.color = '#28a745';
        return true;
    };

    JW.mostrarLoginForm = function() {
        var loginForm = document.getElementById('loginForm');
        var registerForm = document.getElementById('registerForm');
        var tabLogin = document.getElementById('tabLoginBtn');
        var tabRegister = document.getElementById('tabRegisterBtn');
        if (loginForm) loginForm.classList.remove('d-none');
        if (registerForm) registerForm.classList.add('d-none');
        if (tabLogin) tabLogin.classList.add('active');
        if (tabRegister) tabRegister.classList.remove('active');
    };

    JW.mostrarRegisterForm = function() {
        var loginForm = document.getElementById('loginForm');
        var registerForm = document.getElementById('registerForm');
        var tabLogin = document.getElementById('tabLoginBtn');
        var tabRegister = document.getElementById('tabRegisterBtn');
        if (loginForm) loginForm.classList.add('d-none');
        if (registerForm) registerForm.classList.remove('d-none');
        if (tabLogin) tabLogin.classList.remove('active');
        if (tabRegister) tabRegister.classList.add('active');
    };

    JW.entrarNoSistema = function() {
        document.body.classList.add('logged-in');
        var loginScreen = document.getElementById('loginScreen');
        var mainApp = document.getElementById('mainApp');
        if (loginScreen) loginScreen.classList.add('d-none');
        if (mainApp) mainApp.classList.remove('d-none');
        document.body.classList.toggle('admin-mode', JW.usuarioLogado.tipo === "Administrador");
        
        JW.carregarMenuDinamico();
        JW.carregarNotificacoes();
        
        if (JW.usuarioLogado.tipo === "Administrador") {
            JW.abrirTab('inicio');
        } else {
            JW.abrirTab('inicio');
        }
    };

    JW.fazerLogout = function() {
        document.body.classList.remove('logged-in');
        document.body.classList.remove('admin-mode');
        document.body.classList.remove('sidebar-open');
        JW.usuarioLogado = null;
        var mainApp = document.getElementById('mainApp');
        var loginScreen = document.getElementById('loginScreen');
        if (mainApp) mainApp.classList.add('d-none');
        if (loginScreen) loginScreen.classList.remove('d-none');
        JW.mostrarLoginForm();
        JW.mostrarMensagem('loginMessage', 'Logout realizado com sucesso!', 'success');
    };

        // ============================================
    // NAVEGAÇÃO
    // ============================================

    JW.atualizarNavegacaoAtiva = function(tab) {
        var items = document.querySelectorAll('.nav-item');
        for (var i = 0; i < items.length; i++) {
            items[i].classList.remove('active');
            if (items[i].dataset.tab === tab) items[i].classList.add('active');
        }
        
        var isAdmin = JW.usuarioLogado && JW.usuarioLogado.tipo === "Administrador";
        var titles = {
            'inicio': isAdmin ? 'Dashboard' : 'Início',
            'solicitar-orcamento': 'Orçamentos',
            'produtos': 'Produtos',
            'historico': 'Histórico',
            'manuais': 'Manuais',
            'tecnicos': 'Técnicos',
            'ordem-servico': 'Pendências',
            'relatorios': 'Relatórios',
            'admin': 'Administração',
            'perfil': 'Meu Perfil'
        };
        
        var titleEl = document.getElementById('currentPageTitle');
        if (titleEl) titleEl.textContent = titles[tab] || 'JW Piscinas';
    };

    JW.abrirTab = async function(tab) {
        if (!JW.usuarioLogado || JW.isLoading) return;
        JW.atualizarNavegacaoAtiva(tab);
        
        try {
            switch(tab) {
                case 'inicio':
                    if (JW.usuarioLogado.tipo === "Administrador") {
                        await JW.carregarDashboardAdmin();
                    } else {
                        await JW.carregarInicioCliente();
                    }
                    break;
                case 'solicitar-orcamento':
                    document.getElementById('mainContent').innerHTML = JW.getTemplateOrcamento();
                    break;
                case 'produtos':
                    await JW.carregarProdutos();
                    break;
                case 'historico':
                    await JW.carregarHistorico();
                    break;
                case 'manuais':
                    await JW.carregarManuais();
                    break;
                case 'ordem-servico':
                    if (JW.usuarioLogado.tipo === "Administrador") {
                        await JW.carregarCentralAdmin();
                    } else {
                        document.getElementById('mainContent').innerHTML = JW.getTemplateAcessoNegado();
                    }
                    break;
                case 'relatorios':
                    if (JW.usuarioLogado.tipo === "Administrador") {
                        await JW.carregarRelatorios();
                    } else {
                        document.getElementById('mainContent').innerHTML = JW.getTemplateAcessoNegado();
                    }
                    break;
                case 'tecnicos':
                    JW.mostrarModuloEmDesenvolvimento(tab);
                    break;
                case 'admin':
                    if (JW.usuarioLogado.tipo === "Administrador") {
                        await JW.carregarAdmin();
                    } else {
                        document.getElementById('mainContent').innerHTML = JW.getTemplateAcessoNegado();
                    }
                    break;
                case 'perfil':
                    await JW.carregarPerfil();
                    break;
                default:
                    if (JW.usuarioLogado.tipo === "Administrador") {
                        await JW.carregarDashboardAdmin();
                    } else {
                        await JW.carregarInicioCliente();
                    }
            }
            JW.fecharSidebarMobile();
        } catch (error) {
            console.error('Erro ao carregar tab:', error);
            document.getElementById('mainContent').innerHTML = JW.getTemplateErro(tab, error.message);
            JW.fecharSidebarMobile();
        }
    };

    // ============================================
    // MÓDULO EM DESENVOLVIMENTO
    // ============================================

    JW.mostrarModuloEmDesenvolvimento = function(tab) {
        var titulos = {
            'tecnicos': 'Técnicos',
            'ordem-servico': 'Ordem de Serviço',
            'relatorios': 'Relatórios'
        };
        
        var nomeModulo = titulos[tab] || 'Módulo';
        
        document.getElementById('mainContent').innerHTML = `
            <div class="dev-message">
                <i class="fas fa-code"></i>
                <h3>Módulo em Desenvolvimento</h3>
                <p>O módulo de ${nomeModulo} estará disponível em breve. Você poderá visualizar métricas de faturamento, desempenho de técnicos e mais.</p>
                <div class="mt-4">
                    <i class="fas fa-spinner fa-pulse"></i> Em breve novidades!
                </div>
            </div>
        `;
    };

        // ============================================
    // DASHBOARD ADMIN
    // ============================================

    JW.carregarDashboardAdmin = async function() {
        try {
            var clientes = await JW.chamarGoogleScript('listarClientesAtivos');
            var ordensServico = await JW.chamarGoogleScript('getAllOrdensServico');
            var tecnicos = await JW.chamarGoogleScript('getTecnicosAtivos');
            var pagamentosPendentes = await JW.chamarGoogleScript('getPagamentosPendentes');
            var agenda = await JW.chamarGoogleScript('getProximosAgendamentos');
            
            var clientesAtivos = (clientes && clientes.success && clientes.clientes) ? clientes.clientes.length : 0;
            
            var ordensAtivas = 0;
            var ordensRecentes = [];
            if (ordensServico && ordensServico.length > 0) {
                for (var i = 0; i < ordensServico.length; i++) {
                    var status = ordensServico[i].status;
                    if (status === 'Agendado' || status === 'Em Andamento' || status === 'Pendente') {
                        ordensAtivas++;
                    }
                }
                ordensRecentes = ordensServico.slice(0, 5);
            }
            
            var tecnicosAtivos = tecnicos ? tecnicos.length : 0;
            
            var valorAReceber = 0;
            if (pagamentosPendentes && pagamentosPendentes.length > 0) {
                for (var i = 0; i < pagamentosPendentes.length; i++) {
                    var valor = parseFloat(pagamentosPendentes[i].valor) || 0;
                    valorAReceber += valor;
                }
            }
            
            var ordensRecentesHTML = '';
            if (ordensRecentes.length > 0) {
                for (var i = 0; i < ordensRecentes.length; i++) {
                    var ordem = ordensRecentes[i];
                    var statusClass = ordem.status === 'Concluído' ? 'badge-success' : 
                                     (ordem.status === 'Cancelado' ? 'badge-danger' : 'badge-warning');
                    ordensRecentesHTML += `
                        <div class="list-item">
                            <div>
                                <div style="font-weight:600;">${ordem.id || 'OS-' + (i+1)}</div>
                                <div class="text-muted">${ordem.cliente || 'Cliente'}</div>
                                <div class="text-muted">${ordem.dataAbertura || ''}</div>
                            </div>
                            <span class="badge ${statusClass}">${ordem.status || 'Pendente'}</span>
                        </div>
                    `;
                }
            } else {
                ordensRecentesHTML = '<div class="text-center text-muted">Nenhuma ordem recente</div>';
            }
            
            var agendaHTML = '';
            if (agenda && agenda.length > 0) {
                for (var i = 0; i < agenda.length; i++) {
                    var ag = agenda[i];
                    agendaHTML += `
                        <div class="list-item">
                            <div>
                                <div style="font-weight:600;">${ag.data || ''} às ${ag.hora || ''}</div>
                                <div class="text-muted">${ag.cliente || 'Cliente'}</div>
                                <div class="text-muted">${ag.servico || 'Serviço'}</div>
                            </div>
                            <span class="badge badge-info">${ag.status || 'Agendado'}</span>
                        </div>
                    `;
                }
            } else {
                agendaHTML = '<div class="text-center text-muted">Nenhum agendamento próximo</div>';
            }
            
            document.getElementById('mainContent').innerHTML = `
                <div class="slide-up">
                    <div class="dashboard-welcome">
                        <h2>Dashboard</h2>
                        <p>Bem-vindo ao painel administrativo, ${JW.usuarioLogado.usuario}!</p>
                    </div>
                    
                    <div class="dashboard-stats">
                        <div class="dashboard-card">
                            <i class="fas fa-users"></i>
                            <div class="dashboard-card-value">${clientesAtivos}</div>
                            <div class="text-muted">Clientes Ativos</div>
                        </div>
                        <div class="dashboard-card">
                            <i class="fas fa-clipboard-list"></i>
                            <div class="dashboard-card-value">${ordensAtivas}</div>
                            <div class="text-muted">Ordens Ativas</div>
                        </div>
                        <div class="dashboard-card">
                            <i class="fas fa-user-cog"></i>
                            <div class="dashboard-card-value">${tecnicosAtivos}</div>
                            <div class="text-muted">Técnicos</div>
                        </div>
                        <div class="dashboard-card">
                            <i class="fas fa-money-bill-wave"></i>
                            <div class="dashboard-card-value">R$ ${valorAReceber.toFixed(2)}</div>
                            <div class="text-muted">A Receber</div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <h3><i class="fas fa-clock"></i> Ordens Recentes</h3>
                        <div class="recent-list">
                            ${ordensRecentesHTML}
                        </div>

    JW.getPrecoVendaProduto = function(produto) {
        var precoOriginal = produto && produto.preco ? parseFloat(produto.preco) : 0;
        var precoDesconto = produto && produto.precoComDesconto ? parseFloat(produto.precoComDesconto) : 0;
        return precoDesconto > 0 && precoDesconto < precoOriginal ? precoDesconto : precoOriginal;
    };

    JW.confirmarCompra = async function() {
        console.log("🛒 [DEBUG] confirmarCompra chamado!");
        
        if (!JW.produtoAtual) {
            console.error("❌ [DEBUG] Nenhum produto selecionado!");
            alert('❌ Nenhum produto selecionado!');
            return;
        }
        
        var quantidade = parseInt(document.getElementById('modalProdutoQuantidade').value) || 1;
        var precoUnitario = JW.getPrecoVendaProduto(JW.produtoAtual);
        
        console.log("📦 [DEBUG] Dados da compra:", {
            produto: JW.produtoAtual.nome,
            quantidade: quantidade,
            preco: precoUnitario,
            estoque: JW.produtoAtual.estoque
        });
        
        if (quantidade < 1) {
            alert('❌ Quantidade inválida!');
            return;
        }
        
        if (quantidade > (JW.produtoAtual.estoque || 0)) {
            alert('❌ Quantidade maior que o estoque disponível!');
            return;
        }
        
        JW.mostrarLoading('Processando compra...');
        
        try {
            var resultado = await JW.chamarGoogleScript('registrarCompra', {
                cliente: JW.usuarioLogado.usuario,
                email: JW.usuarioLogado.email,
                produtos: JSON.stringify([{
                    id: JW.produtoAtual.id,
                    nome: JW.produtoAtual.nome,
                    preco: precoUnitario,
                    quantidade: quantidade
                }])
            });
            
            console.log("✅ [DEBUG] Resultado da compra:", resultado);
            JW.fecharModal('modalComprar');
            
            if (resultado && resultado.success) {
                alert(`✅ Compra realizada!\n\nID: ${resultado.id}\nTotal: R$ ${resultado.valorTotal}`);
                // Recarregar produtos para atualizar estoque
                JW.carregarProdutos();
            } else {
                alert('❌ ' + (resultado ? resultado.message : 'Erro ao processar compra'));

        } catch (error) {
            console.error("❌ [DEBUG] Erro na compra:", error);
            alert('❌ Erro: ' + error.message);
        } finally {
            JW.esconderLoading();
        }
    };

JW.normalizarTipoHistorico = function(tipo) {
    return (tipo || '')
        .toString()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toLowerCase();
};

JW.carregarHistorico = async function() {
    try {
        console.log("=== CARREGANDO HISTÓRICO ===");
        
        if (!JW.usuarioLogado) {
            console.error("Usuário não logado");
            return;
        }
        
        var email = JW.usuarioLogado.email;
        console.log("Email do usuário:", email);
        
        document.getElementById('mainContent').innerHTML = '<div class="card text-center"><div class="loading-spinner-modern" style="margin:20px auto;"></div><p>Carregando histórico...</p></div>';
        
        var retornoHistorico = await JW.chamarGoogleScript('getHistoricoCompletoUsuarioV3', email);
        var historico = JW.extrairLista(retornoHistorico, ['itens', 'historico']);
        if (!historico.length) {
            historico = JW.extrairLista(await JW.chamarGoogleScript('getHistoricoCompletoUsuarioV2', email));
        }
        
        console.log("Histórico retornado:", historico);
        console.log("Quantidade:", historico ? historico.length : 0);
        
        if (!historico || historico.length === 0) {
            document.getElementById('mainContent').innerHTML = `
                <div class="slide-up">
                    <h2><i class="fas fa-history"></i> Meu Histórico</h2>
                    <div class="card text-center">
                        <i class="fas fa-inbox" style="font-size: 4rem; color: var(--text-muted); margin: 2rem 0 1rem;"></i>
                        <h3>Nenhum registro encontrado</h3>
                        <p class="text-muted">Você ainda não possui orçamentos, compras ou serviços.</p>
                        <button class="btn btn-primary mt-3" onclick="JW.abrirTab('solicitar-orcamento')">Solicitar Orçamento</button>
                    </div>
                </div>
            `;
            return;
        }
        
        var orcamentosCount = historico.filter(function(i) { return JW.normalizarTipoHistorico(i.tipo) === 'orcamento'; }).length;
        var comprasCount = historico.filter(function(i) { return i.tipo === 'Compra'; }).length;
        var servicosCount = historico.filter(function(i) { return JW.normalizarTipoHistorico(i.tipo) === 'servico'; }).length;
        
        var html = `
            <div class="slide-up">
                <h2><i class="fas fa-history"></i> Meu Histórico</h2>
                <div class="card">
                    <div class="filters-container">
                        <div class="filters-title">
                            <i class="fas fa-filter"></i> Filtrar por Tipo
                        </div>
                        <div class="filters-buttons" id="filtrosHistorico">
                            <button class="filter-btn active" data-filtro="todos">Todos (${historico.length})</button>
                            <button class="filter-btn" data-filtro="Orçamento">Orçamentos (${orcamentosCount})</button>

                var filtro = this.dataset.filtro;
                document.querySelectorAll('#filtrosHistorico .filter-btn').forEach(function(b) { b.classList.remove('active'); });
                this.classList.add('active');
                JW.renderizarHistoricoCompleto(filtro);
            };

};

JW.renderizarHistoricoCompleto = function(filtro) {
    var container = document.getElementById('listaHistorico');
    if (!container) return;
    
    var itens = JW.historicoCompleto;
    
    if (filtro !== 'todos') {
        var filtroNormalizado = JW.normalizarTipoHistorico(filtro);
        itens = itens.filter(function(i) { return JW.normalizarTipoHistorico(i.tipo) === filtroNormalizado; });
    }
    
    if (itens.length === 0) {
        container.innerHTML = '<div class="text-center p-5"><i class="fas fa-search" style="font-size: 3rem; color: var(--text-muted);"></i><p class="mt-3">Nenhum registro encontrado para este filtro.</p></div>';
        return;
    }
    
    var html = '<div class="list">';
    
    for (var i = 0; i < itens.length; i++) {
        var item = itens[i];
        
        var badgeClass = 'badge-warning';
        if (item.status === 'Aprovado' || item.status === 'Concluído' || item.status === 'Entregue') badgeClass = 'badge-success';
        else if (item.status === 'Recusado' || item.status === 'Cancelado') badgeClass = 'badge-danger';
        else if (item.status === 'Solicitado' || item.status === 'Pendente') badgeClass = 'badge-info';
        
        var tipoNormalizado = JW.normalizarTipoHistorico(item.tipo);
        var corTipo = tipoNormalizado === 'orcamento' ? '#0077B6' : (tipoNormalizado === 'compra' ? '#28a745' : '#ffc107');
        var iconTipo = tipoNormalizado === 'orcamento' ? 'fa-file-invoice-dollar' : (tipoNormalizado === 'compra' ? 'fa-shopping-cart' : 'fa-tools');
        
        html += `
            <div class="list-item" style="flex-direction: column; align-items: flex-start;">
                <div style="display: flex; justify-content: space-between; width: 100%; margin-bottom: 0.5rem;">
                    <div>
                        <span class="badge" style="background: ${corTipo}; color: white;">
                            <i class="fas ${iconTipo}"></i> ${item.tipo}
                        </span>
                        <span class="badge ${badgeClass}" style="margin-left: 0.5rem;">${item.status}</span>
                    </div>
                    <div class="text-muted small">${item.dataRegistro || ''}</div>
                </div>
                <div style="font-weight: 600; font-size: 1rem; margin-bottom: 0.25rem;">${item.titulo || ''}</div>
                <div class="text-muted small">${item.descricao || ''}</div>
                ${item.valor && item.valor !== 'Aguardando' ? `<div style="color: var(--success); font-weight: 600; margin-top: 0.5rem;">${item.valor}</div>` : ''}
                ${item.observacoes ? `<div class="text-muted small mt-2"><i class="fas fa-comment"></i> ${item.observacoes}</div>` : ''}
            </div>
        `;
    }
    
    html += '</div>';
    container.innerHTML = html;
};

        var novoUsuario = document.getElementById('editUsuario').value.trim();
        var novoEmail = document.getElementById('editEmail').value.trim();

        if (!novoUsuario || !novoEmail) { alert('❌ Preencha os campos obrigatórios!'); return; }
        JW.mostrarLoading('Salvando alterações...');
        try {
            var resultado = await JW.chamarGoogleScript('atualizarPerfilUsuario', JW.usuarioLogado.email, { usuario: novoUsuario, email: novoEmail, telefone: novoTelefone });

                JW.usuarioLogado.telefone = novoTelefone;
                document.getElementById('sidebarUserName').textContent = novoUsuario;
                document.getElementById('profileName').textContent = novoUsuario;
                document.getElementById('profileEmail').textContent = novoEmail;

                alert('✅ Perfil atualizado com sucesso!');
            } else { alert('❌ ' + (resultado ? resultado.message : 'Erro ao salvar')); }

    JW.abrirModalAlterarSenha = function() { JW.mostrarModal('modalAlterarSenha'); };

    JW.alterarSenha = async function() {
        var senhaAtual = document.getElementById('senhaAtual').value;
        var novaSenha = document.getElementById('novaSenhaPerfil').value;
        var confirmarSenha = document.getElementById('confirmarNovaSenhaPerfil').value;
        if (!senhaAtual || !novaSenha || !confirmarSenha) { JW.mostrarMensagem('senhaMessage', 'Preencha todos os campos!', 'error'); return; }
        if (novaSenha.length < 4) { JW.mostrarMensagem('senhaMessage', 'A nova senha deve ter pelo menos 4 caracteres!', 'error'); return; }
        if (novaSenha !== confirmarSenha) { JW.mostrarMensagem('senhaMessage', 'As senhas não coincidem!', 'error'); return; }
        JW.mostrarLoading('Alterando senha...');
        try {
            var resultado = await JW.chamarGoogleScript('alterarSenhaUsuario', JW.usuarioLogado.email, senhaAtual, novaSenha);
            if (resultado && resultado.success) {
                JW.mostrarMensagem('senhaMessage', '✅ ' + resultado.message, 'success');
                document.getElementById('senhaAtual').value = '';
                document.getElementById('novaSenhaPerfil').value = '';
                document.getElementById('confirmarNovaSenhaPerfil').value = '';
                setTimeout(function() { JW.fecharModal('modalAlterarSenha'); }, 1500);
            } else { JW.mostrarMensagem('senhaMessage', '❌ ' + (resultado ? resultado.message : 'Erro ao alterar'), 'error'); }
        } catch (error) { JW.mostrarMensagem('senhaMessage', '❌ Erro: ' + error.message, 'error'); }
        finally { JW.esconderLoading(); }
    };

    JW.abrirRecuperacaoSenha = function() {
        console.log("Abrindo modal de recuperação...");
        JW.recoveryData = { email: '', codigo: '' };
        JW.mostrarModal('modalRecuperacao');
        JW.mostrarStepRecuperacao(1);
        var recoveryMsg = document.getElementById('recoveryMessage');
        if (recoveryMsg) recoveryMsg.style.display = 'none';
    };

    JW.mostrarStepRecuperacao = function(step) {
        var steps = document.querySelectorAll('.recovery-steps');
        for (var i = 0; i < steps.length; i++) {
            steps[i].classList.remove('active');
            steps[i].classList.add('d-none');
        }
        var stepEl = document.getElementById('step' + step);
        if (stepEl) {
            stepEl.classList.remove('d-none');
            stepEl.classList.add('active');
        }
        if (step === 2) JW.gerarInputsCodigo();
    };

    JW.gerarInputsCodigo = function() {
        var container = document.getElementById('codeInputsContainer');
        if (!container) return;
        container.innerHTML = '';
        for (var i = 0; i < 6; i++) {
            var input = document.createElement('input');
            input.type = 'text';
            input.maxLength = 1;
            input.className = 'code-input';
            input.dataset.index = i;
            input.addEventListener('input', function(e) {
                if (this.value && this.dataset.index < 5) {
                    var nextInput = container.querySelector('[data-index="' + (parseInt(this.dataset.index) + 1) + '"]');
                    if (nextInput) nextInput.focus();
                }
                JW.coletarCodigoRecuperacao();
            });
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && !this.value && this.dataset.index > 0) {
                    var prevInput = container.querySelector('[data-index="' + (parseInt(this.dataset.index) - 1) + '"]');
                    if (prevInput) prevInput.focus();
                }
            });
            container.appendChild(input);
        }
        var firstInput = container.querySelector('[data-index="0"]');
        if (firstInput) firstInput.focus();
    };

    JW.coletarCodigoRecuperacao = function() {
        var inputs = document.querySelectorAll('.code-input');
        var codigo = '';
        for (var i = 0; i < inputs.length; i++) codigo += inputs[i].value || '';
        JW.recoveryData.codigo = codigo;
    };

    JW.solicitarCodigoRecuperacao = async function() {
        var email = document.getElementById('recoveryEmail').value.trim();
        if (!email) { JW.mostrarMensagemRecuperacao('Digite seu e-mail!', 'error'); return; }
        JW.mostrarLoading('Enviando código...');
        try {
            var resultado = await JW.chamarGoogleScript('solicitarRecuperacaoSenha', email);
            JW.esconderLoading();
            if (resultado && resultado.success) {
                JW.recoveryData.email = resultado.email;
                JW.mostrarMensagemRecuperacao('Código enviado. Verifique sua caixa de entrada e também a pasta de spam/lixo eletrônico.', 'success');
                JW.mostrarStepRecuperacao(2);
            } else {
                JW.mostrarMensagemRecuperacao('❌ ' + (resultado ? resultado.message : 'Erro ao enviar'), 'error');
            }
        } catch (error) {
            JW.esconderLoading();
            JW.mostrarMensagemRecuperacao('❌ Erro de conexão.', 'error');
        }
    };

    JW.verificarCodigoRecuperacao = async function() {
        JW.coletarCodigoRecuperacao();
        if (JW.recoveryData.codigo.length !== 6) { JW.mostrarMensagemRecuperacao('Digite o código completo!', 'error'); return; }
        JW.mostrarLoading('Verificando...');
        try {
            var resultado = await JW.chamarGoogleScript('verificarCodigoRecuperacao', JW.recoveryData.email, JW.recoveryData.codigo);
            JW.esconderLoading();
            if (resultado && resultado.success) {
                JW.mostrarMensagemRecuperacao('✅ Código verificado!', 'success');
                JW.mostrarStepRecuperacao(3);
            } else {
                JW.mostrarMensagemRecuperacao('❌ ' + (resultado ? resultado.message : 'Código inválido'), 'error');
            }
        } catch (error) {
            JW.esconderLoading();
            JW.mostrarMensagemRecuperacao('❌ Erro de conexão.', 'error');
        }
    };

    JW.redefinirSenha = async function() {
        var novaSenha = document.getElementById('novaSenha').value;
        var confirmarNovaSenha = document.getElementById('confirmarNovaSenha').value;
        if (!novaSenha || !confirmarNovaSenha) { JW.mostrarMensagemRecuperacao('Preencha todos os campos!', 'error'); return; }
        if (novaSenha.length < 4) { JW.mostrarMensagemRecuperacao('A senha deve ter pelo menos 4 caracteres!', 'error'); return; }
        if (novaSenha.startsWith('0')) { JW.mostrarMensagemRecuperacao('A senha não pode começar com zero!', 'error'); return; }
        if (novaSenha !== confirmarNovaSenha) { JW.mostrarMensagemRecuperacao('As senhas não coincidem!', 'error'); return; }
        JW.mostrarLoading('Redefinindo...');
        try {
            var resultado = await JW.chamarGoogleScript('redefinirSenha', JW.recoveryData.email, JW.recoveryData.codigo, novaSenha, confirmarNovaSenha);
            JW.esconderLoading();
            if (resultado && resultado.success) {
                JW.mostrarMensagemRecuperacao('✅ ' + resultado.message, 'success');
                setTimeout(function() { JW.fecharModal('modalRecuperacao'); JW.mostrarMensagem('loginMessage', '✅ Senha redefinida! Faça login.', 'success'); }, 2000);
            } else {
                JW.mostrarMensagemRecuperacao('❌ ' + (resultado ? resultado.message : 'Erro ao redefinir'), 'error');
            }
        } catch (error) {
            JW.esconderLoading();
            JW.mostrarMensagemRecuperacao('❌ Erro: ' + error.message, 'error');
        }
    };

    JW.reenviarCodigo = function() {
        if (!JW.recoveryData.email) { JW.mostrarMensagemRecuperacao('Solicite um código primeiro!', 'error'); return; }
        JW.solicitarCodigoRecuperacao();
    };

    JW.mostrarMensagemRecuperacao = function(mensagem, tipo) {
        var el = document.getElementById('recoveryMessage');
        if (!el) return;
        el.textContent = mensagem;
        el.className = 'alert alert-' + tipo;
        el.style.display = 'block';

    JW.carregarNotificacoes = async function() {
        try {
            var retornoNotificacoes = await JW.chamarGoogleScript('getNotificacoesUsuarioV3', JW.usuarioLogado.email);
            JW.notificacoes = JW.extrairLista(retornoNotificacoes, ['itens', 'notificacoes']);
            // Garantir que notificacoes é um array
            if (!JW.notificacoes) JW.notificacoes = [];
            JW.atualizarBadgeNotificacoes();
        } catch (error) {
            console.error('Erro ao carregar notificações:', error);
            JW.notificacoes = []; // Inicializa como array vazio em caso de erro
        }
    };

    JW.atualizarBadgeNotificacoes = function() {
        // Verificar se notificacoes existe e é um array
        if (!JW.notificacoes || !Array.isArray(JW.notificacoes)) {
            JW.notificacoes = [];
        }
        
        var naoLidas = 0;
        for (var i = 0; i < JW.notificacoes.length; i++) {
            if (!JW.notificacoes[i].lida) naoLidas++;
        }
        var badge = document.getElementById('notificationsCount');
        if (naoLidas > 0 && badge) {
            badge.textContent = naoLidas > 9 ? '9+' : naoLidas;
            badge.classList.remove('d-none');
        } else if (badge) {
            badge.classList.add('d-none');
        }
    };

    JW.toggleNotifications = function() {
        var dropdown = document.getElementById('notificationsDropdown');
        if (dropdown) dropdown.classList.toggle('show');
        if (dropdown && dropdown.classList.contains('show')) JW.renderizarNotificacoes();
    };

    JW.renderizarNotificacoes = function() {
        var lista = document.getElementById('notificationsList');
        if (!lista) return;
        if (JW.notificacoes.length === 0) {
            lista.innerHTML = '<div class="text-center" style="padding: 2rem;"><i class="fas fa-bell-slash" style="font-size: 2rem; color: var(--text-muted);"></i><p>Nenhuma notificação</p></div>';
            return;
        }
        var html = '';
        for (var i = 0; i < JW.notificacoes.length; i++) {
            var notif = JW.notificacoes[i];
            html += '<div class="notification-item ' + (notif.lida ? '' : 'unread') + '" onclick="JW.abrirNotificacao(\'' + notif.id + '\', \'' + (notif.acao || '') + '\')"><div class="notification-title"><i class="' + notif.icone + '" style="color: var(--primary);"></i> ' + notif.titulo + '</div><div class="notification-message">' + notif.mensagem.substring(0, 100) + (notif.mensagem.length > 100 ? '...' : '') + '</div><div class="notification-time">' + notif.dataEnvio + '</div></div>';
        }
        lista.innerHTML = html;
    };

    JW.abrirNotificacao = async function(id, acao) {
        await JW.chamarGoogleScript('marcarNotificacaoLidaV3', id, JW.usuarioLogado.email);
        for (var i = 0; i < JW.notificacoes.length; i++) if (JW.notificacoes[i].id === id) JW.notificacoes[i].lida = true;
        JW.atualizarBadgeNotificacoes();
        JW.renderizarNotificacoes();
        if (acao) {
            if (acao.startsWith('http')) window.open(acao, '_blank');
            else if (acao.startsWith('tab:')) JW.abrirTab(acao.replace('tab:', ''));
            else if (acao.startsWith('produto:')) {
                var produtoId = acao.replace('produto:', '');
                await JW.abrirTab('produtos');
                setTimeout(function() {
                    var card = document.querySelector('[data-produto-id="' + produtoId + '"]');
                    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 250);
            }
        }
    };

    JW.marcarTodasLidas = async function() {
        await JW.chamarGoogleScript('marcarTodasNotificacoesLidasV3', JW.usuarioLogado.email);
        for (var i = 0; i < JW.notificacoes.length; i++) JW.notificacoes[i].lida = true;
        JW.atualizarBadgeNotificacoes();
        JW.renderizarNotificacoes();
    };

    JW.anexoOrcamentoSelecionado = function(input) {
        var arquivo = input && input.files && input.files[0];
        if (!arquivo) return;
        if (!arquivo.type || arquivo.type.indexOf('image/') !== 0) {
            alert('❌ Selecione uma imagem valida.');
            return;
        }

        var reader = new FileReader();
        reader.onload = function(e) {
            JW.orcamentoAnexo = {
                nome: arquivo.name || ('orcamento-' + Date.now() + '.jpg'),
                dataUrl: e.target.result
            };
            var preview = document.getElementById('orcamentoAnexoPreview');
            var nome = document.getElementById('orcamentoAnexoNome');
            if (nome) nome.textContent = JW.orcamentoAnexo.nome;
            if (preview) preview.classList.add('active');
        };
        reader.readAsDataURL(arquivo);
    };

        JW.orcamentoAnexo = null;
        var preview = document.getElementById('orcamentoAnexoPreview');
        var camera = document.getElementById('orcamentoFotoCamera');
        var arquivo = document.getElementById('orcamentoFotoArquivo');
        if (preview) preview.classList.remove('active');

        if (arquivo) arquivo.value = '';
    };

    JW.solicitarOrcamento = async function() {
        var tipoServico = document.getElementById('tipoServico').value;
        var descricao = document.getElementById('descricaoOrcamento').value;
        var telefone = document.getElementById('telefoneOrcamento').value;
        var observacoes = document.getElementById('observacoesOrcamento').value;
        if (!tipoServico || !descricao) { alert('❌ Preencha tipo de serviço e descrição!'); return; }
        if (descricao.length < 10) { alert('❌ Descrição deve ter pelo menos 10 caracteres'); return; }
        JW.mostrarLoading(JW.orcamentoAnexo ? 'Enviando anexo...' : 'Enviando...');
        try {
            var anexoURL = await JW.enviarAnexoOrcamento();
            if (JW.orcamentoAnexo && !anexoURL) {
                alert('❌ Nao foi possivel enviar a imagem. Tente novamente ou remova o anexo.');
                return;
            }
            var resultado = await JW.chamarGoogleScript('solicitarOrcamento', {
                cliente: JW.usuarioLogado.usuario,
                email: JW.usuarioLogado.email,
                telefone: telefone,
                tipoServico: tipoServico,
                descricao: descricao,
                observacoes: observacoes,
                imagemURL: anexoURL || '',
                arquivoURL: anexoURL || '',
                arquivoNome: JW.orcamentoAnexo ? JW.orcamentoAnexo.nome : ''
            });
            if (resultado && resultado.success) {
                alert('✅ ' + resultado.message);
                document.getElementById('tipoServico').value = '';
                document.getElementById('descricaoOrcamento').value = '';
                document.getElementById('telefoneOrcamento').value = JW.usuarioLogado.telefone || '';
                document.getElementById('observacoesOrcamento').value = '';
                JW.limparAnexoOrcamento();
            } else {
                alert('❌ ' + (resultado ? resultado.message : 'Erro ao enviar'));
            }
        } catch (error) { alert('❌ Erro: ' + error.message); }
        finally { JW.esconderLoading(); }
    };

    // ============================================
    // INICIALIZAÇÃO
    // ============================================

    JW.inicializar = function() {
        if (JW._inicializado) return;
        JW._inicializado = true;

        console.log('🚀 Sistema JW Piscinas iniciado');
        
        var tabLogin = document.getElementById('tabLoginBtn');
        var tabRegister = document.getElementById('tabRegisterBtn');
        if (tabLogin) tabLogin.addEventListener('click', function(e) { e.preventDefault(); JW.mostrarLoginForm(); });
        if (tabRegister) tabRegister.addEventListener('click', function(e) { e.preventDefault(); JW.mostrarRegisterForm(); });
        
        var btnLogin = document.getElementById('btnLogin');
        var btnRegister = document.getElementById('btnRegister');
        var btnLogout = document.getElementById('btnLogout');
        if (btnLogin) {
            btnLogin.dataset.bound = '1';
            btnLogin.addEventListener('click', JW.fazerLogin);
        }
        if (btnRegister) {
            btnRegister.dataset.bound = '1';
            btnRegister.addEventListener('click', JW.fazerCadastro);
        }
        if (btnLogout) btnLogout.addEventListener('click', JW.fazerLogout);
        
        var registerSenha = document.getElementById('registerSenha');
        if (registerSenha) registerSenha.addEventListener('input', JW.validarSenhaCadastro);
        
        var loginUsuario = document.getElementById('loginUsuario');
        var loginSenha = document.getElementById('loginSenha');
        if (loginUsuario) loginUsuario.addEventListener('keypress', function(e) { if (e.key === 'Enter') JW.fazerLogin(); });
        if (loginSenha) loginSenha.addEventListener('keypress', function(e) { if (e.key === 'Enter') JW.fazerLogin(); });
        
        document.addEventListener('click', function(e) {
            var dropdown = document.getElementById('notificationsDropdown');
            var icon = document.querySelector('.notifications-icon');
            if (dropdown && icon && !icon.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.remove('show');

            if (window.innerWidth <= 768 && document.body.classList.contains('sidebar-open')) {
                var sidebar = document.getElementById('sidebar');
                var menuToggle = document.getElementById('mobileMenuToggle');
                if (sidebar && !sidebar.contains(e.target) && menuToggle && !menuToggle.contains(e.target)) {
                    JW.fecharSidebarMobile();
                }
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') JW.fecharSidebarMobile();
        });

        window.addEventListener('resize', function() {
            if (window.innerWidth > 768) {
                JW.atualizarEstadoMenuMobile(false);
            } else {
                document.body.classList.remove('sidebar-collapsed');
            }
        });
        
        JW.mostrarLoginForm();
        JW.mostrarLoading('Carregando sistema...');
        setTimeout(function() { JW.esconderLoading(); }, 800);
    };

    window.JW = JW;
})();

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() { JW.inicializar(); });
} else {
    JW.inicializar();
}
window.__jwScriptLoaded = true;
</script>
