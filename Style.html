<!-- Style.html -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0077B6;
      --primary-dark: #005a8c;
      --primary-light: #4aa3d1;
      --accent: #00B4D8;
      --success: #28a745;
      --warning: #ffc107;
      --danger: #dc3545;
      --info: #17a2b8;
      --bg: #f0f2f5;
      --bg-sidebar: #1a2639;
      --bg-sidebar-hover: #2a3a5a;
      --card: #ffffff;
      --text: #1e293b;
      --text-light: #64748b;
      --text-muted: #94a3b8;
      --text-sidebar: #e2e8f0;
      --border: #e2e8f0;
      --xs: 0.25rem;
      --sm: 0.5rem;
      --md: 1rem;
      --lg: 1.5rem;
      --xl: 2rem;
      --xxl: 3rem;
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-full: 9999px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
      --font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; }
    body {
      font-family: var(--font-family);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      font-size: 16px;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
    }

    .d-none { display: none !important; }
    .d-flex { display: flex !important; }
    .text-center { text-align: center; }
    .w-100 { width: 100%; }
    .mt-2 { margin-top: 0.5rem; }
    .mt-4 { margin-top: 1rem; }
    .mb-2 { margin-bottom: 0.5rem; }
    .mb-4 { margin-bottom: 1rem; }
    .gap-2 { gap: 0.5rem; }
    .gap-4 { gap: 1rem; }

    /* ===========================
       LOGO - ONDA LENTA + ESCADINHA
       =========================== */
    .jw-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background: #ffffff;
      border-radius: 12px;
      position: relative;
      box-shadow: 0 10px 24px rgba(0,0,0,0.22);
      overflow: hidden;
    }

    .jw-logo::before {
      content: "";
      position: absolute;
      inset: auto -8px -8px -8px;
      height: 24px;
      background: linear-gradient(135deg, #00B4D8, #0077B6);
      border-radius: 50% 50% 0 0;
    }

    .jw-logo::after {
      content: "JW";
      position: relative;
      z-index: 2;
      color: #0077B6;
      font-weight: 900;
      font-size: 1.05rem;
      letter-spacing: 0;
    }

    .pool-icon {
      display: none;
    }

    /* Água da piscina */
    .pool-water {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 20px;
      background: linear-gradient(180deg, #48cae4, #0096c7);
      border-radius: 0 0 8px 8px;
    }

    /* Onda lenta na água */
    .pool-wave {
      position: absolute;
      top: -4px;
      left: 0;
      right: 0;
      height: 8px;
      background: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: slowWave 3s ease-in-out infinite;
    }

    @keyframes slowWave {
      0% {
        transform: translateX(0) scaleX(1);
        opacity: 0.5;
      }
      50% {
        transform: translateX(3px) scaleX(1.1);
        opacity: 0.8;
      }
      100% {
        transform: translateX(0) scaleX(1);
        opacity: 0.5;
      }
    }

    /* Escadinha saindo da água */
    .pool-ladder {
      position: absolute;
      right: 4px;
      bottom: 8px;
      width: 4px;
      height: 16px;
      background: rgba(255,255,255,0.9);
      border-radius: 2px;
      z-index: 2;
    }

    .pool-ladder::before {
      content: '';
      position: absolute;
      width: 4px;
      height: 16px;
      background: rgba(255,255,255,0.9);
      border-radius: 2px;
      left: 8px;
    }

    .pool-ladder::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: -2px;
      right: -2px;
      height: 2px;
      background: rgba(255,255,255,0.9);
      border-radius: 1px;
    }

    /* Degraus da escada */
    .ladder-step {
      position: absolute;
      right: 2px;
      width: 12px;
      height: 2px;
      background: rgba(255,255,255,0.9);
      border-radius: 1px;
    }

    .step-1 { bottom: 12px; }
    .step-2 { bottom: 8px; }
    .step-3 { bottom: 4px; }

    .logo-text {
      font-weight: 700;
      color: white;
      line-height: 1.1;
      display: flex;
      flex-direction: column;
    }

    .logo-brand {
      font-size: 1.15rem;
      letter-spacing: 0;
    }

    .logo-subtitle {
      display: none;
      margin-top: 2px;
      font-size: 0.68rem;
      font-weight: 500;
      color: rgba(255,255,255,0.68);
    }

    body.admin-mode .logo-subtitle {
      display: block;
    }

    /* ===========================
       LAYOUT - SIDEBAR SÓ APARECE APÓS LOGIN
       =========================== */
    .sidebar {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 280px;
      background: var(--bg-sidebar);
      color: var(--text-sidebar);
      flex-direction: column;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      z-index: 1000;
    }

    body.logged-in .sidebar {
      display: flex;
    }

    body.logged-in .main-content {
      margin-left: 280px;
      flex: 1;
      min-height: 100vh;
      min-height: 100dvh;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    @media (max-width: 768px) {
      body.logged-in .sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        display: flex;
        width: min(86vw, 280px);
        max-width: 320px;
        z-index: 1200;
        will-change: transform;
      }
      body.logged-in.sidebar-open .sidebar {
        transform: translateX(0);
      }
      body.logged-in.sidebar-open {
        overflow: hidden;
      }
      body.logged-in.sidebar-open::before {
        content: "";
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.42);
        z-index: 1190;
      }
      body.logged-in .main-content {
        margin-left: 0;
        width: 100%;
      }
      .mobile-menu-toggle {
        display: flex !important;
      }
      body.sidebar-collapsed .sidebar {
        width: min(86vw, 280px);
      }
      body.sidebar-collapsed.logged-in .main-content {
        margin-left: 0;
      }
      body.sidebar-collapsed .logo-text,
      body.sidebar-collapsed .nav-item span,
      body.sidebar-collapsed .user-details {
        display: block;
      }
      body.sidebar-collapsed .nav-item {
        justify-content: flex-start;
        padding: var(--md);
      }
    }

    .mobile-menu-toggle {
      display: none;
      position: fixed;
      top: max(1rem, env(safe-area-inset-top));
      left: max(1rem, env(safe-area-inset-left));
      z-index: 1300;
      background: var(--primary);
      border: none;
      color: white;
      font-size: 1.5rem;
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      cursor: pointer;
      box-shadow: var(--shadow-md);
      align-items: center;
      justify-content: center;
    }

    .content-header {
      background: var(--card);
      padding: var(--md) var(--xl);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow-sm);
    }

    .content-area {
      flex: 1;
      padding: var(--xl);
      overflow-y: auto;
      min-width: 0;
    }

    .sidebar-logo {
      padding: var(--lg) var(--md);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: var(--md);
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: var(--sm);
    }

    .nav-menu {
      flex: 1;
      padding: var(--md);
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: var(--md);
      padding: var(--md);
      color: var(--text-sidebar);
      text-decoration: none;
      border-radius: var(--radius-md);
      margin-bottom: 4px;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
      background: transparent;
      width: 100%;
      font-size: 1rem;
      font-weight: 500;
    }

    .nav-item i {
      width: 24px;
      font-size: 1.2rem;
      color: var(--text-muted);
    }

    .nav-item:hover {
      background: var(--bg-sidebar-hover);
    }

    .nav-item.active {
      background: linear-gradient(90deg, var(--primary), var(--primary-dark));
      color: white;
    }

    .nav-item.active i {
      color: white;
    }

    .nav-item.dev-mode {
      border: 1px dashed rgba(255,255,255,0.3);
      opacity: 0.7;
      position: relative;
    }

    .nav-item.dev-mode::after {
      content: "";
      position: absolute;
      right: 12px;
      font-size: 0.8rem;
      opacity: 0.8;
    }

    body.admin-mode .sidebar {
      background: #111827;
      border-right: 4px solid #00b4d8;
    }

    body.admin-mode .sidebar-logo {
      background: linear-gradient(135deg, rgba(0,180,216,0.18), rgba(255,255,255,0.04));
    }

    body.admin-mode .nav-item.active {
      background: #00b4d8;
      box-shadow: inset 4px 0 0 #ffffff;
    }

    body.admin-mode .dashboard-welcome {
      background: linear-gradient(135deg, #111827, #0077B6);
      color: white;
    }

    body.admin-mode .dashboard-welcome p {
      color: rgba(255,255,255,0.82);
    }

    .nav-item.dev-mode:hover {
      opacity: 1;
      border-color: var(--primary);
    }

    .user-profile-sidebar {
      padding: var(--lg) var(--md);
      border-top: 1px solid rgba(255,255,255,0.1);
      margin-top: auto;
      cursor: pointer;
    }

    .user-profile-sidebar:hover {
      background: var(--bg-sidebar-hover);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: var(--md);
    }

    .user-name {
      font-weight: 600;
      color: white;
      font-size: 0.95rem;
    }

    .user-role {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* Login Screen */
    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      padding: var(--md);
    }

    .login-container {
      width: 100%;
      max-width: 450px;
      background: white;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    .login-header {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      padding: var(--xl) var(--lg);
      text-align: center;
      color: white;
    }

    .login-header h1 {
      font-size: 2rem;
      margin: 0;
      font-weight: 700;
    }

    .login-body {
      padding: var(--xl) var(--lg);
    }

    .auth-tabs {
      display: flex;
      gap: var(--sm);
      background: var(--bg);
      padding: 4px;
      border-radius: var(--radius-md);
      margin-bottom: var(--lg);
    }

    .auth-tab {
      flex: 1;
      padding: var(--sm) var(--md);
      border: none;
      background: transparent;
      border-radius: var(--radius-sm);
      font-weight: 600;
      cursor: pointer;
      color: var(--text-light);
    }

    .auth-tab.active {
      background: white;
      color: var(--primary);
      box-shadow: var(--shadow-sm);
    }

    .form-group {
      margin-bottom: var(--md);
    }

    .form-label {
      display: block;
      margin-bottom: var(--xs);
      font-weight: 500;
      color: var(--text);
      font-size: 0.9rem;
    }

    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 1rem;
      background: white;
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,119,182,0.1);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--sm);
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(90deg, var(--primary), var(--accent));
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .btn-secondary {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-success {
      background: linear-gradient(90deg, var(--success), #34ce57);
      color: white;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-sm {
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
    }

    .alert {
      padding: var(--md);
      border-radius: var(--radius-md);
      margin-bottom: var(--md);
      font-size: 0.95rem;
    }

    .alert-success {
      background: #d4edda;
      color: #155724;
    }

    .alert-error {
      background: #f8d7da;
      color: #721c24;
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 99999;
    }

    .loading-overlay.active {
      display: flex;
    }

    .loading-card {
      background: white;
      padding: var(--xl);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      text-align: center;
      min-width: 280px;
    }

    .loading-spinner-modern {
      width: 60px;
      height: 60px;
      margin: 0 auto var(--lg);
      border: 4px solid var(--border);
      border-top: 4px solid var(--primary);
      border-right: 4px solid var(--accent);
      border-radius: 50%;
      animation: spin 1s infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Cards e Grids */
    .card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: var(--lg);
      margin-bottom: var(--lg);
      box-shadow: var(--shadow-sm);
    }

    .card h3 {
      margin-bottom: var(--md);
      font-size: 1.1rem;
      font-weight: 600;
    }

    .dashboard-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--md);
      margin-bottom: var(--lg);
    }

    .dashboard-welcome {
      padding: 28px 32px;
      margin-bottom: 24px;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, rgba(0,119,182,0.08), rgba(0,180,216,0.14));
      box-shadow: var(--shadow-sm);
    }

    .dashboard-welcome h2 {
      margin: 0 0 8px;
      font-size: 1.8rem;
    }

    .dashboard-welcome p {
      margin: 0;
      color: var(--text-light);
    }

    .dashboard-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: var(--lg);
      box-shadow: var(--shadow-sm);
      text-align: center;
    }

    .dashboard-card i {
      font-size: 2rem;
      color: var(--primary);
      margin-bottom: var(--md);
    }

    .dashboard-card-value {
      font-size: 1.5rem;
      font-weight: 700;
    }

    /* Produtos */
    .filters-container {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: var(--lg);
      margin-bottom: var(--lg);
      box-shadow: var(--shadow-sm);
    }

    .filters-title {
      font-weight: 600;
      margin-bottom: var(--md);
      color: var(--text);
    }

    .filters-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: var(--sm);
    }

    .filter-btn {
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      background: white;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.875rem;
    }

    .filter-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .filter-btn.todos {
      background: #6c757d;
      border-color: #6c757d;
      color: white;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--lg);
    }

    .product-card {
      background: white;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .product-image-container {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #f5f7fa, #e4e7eb);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .product-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-info {
      padding: var(--md);
    }

    .product-name {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 0.25rem;
    }

    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: var(--radius-full);
      font-size: 0.75rem;
      font-weight: 500;
    }

    .badge-success {
      background: var(--success);
      color: white;
    }

    .badge-warning {
      background: var(--warning);
      color: #333;
    }

    .badge-danger {
      background: var(--danger);
      color: white;
    }

    .badge-info {
      background: var(--info);
      color: white;
    }

    .badge-secondary {
      background: #6c757d;
      color: white;
    }

    .product-price-container {
      margin: 0.5rem 0;
    }

    .product-price {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary);
      cursor: pointer;
    }

    .product-price:hover {
      text-decoration: underline;
    }

    /* Admin Panel */
    .admin-panel {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-radius: var(--radius-lg);
      padding: var(--lg);
      margin-bottom: var(--lg);
      color: white;
    }

    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--md);
      margin-top: var(--md);
    }

    .admin-stat-card {
      background: rgba(255,255,255,0.1);
      border-radius: var(--radius-md);
      padding: var(--md);
      text-align: center;
    }

    .admin-stat-value {
      font-size: 2rem;
      font-weight: 700;
    }

    .admin-stat-label {
      font-size: 0.875rem;
      opacity: 0.8;
    }

    .admin-card {
      background: white;
      border-radius: var(--radius-lg);
      margin-bottom: var(--lg);
      overflow: hidden;
    }

    .admin-card-header {
      background: var(--bg);
      padding: var(--md) var(--lg);
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }

    .admin-card-body {
      padding: var(--lg);
    }

    /* Notificações */
    .notifications-panel {
      position: relative;
    }

    .notifications-icon {
      background: transparent;
      border: none;
      font-size: 1.3rem;
      color: var(--text);
      cursor: pointer;
      position: relative;
      padding: var(--sm);
    }

    .notifications-count {
      position: absolute;
      top: 0;
      right: 0;
      background: var(--danger);
      color: white;
      font-size: 0.7rem;
      min-width: 18px;
      height: 18px;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid white;
    }

    .notifications-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      width: 350px;
      background: white;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      z-index: 1000;
      display: none;
    }

    .notifications-dropdown.show {
      display: block;
    }

    .notifications-list {
      max-height: 400px;
      overflow-y: auto;
    }

    .notification-item {
      padding: var(--md);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .notification-item.unread {
      background: #e6f3ff;
      border-left: 3px solid var(--primary);
    }

    /* Código de recuperação */
    .code-inputs {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin: var(--lg) 0;
    }

    .code-input {
      width: 50px;
      height: 60px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 600;
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
    }

    .code-input:focus {
      border-color: var(--primary);
      outline: none;
    }

    /* Modais */
    #modalBackdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }

    #modalBackdrop.active {
      display: flex;
    }

    .modal {
      background: white;
      border-radius: var(--radius-lg);
      max-width: 600px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10001;
    }

    .modal.active {
      display: block;
    }

    .loading-text-modern,
    .loading-subtext {
      display: none;
    }

    .system-toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 11000;
      max-width: min(420px, calc(100vw - 40px));
      padding: 14px 16px;
      border-radius: var(--radius-md);
      background: #111827;
      color: white;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      font-weight: 600;
      line-height: 1.35;
    }

    .system-toast.active {
      opacity: 1;
      transform: translateY(0);
    }

    .system-toast-success {
      background: #0f766e;
    }

    .system-toast-error {
      background: #b91c1c;
    }

    .old-price {
      display: block;
      color: var(--text-muted);
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: line-through;
      margin-bottom: 2px;
    }

    .editable-price {
      cursor: pointer;
      border-radius: var(--radius-sm);
      padding: 1px 3px;
      margin-left: -3px;
    }

    .editable-price:hover {
      background: rgba(0,119,182,0.1);
      text-decoration: underline;
    }

    .attachment-actions {
      display: flex;
      flex-wrap: wrap;
      gap: var(--sm);
      margin-top: var(--sm);
    }

    .attachment-preview {
      display: none;
      align-items: center;
      gap: var(--sm);
      margin-top: var(--sm);
      padding: var(--sm) var(--md);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--bg);
      color: var(--text-light);
      font-size: 0.9rem;
    }

    .attachment-preview.active {
      display: flex;
    }

    .report-detail {
      margin: var(--lg) 0;
    }

    .report-card-action {
      cursor: pointer;
      border: 1px solid transparent;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .report-card-action:hover {
      transform: translateY(-3px);
      border-color: var(--primary);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--lg);
      border-bottom: 1px solid var(--border);
    }

    .modal-close {
      background: transparent;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-muted);
    }

    .modal-body {
      padding: var(--lg);
    }

    /* Listas */
    .list {
      display: flex;
      flex-direction: column;
      gap: var(--sm);
    }

    .list-item {
      background: var(--card);
      border-radius: var(--radius-md);
      padding: var(--md);

      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--border);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: var(--md);
      margin-top: var(--lg);
    }

    .stat-card {
      background: var(--bg);
      border-radius: var(--radius-md);
      padding: var(--lg);
      text-align: center;
    }

    .stat-value {

      font-weight: 700;
      color: var(--primary);
    }

    .stat-label {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .recent-list {
      max-height: 300px;
      overflow-y: auto;
    }

    }

    .dev-message h3 {

      margin-bottom: var(--md);
    }

    .dev-message p {
      color: var(--text-muted);
    }
