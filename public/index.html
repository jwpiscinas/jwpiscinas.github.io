<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0077B6">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/jw-logo-192.png">
  <title>JW Piscinas</title>
  <style>
    html,
    body {
      background: #f6f8fb;
      height: 100%;
      margin: 0;
      overflow: hidden;
      padding: 0;
      width: 100%;
    }

    body {
      min-height: 100dvh;
      position: fixed;
      inset: 0;
    }

    .jw-app-frame {
      border: 0;
      display: block;
      height: 100dvh;
      left: 0;
      min-height: 100svh;
      position: fixed;
      top: 0;
      width: 100vw;
    }

    .jw-noscript {
      color: #172033;
      font-family: Arial, sans-serif;
      margin: 32px;
    }

    .install-prompt {
      align-items: center;
      background: rgba(15, 23, 42, 0.38);
      backdrop-filter: blur(3px);
      display: none;
      inset: 0;
      justify-content: center;
      padding: 20px;
      position: fixed;
      z-index: 20;
    }

    .install-prompt.show {
      display: flex;
    }

    .install-modal {
      background: #ffffff;
      border: 1px solid rgba(15, 23, 42, 0.12);
      border-radius: 16px;
      box-shadow: 0 22px 52px rgba(15, 23, 42, 0.24);
      color: #172033;
      font-family: Arial, sans-serif;
      padding: 18px;
      width: min(420px, calc(100vw - 32px));
    }

    .install-modal-body {
      align-items: flex-start;
      display: flex;
      gap: 14px;
    }

    .install-prompt img {
      border-radius: 12px;
      height: 52px;
      width: 52px;
    }

    .install-prompt strong,
    .install-prompt p,
    .install-prompt small {
      display: block;
    }

    .install-prompt strong {
      font-size: 14px;
      line-height: 1.3;
    }

    .install-prompt p,
    .install-prompt small {
      font-size: 12px;
      color: #64748b;
      line-height: 1.4;
      margin-top: 4px;
    }

    .install-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    .install-prompt button {
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font-family: Arial, sans-serif;
      font-size: 12px;
      font-weight: 700;
      padding: 10px 14px;
      white-space: nowrap;
    }

    .install-prompt .install-now {
      background: #0077B6;
      color: #fff;
    }

    .install-prompt .install-close {
      background: #eef2f7;
      color: #172033;
    }
  </style>
</head>
<body>
  <div id="installPrompt" class="install-prompt" role="dialog" aria-label="Instalar aplicativo">
    <div class="install-modal">
      <div class="install-modal-body">
        <img src="/jw-logo-192.png" alt="">
        <div>
          <strong id="installTitle">Instalar JW Piscinas</strong>
          <p id="installDescription">Abra como aplicativo no computador ou celular.</p>
          <small id="installHint">Se preferir, continue no navegador.</small>
        </div>
      </div>
      <div class="install-actions">
        <button id="installClose" class="install-close" type="button">Agora não</button>
        <button id="installNow" class="install-now" type="button">Instalar</button>
      </div>
    </div>
  </div>

  <iframe
    id="jwAppFrame"
    class="jw-app-frame"
    src="about:blank"
    data-src-base="https://script.google.com/macros/s/AKfycbzVUTdv6k6hGfdhSuyLX_7xVCgvSld12THLQFb75n5fjP9RW1L50YzFzEXk_hf-lGQ/exec"
    title="JW Piscinas"
    allow="clipboard-read; clipboard-write; fullscreen; microphone"
  ></iframe>

  <noscript>
    <div class="jw-noscript">
      <p>Ative o JavaScript para abrir o sistema.</p>
      <p><a href="https://script.google.com/macros/s/AKfycbzVUTdv6k6hGfdhSuyLX_7xVCgvSld12THLQFb75n5fjP9RW1L50YzFzEXk_hf-lGQ/exec">Abrir sistema</a></p>
    </div>
  </noscript>
  <script>
    let deferredInstallPrompt = null;
    const promptEl = document.getElementById("installPrompt");
    const installNow = document.getElementById("installNow");
    const installClose = document.getElementById("installClose");
    const installTitle = document.getElementById("installTitle");
    const installDescription = document.getElementById("installDescription");
    const installHint = document.getElementById("installHint");
    const appFrame = document.getElementById("jwAppFrame");
    const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
    const appBaseUrl = appFrame ? appFrame.getAttribute("data-src-base") || "" : "";
    const dismissKey = "jwInstallPromptDismissedAt";
    const ua = window.navigator.userAgent || "";
    const isIOS = /iPhone|iPad|iPod/i.test(ua);
    const isSafari = /^((?!chrome|android).)*safari/i.test(ua);

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(() => undefined);
    }

    if (appFrame && appBaseUrl) {
      const sep = appBaseUrl.includes("?") ? "&" : "?";
      appFrame.src = `${appBaseUrl}${sep}host=firebase&cb=${Date.now()}`;
    }

    function shouldSuppressPrompt() {
      try {
        const value = Number(window.localStorage.getItem(dismissKey) || "0");
        return Number.isFinite(value) && value > Date.now();
      } catch (error) {
        return false;
      }
    }

    function savePromptDismissal() {
      try {
        window.localStorage.setItem(dismissKey, String(Date.now() + (12 * 60 * 60 * 1000)));
      } catch (error) {}
    }

    function configurePromptContent() {
      if (!installTitle || !installDescription || !installHint || !installNow) return;
      if (deferredInstallPrompt) {
        installTitle.textContent = "Instalar JW Piscinas";
        installDescription.textContent = "Abra o sistema como aplicativo e entre mais rápido no dia a dia.";
        installHint.textContent = "Você pode continuar no navegador se preferir.";
        installNow.hidden = false;
        installNow.disabled = false;
        return;
      }
      if (isIOS && isSafari) {
        installTitle.textContent = "Instalar JW Piscinas";
        installDescription.textContent = "No iPhone, toque em Compartilhar e depois em Adicionar à Tela de Início.";
        installHint.textContent = "Depois disso, o sistema abre como aplicativo.";
        installNow.hidden = true;
        installNow.disabled = true;
        return;
      }
      installTitle.textContent = "Abrir JW Piscinas";
      installDescription.textContent = "O sistema está pronto para uso no navegador.";
      installHint.textContent = "Quando a instalação estiver disponível, o botão do navegador aparece automaticamente.";
      installNow.hidden = true;
      installNow.disabled = true;
    }

    function showInstallPrompt(force = false) {
      if (!promptEl || isStandalone || shouldSuppressPrompt()) return;
      if (!force && !deferredInstallPrompt && !(isIOS && isSafari)) return;
      configurePromptContent();
      promptEl.classList.add("show");
    }

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredInstallPrompt = event;
      showInstallPrompt(true);
    });

    window.addEventListener("appinstalled", () => {
      deferredInstallPrompt = null;
      if (promptEl) promptEl.classList.remove("show");
    });

    installNow && installNow.addEventListener("click", async () => {
      if (!deferredInstallPrompt) {
        showInstallPrompt(true);
        return;
      }
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice.catch(() => undefined);
      deferredInstallPrompt = null;
      if (promptEl) promptEl.classList.remove("show");
    });

    installClose && installClose.addEventListener("click", () => {
      savePromptDismissal();
      if (promptEl) promptEl.classList.remove("show");
    });

    window.setTimeout(() => showInstallPrompt(false), 1200);
  </script>
</body>
</html>
