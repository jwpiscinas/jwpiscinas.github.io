<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0077B6">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/jw-logo-192.png">
  <title>JW Piscinas</title>
  <style>
    html,
    body {
      background: #f6f8fb;
      height: 100%;
      margin: 0;
      overflow: hidden;
      padding: 0;
      width: 100%;
    }

    body {
      min-height: 100dvh;
      position: fixed;
      inset: 0;
    }

    .jw-app-frame {
      border: 0;
      display: block;
      height: 100dvh;
      left: 0;
      min-height: 100svh;
      position: fixed;
      top: 0;
      width: 100vw;
    }

    .jw-noscript {
      color: #172033;
      font-family: Arial, sans-serif;
      margin: 32px;
    }
  </style>
</head>
<body>
  <iframe
    id="jwAppFrame"
    class="jw-app-frame"
    src="about:blank"
    data-src-base="https://script.google.com/macros/s/AKfycbzVUTdv6k6hGfdhSuyLX_7xVCgvSld12THLQFb75n5fjP9RW1L50YzFzEXk_hf-lGQ/exec"
    title="JW Piscinas"
    allow="clipboard-read; clipboard-write; fullscreen; microphone"
  ></iframe>

  <noscript>
    <div class="jw-noscript">
      <p>Ative o JavaScript para abrir o sistema.</p>
      <p><a href="https://script.google.com/macros/s/AKfycbzVUTdv6k6hGfdhSuyLX_7xVCgvSld12THLQFb75n5fjP9RW1L50YzFzEXk_hf-lGQ/exec">Abrir sistema</a></p>
    </div>
  </noscript>
  <script>
    const appFrame = document.getElementById("jwAppFrame");
    const appBaseUrl = appFrame ? appFrame.getAttribute("data-src-base") || "" : "";

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(() => undefined);
    }

    if (appFrame && appBaseUrl) {
      const sep = appBaseUrl.includes("?") ? "&" : "?";
      appFrame.src = `${appBaseUrl}${sep}host=firebase&cb=${Date.now()}`;
    }
  </script>
</body>
</html>
